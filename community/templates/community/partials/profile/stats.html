<section class="bg-soft py-12">

<div class="max-w-6xl mx-auto px-4">

<div class="grid grid-cols-2 md:grid-cols-5 gap-6">

<!-- SUJETS -->

<div class="bg-white rounded-xl p-6 border border-primary-100 shadow-sm text-center hover:shadow-md transition">

<div class="flex justify-center mb-2 text-primary-600">
<i data-lucide="message-square" class="w-6 h-6"></i>
</div>

<div class="text-2xl font-bold text-primary-700">
{{ stats.topics }}
</div>

<div class="text-xs text-gray-500 mt-1">
Sujets
</div>

</div>


<!-- RÉPONSES -->

<div class="bg-white rounded-xl p-6 border border-primary-100 shadow-sm text-center hover:shadow-md transition">

<div class="flex justify-center mb-2 text-primary-600">
<i data-lucide="reply" class="w-6 h-6"></i>
</div>

<div class="text-2xl font-bold text-primary-700">
{{ stats.answers }}
</div>

<div class="text-xs text-gray-500 mt-1">
Réponses
</div>

</div>


<!-- SOLUTIONS -->

<div class="bg-white rounded-xl p-6 border border-primary-100 shadow-sm text-center hover:shadow-md transition">

<div class="flex justify-center mb-2 text-green-600">
<i data-lucide="check-circle" class="w-6 h-6"></i>
</div>

<div class="text-2xl font-bold text-green-600">
{{ stats.accepted }}
</div>

<div class="text-xs text-gray-500 mt-1">
Solutions
</div>

</div>


<!-- VOTES -->

<div class="bg-white rounded-xl p-6 border border-primary-100 shadow-sm text-center hover:shadow-md transition">

<div class="flex justify-center mb-2 text-blue-600">
<i data-lucide="thumbs-up" class="w-6 h-6"></i>
</div>

<div class="text-2xl font-bold text-blue-600">
{{ stats.upvotes }}
</div>

<div class="text-xs text-gray-500 mt-1">
Votes
</div>

</div>


<!-- SCORE -->

<div class="bg-white rounded-xl p-6 border border-primary-100 shadow-sm text-center hover:shadow-md transition">

<div class="flex justify-center mb-2 text-yellow-500">
<i data-lucide="star" class="w-6 h-6"></i>
</div>

<div class="text-2xl font-bold text-yellow-500">
{{ stats.reputation }}
</div>

<div class="text-xs text-gray-500 mt-1">
Score
</div>

</div>

</div>

</div>

</section>
