{% extends "base.html" %}
{% block content %}
<main class="mx-auto max-w-6xl px-4 py-6">
  <h1 class="text-2xl font-semibold">Cycle academique</h1>
  <table class="mt-4 w-full text-sm">
    <thead><tr><th>Annee</th><th>Statut</th><th>Total annexes</th></tr></thead>
    <tbody>
      {% for row in overview %}
      <tr><td>{{ row.academic_year__name }}</td><td>{{ row.status }}</td><td>{{ row.total }}</td></tr>
      {% empty %}
      <tr><td colspan="3">Aucun cycle configure.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</main>
{% endblock %}
