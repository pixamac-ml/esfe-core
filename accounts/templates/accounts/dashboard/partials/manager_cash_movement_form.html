<form
    hx-post="{% url 'accounts:htmx_manager_cash_movement_create' %}"
    hx-target="#manager-cash-movement-form"
    hx-swap="outerHTML"
    hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
    id="manager-cash-movement-form"
    class="space-y-4">
    <div class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-600">
        Utiliser ce formulaire seulement pour un mouvement manuel ou un ajustement. Les paiements et depenses alimentent la caisse automatiquement.
    </div>
    {% include "accounts/dashboard/partials/dg_form_fields.html" with form=cash_form %}
    <div class="dg-form-footer">
        <button type="submit" class="dg-btn dg-btn-primary">
            <i class="fa-solid fa-plus"></i>
            Ajouter le mouvement
        </button>
    </div>
</form>
