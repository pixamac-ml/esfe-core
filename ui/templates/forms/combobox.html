{% load component_tags %}
<div
  data-options="{{ options_json }}"
  x-data="{
    open: false,
    query: '',
    selected: '{{ value }}',
    selectedLabel: '',
    highlightIndex: -1,
    options: [],
    get filtered() {
      if (!this.query) return this.options;
      const q = this.query.toLowerCase();
      return this.options.filter(o => o.label.toLowerCase().includes(q));
    },
    select(opt) {
      this.selected = opt.value;
      this.selectedLabel = opt.label;
      this.query = opt.label;
      this.open = false;
      this.highlightIndex = -1;
    },
    clear() {
      this.selected = '';
      this.selectedLabel = '';
      this.query = '';
    },
    keydown(e) {
      if (!this.open) return;
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        this.highlightIndex = Math.min(this.highlightIndex + 1, this.filtered.length - 1);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        this.highlightIndex = Math.max(this.highlightIndex - 1, 0);
      } else if (e.key === 'Enter' && this.highlightIndex >= 0) {
        e.preventDefault();
        this.select(this.filtered[this.highlightIndex]);
      } else if (e.key === 'Escape') {
        this.open = false;
        this.highlightIndex = -1;
      }
    },
    init() {
      this.options = JSON.parse(this.$el.dataset.options || '[]');
      const match = this.options.find(o => o.value === this.selected);
      if (match) { this.selectedLabel = match.label; this.query = match.label; }
    }
  }"
  x-init="init()"
  @keydown="keydown"
  class="relative {{ class_str }}"
>
  <input
    type="text"
    x-model="query"
    @focus="open = true"
    @input="open = true; highlightIndex = -1"
    placeholder="{{ placeholder }}"
    {% if disabled %}disabled{% endif %}
    autocomplete="off"
    class="block w-full rounded-lg border bg-[color:var(--card)] px-3 py-2.5 text-sm text-[color:var(--text)] placeholder:text-[color:var(--muted-2)] transition outline-none
           border-[color:var(--line)] focus:border-[color:var(--school-primary)] focus:ring-2 focus:ring-[color:var(--school-primary-soft)]
           {% if errors %}border-[color:var(--danger)]! focus:border-[color:var(--danger)]! focus:ring-[color:var(--danger-soft)]!{% endif %}
           {% if disabled %}opacity-50 pointer-events-none{% endif %}"
  >
  <input type="hidden" name="{{ name }}" x-model="selected">

  {% if not disabled %}
    <div
      x-show="open && filtered.length > 0"
      @click.outside="open = false"
      x-cloak
      x-transition:enter="transition ease-out duration-150"
      x-transition:enter-start="opacity-0 scale-95"
      x-transition:enter-end="opacity-100 scale-100"
      class="absolute z-50 mt-1 w-full rounded-xl border border-[color:var(--line)] bg-[color:var(--card)] py-1 shadow-lg"
    >
      <template x-for="(opt, index) in filtered" :key="opt.value">
        <div
          @click="select(opt)"
          :class="index === highlightIndex ? 'bg-[color:var(--card-soft)]' : ''"
          class="flex cursor-pointer items-center gap-2 px-3 py-2 text-sm text-[color:var(--text)] transition hover:bg-[color:var(--card-soft)]"
        >
          <span x-text="opt.label"></span>
          <span x-show="opt.value === selected" class="ml-auto text-[color:var(--school-primary)]">
            <i data-lucide="check" style="width:14px;height:14px;"></i>
          </span>
        </div>
      </template>
    </div>
    <div
      x-show="open && query && filtered.length === 0"
      x-cloak
      class="absolute z-50 mt-1 w-full rounded-xl border border-[color:var(--line)] bg-[color:var(--card)] px-3 py-2 text-sm text-[color:var(--muted-2)] shadow-lg"
    >
      Aucun résultat
    </div>
  {% endif %}
</div>
{% for error in errors %}
  <p class="text-xs font-semibold text-[color:var(--danger)] mt-1">{{ error }}</p>
{% endfor %}
