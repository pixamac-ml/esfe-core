<div class="workflow-actions">
  {% for action in actions %}
  {% if action.kind == "modal" %}
  <button
    type="button"
    class="workflow-btn workflow-btn-{{ action.style }}"
    hx-get="{% url 'accounts_portal:it_notes_retake_modal' %}?class_id={{ academic_class.id }}&semester_id={{ semester.id }}"
    hx-target="#it-modal-root"
    hx-swap="innerHTML"
  ><i data-lucide="{% if action.code == 'start_saisie' or action.code == 'continue_saisie' %}pencil{% elif action.code == 'verifier_notes' %}check-circle{% elif action.code == 'publier_session_normale' or action.code == 'publier_resultats_finaux' %}send{% elif action.code == 'ouvrir_rattrapage' or action.code == 'activer_rattrapage' %}repeat{% elif action.code == 'generer_decisions_annuelles' %}calculator{% elif action.code == 'generer_bulletins' %}file-text{% else %}arrow-right{% endif %}" class="h-4 w-4"></i> {{ action.label }}</button>
  {% else %}
  <form
    method="post"
    action="{% url 'accounts_portal:it_notes_workflow_action' %}"
    hx-post="{% url 'accounts_portal:it_notes_workflow_action' %}"
    hx-target="{{ target }}"
    hx-swap="innerHTML"
  >
    {% csrf_token %}
    <input type="hidden" name="class_id" value="{{ academic_class.id }}">
    <input type="hidden" name="semester_id" value="{{ semester.id }}">
    <input type="hidden" name="action" value="{{ action.code }}">
    {% if drawer_mode %}<input type="hidden" name="drawer" value="1">{% endif %}
    <button type="submit" class="workflow-btn workflow-btn-{{ action.style }}"><i data-lucide="{% if action.code == 'start_saisie' or action.code == 'continue_saisie' %}pencil{% elif action.code == 'verifier_notes' %}check-circle{% elif action.code == 'publier_session_normale' or action.code == 'publier_resultats_finaux' %}send{% elif action.code == 'ouvrir_rattrapage' or action.code == 'activer_rattrapage' %}repeat{% elif action.code == 'generer_decisions_annuelles' %}calculator{% elif action.code == 'generer_bulletins' %}file-text{% else %}arrow-right{% endif %}" class="h-4 w-4"></i> {{ action.label }}</button>
  </form>
  {% endif %}
  {% empty %}
  <p class="workflow-muted">Aucune action disponible pour cet etat.</p>
  {% endfor %}
</div>
