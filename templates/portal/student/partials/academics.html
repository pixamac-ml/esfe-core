<div class="mb-5 flex items-start justify-between gap-3">
  <div>
    <p class="student-section-kicker">Academique</p>
    <h3 class="mt-1 student-section-title">Situation academique</h3>
  </div>
  <span class="rounded-full border border-[color:var(--line)] bg-[color:var(--card-soft)] px-3 py-2 text-xs font-extrabold text-[color:var(--muted)]">{{ status }}</span>
</div>

<div class="mb-4 grid gap-3 lg:grid-cols-2">
  <div class="rounded-xl border border-[color:var(--line)] bg-[color:var(--card-soft)] p-4">
    <span class="text-[11px] font-bold uppercase tracking-wide text-[color:var(--muted)]">Formation</span>
    <strong class="mt-2 block text-lg font-black tracking-tight text-[color:var(--text)]">{{ formation }}</strong>
    <p class="mt-2 text-sm text-[color:var(--muted)]">Classe : {{ classroom }}</p>
  </div>
  <div class="rounded-xl border border-[color:var(--line)] bg-[color:var(--card-soft)] p-4">
    <span class="text-[11px] font-bold uppercase tracking-wide text-[color:var(--muted)]">Semestres et credits</span>
    <strong class="mt-2 block text-lg font-black tracking-tight text-[color:var(--text)]">{{ semester }}</strong>
    <p class="mt-2 text-sm text-[color:var(--muted)]">Credits : {{ credits }}</p>
  </div>
</div>

<div class="rounded-xl border border-[color:var(--line)] bg-[color:var(--card)] p-4">
  <div class="mb-3 flex items-center justify-between gap-3">
    <span class="text-[11px] font-bold uppercase tracking-wide text-[color:var(--muted)]">Progression administrative</span>
    <span class="text-sm font-black text-[color:var(--text)]">{{ progress }}%</span>
  </div>
  <div class="h-2 overflow-hidden rounded-full bg-[color:var(--surface-2)]">
    <div class="h-full rounded-full bg-gradient-to-r from-[color:var(--school-primary)] to-[color:var(--school-secondary)]" style="width:{{ progress }}%"></div>
  </div>
  <p class="mt-3 text-sm leading-6 text-[color:var(--muted)]">{{ status_message }}</p>
</div>
