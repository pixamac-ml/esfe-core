<div class="bg-primary-50 border border-primary-100 rounded-xl p-5">

    <div class="text-sm text-gray-700 leading-relaxed mb-3">
        {{ answer.content|linebreaks }}
    </div>

    <div class="text-xs text-gray-500 flex items-center gap-4">

        <span class="font-medium text-primary-600">
            {{ answer.author }}
        </span>

        <span>
            {{ answer.created_at|date:"d M Y H:i" }}
        </span>

    </div>

</div>
