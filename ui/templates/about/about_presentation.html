{% load static %}

<section class="py-24 bg-white overflow-hidden">
    <div class="max-w-7xl mx-auto px-6">

        <!-- Section Présentation -->
        <div class="grid lg:grid-cols-2 gap-16 items-center mb-24">

            <!-- Texte -->
            <div data-aos="fade-right" data-aos-duration="1000">
                <span class="inline-block px-4 py-1.5 text-xs font-bold uppercase tracking-widest
                             text-primary-600 bg-primary-50 rounded-full mb-6">
                    Qui sommes-nous
                </span>

                <h2 class="text-4xl md:text-5xl font-bold text-gray-900 mb-8 leading-tight">
                    {{ about_title }}
                </h2>

                <div class="prose prose-lg prose-primary max-w-none text-gray-600 leading-relaxed">
                    {{ about_text|safe }}
                </div>
            </div>

            <!-- Image -->
            {% if about_image %}
            <div class="relative" data-aos="fade-left" data-aos-duration="1000" data-aos-delay="200">
                <!-- Cadre décoratif -->
                <div class="absolute -inset-4 bg-gradient-to-r from-primary-500 to-secondary-500 rounded-3xl opacity-20 blur-xl"></div>
                <div class="absolute -top-6 -right-6 w-24 h-24 bg-secondary-500 rounded-2xl -z-10"
                     data-aos="zoom-in" data-aos-delay="600"></div>
                <div class="absolute -bottom-6 -left-6 w-32 h-32 bg-primary-100 rounded-2xl -z-10"
                     data-aos="zoom-in" data-aos-delay="800"></div>

                <img src="{{ about_image.url }}"
                     alt="{{ about_title }}"
                     class="relative rounded-2xl shadow-2xl w-full object-cover
                            transform hover:scale-[1.02] transition-transform duration-700">
            </div>
            {% endif %}

        </div>

        <!-- Vision & Mission -->
        <div class="grid md:grid-cols-2 gap-8">

            <!-- Vision -->
            <div class="group relative p-10 bg-gradient-to-br from-primary-50 to-white rounded-3xl
                        border border-primary-100 hover:shadow-2xl hover:shadow-primary-100/50
                        transition-all duration-500"
                 data-aos="fade-up" data-aos-duration="800">

                <!-- Icône -->
                <div class="w-16 h-16 mb-6 rounded-2xl bg-gradient-to-br from-primary-500 to-primary-600
                            flex items-center justify-center shadow-lg shadow-primary-200
                            group-hover:scale-110 transition-transform duration-300">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                    </svg>
                </div>

                <h3 class="text-2xl font-bold text-gray-900 mb-4">{{ vision_title }}</h3>
                <p class="text-gray-600 leading-relaxed">{{ vision_text }}</p>

                <!-- Ligne décorative -->
                <div class="absolute bottom-0 left-10 right-10 h-1 bg-gradient-to-r from-primary-500 to-transparent rounded-full
                            transform scale-x-0 group-hover:scale-x-100 transition-transform duration-500 origin-left"></div>
            </div>

            <!-- Mission -->
            <div class="group relative p-10 bg-gradient-to-br from-secondary-50 to-white rounded-3xl
                        border border-secondary-100 hover:shadow-2xl hover:shadow-secondary-100/50
                        transition-all duration-500"
                 data-aos="fade-up" data-aos-duration="800" data-aos-delay="200">

                <!-- Icône -->
                <div class="w-16 h-16 mb-6 rounded-2xl bg-gradient-to-br from-secondary-500 to-secondary-600
                            flex items-center justify-center shadow-lg shadow-secondary-200
                            group-hover:scale-110 transition-transform duration-300">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M13 10V3L4 14h7v7l9-11h-7z"/>
                    </svg>
                </div>

                <h3 class="text-2xl font-bold text-gray-900 mb-4">{{ mission_title }}</h3>
                <p class="text-gray-600 leading-relaxed">{{ mission_text }}</p>

                <!-- Ligne décorative -->
                <div class="absolute bottom-0 left-10 right-10 h-1 bg-gradient-to-r from-secondary-500 to-transparent rounded-full
                            transform scale-x-0 group-hover:scale-x-100 transition-transform duration-500 origin-left"></div>
            </div>

        </div>

    </div>
</section>
