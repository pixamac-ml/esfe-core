{% extends "base.html" %}

{% block content %}
<section class="min-h-[78vh] flex items-center justify-center bg-gradient-to-b from-slate-50 to-white py-20">
  <div class="max-w-3xl w-full px-6">
    <div class="rounded-2xl border border-slate-200 bg-white shadow-sm p-8 text-center">
      <p class="text-xs uppercase tracking-widest text-primary-600 font-semibold mb-3">Erreur {{ error_code }}</p>
      <h1 class="text-4xl md:text-5xl font-bold text-slate-900 mb-4">{{ error_title }}</h1>
      <p class="text-slate-600 text-base md:text-lg leading-relaxed mb-8">{{ error_message }}</p>

      <div class="flex flex-wrap justify-center gap-3">
        <a href="{% url 'core:home' %}" class="px-6 py-3 bg-primary-600 text-white rounded-lg hover:bg-primary-700 transition">Retour à l'accueil</a>
        <a href="{% url 'core:contact' %}" class="px-6 py-3 border border-primary-600 text-primary-700 rounded-lg hover:bg-primary-50 transition">Demander de l'aide</a>
      </div>
    </div>

  </div>
</section>
{% endblock %}
