<div class="flex -space-x-2">
  {% for avatar in avatars %}
    <div class="{{ size_class }} rounded-full border-2 border-[color:var(--card)]">
      {% if avatar.photo_url %}
        <img src="{{ avatar.photo_url }}" alt="{{ avatar.initials }}" class="{{ size_class }} rounded-full object-cover">
      {% else %}
        <span class="{{ size_class }} rounded-full bg-[color:var(--school-primary-soft)] text-[color:var(--school-primary)] inline-flex items-center justify-center font-black">{{ avatar.initials }}</span>
      {% endif %}
    </div>
  {% endfor %}
  {% if overflow > 0 %}
    <span class="{{ size_class }} rounded-full border-2 border-[color:var(--card)] bg-[color:var(--card-soft)] text-[color:var(--muted)] inline-flex items-center justify-center text-xs font-black">+{{ overflow }}</span>
  {% endif %}
</div>
