{% if values %}
<section class="py-24 bg-gray-50 overflow-hidden">
    <div class="max-w-7xl mx-auto px-6">

        <!-- Header -->
        <div class="text-center mb-16" data-aos="fade-up">
            <span class="inline-block px-4 py-1.5 text-xs font-bold uppercase tracking-widest
                         text-secondary-600 bg-secondary-100 rounded-full mb-4">
                Ce qui nous guide
            </span>
            <h2 class="text-4xl md:text-5xl font-bold text-gray-900 mb-6">{{ title }}</h2>
            {% if subtitle %}
            <p class="text-xl text-gray-600 max-w-3xl mx-auto">{{ subtitle }}</p>
            {% endif %}
        </div>

        <!-- Grille de valeurs -->
        <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-8">

            {% for value in values %}
            <div class="group relative"
                 data-aos="fade-up"
                 data-aos-duration="600"
                 data-aos-delay="{{ forloop.counter0 }}50">

                <!-- Carte -->
                <div class="relative h-full p-8 bg-white rounded-3xl shadow-lg
                            border border-gray-100 hover:border-primary-200
                            hover:shadow-2xl hover:-translate-y-2
                            transition-all duration-500">

                    <!-- Gradient background on hover -->
                    <div class="absolute inset-0 bg-gradient-to-br from-primary-500/5 to-secondary-500/5
                                rounded-3xl opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>

                    <!-- Numéro décoratif -->
                    <span class="absolute -top-4 -right-4 w-12 h-12
                                 bg-gradient-to-br from-primary-500 to-primary-600
                                 rounded-full flex items-center justify-center
                                 text-white font-bold text-lg shadow-lg
                                 group-hover:scale-110 transition-transform duration-300">
                        {{ forloop.counter }}
                    </span>

                    <!-- Icône -->
                    {% if value.icon %}
                    <div class="w-14 h-14 mb-6 rounded-2xl
                                bg-gradient-to-br from-primary-100 to-primary-50
                                flex items-center justify-center
                                group-hover:from-primary-200 group-hover:to-primary-100
                                transition-colors duration-300">
                        <i class="{{ value.icon }} text-2xl text-primary-600"></i>
                    </div>
                    {% endif %}

                    <!-- Contenu -->
                    <h3 class="relative text-xl font-bold text-gray-900 mb-4
                               group-hover:text-primary-700 transition-colors duration-300">
                        {{ value.title }}
                    </h3>

                    <p class="relative text-gray-600 leading-relaxed">
                        {{ value.description }}
                    </p>

                    <!-- Ligne décorative bottom -->
                    <div class="absolute bottom-0 left-0 right-0 h-1
                                bg-gradient-to-r from-primary-500 via-secondary-500 to-primary-500
                                rounded-b-3xl transform scale-x-0 group-hover:scale-x-100
                                transition-transform duration-500 origin-center"></div>

                </div>
            </div>
            {% endfor %}

        </div>

    </div>
</section>
{% endif %}
