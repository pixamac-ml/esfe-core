{% extends "base.html" %}
{% block content %}

<div class="bg-soft min-h-screen py-20">
    <div class="max-w-xl mx-auto bg-white p-10 rounded-xl shadow border border-primary-100 text-center">

        <!-- Icône succès -->
        <div class="mb-6">
            <div class="w-20 h-20 mx-auto bg-green-100 text-green-600 rounded-full flex items-center justify-center text-3xl">
                ✓
            </div>
        </div>

        <h2 class="text-2xl font-bold text-primary-700 mb-4">
            Mot de passe modifié avec succès
        </h2>

        <p class="text-gray-600 mb-8">
            Votre mot de passe a été mis à jour.
            Vous pouvez continuer à utiliser la plateforme normalement.
        </p>

        <div class="flex justify-center gap-4">

            <a href="{% url 'accounts:profile' %}"
               class="bg-primary-500 hover:bg-primary-600 text-white px-6 py-3 rounded-lg font-semibold transition">
                Retour au profil
            </a>

            <a href="{% url 'community:topic_list' %}"
               class="bg-secondary hover:bg-secondary-dark text-white px-6 py-3 rounded-lg font-semibold transition">
                Aller à la communauté
            </a>

        </div>

    </div>
</div>

{% endblock %}
