<h2 class="font-semibold text-lg mb-4 text-gray-800">Notifications</h2>
<div class="flex flex-col h-full justify-between">
  {% if items %}
    <ul class="space-y-2 text-xs">
      {% for notif in items %}
        <li class="bg-gray-50 border border-gray-100 rounded-lg p-3 text-gray-700 shadow-sm flex items-center gap-2">
          <svg class="w-4 h-4 text-blue-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M12 20a8 8 0 100-16 8 8 0 000 16z"/></svg>
          {{ notif }}
        </li>
      {% endfor %}
    </ul>
  {% else %}
    <div class="flex items-center gap-2 text-gray-400 text-xs py-6 justify-center">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M12 20a8 8 0 100-16 8 8 0 000 16z"/></svg>
      Aucune notification pour le moment.
    </div>
  {% endif %}
</div>
