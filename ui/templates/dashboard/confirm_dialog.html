{% load component_tags %}
<div x-data="{ open: false }">
  {% slot "trigger" %}
    <button
      @click="open = true"
      class="inline-flex items-center justify-center gap-2 rounded-lg bg-[color:var(--danger)] px-4 py-2 text-sm font-bold text-white transition hover:opacity-90 focus:outline-none focus:ring-2 focus:ring-[color:var(--danger-soft)] focus:ring-offset-2"
    >
      {{ confirm_label }}
    </button>
  {% endslot %}

  <div
    x-show="open"
    x-transition.opacity.duration.300ms
    x-cloak
    class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4"
  >
    <div
      @click.outside="open = false"
      x-show="open"
      x-transition:enter="transition ease-out duration-300"
      x-transition:enter-start="opacity-0 scale-95 translate-y-4"
      x-transition:enter-end="opacity-100 scale-100 translate-y-0"
      x-transition:leave="transition ease-in duration-200"
      x-transition:leave-start="opacity-100 scale-100 translate-y-0"
      x-transition:leave-end="opacity-0 scale-95 translate-y-4"
      class="w-full max-w-md rounded-xl border border-[color:var(--line)] bg-[color:var(--card)] shadow-xl"
    >
      <div class="flex items-center justify-between border-b border-[color:var(--line)] px-6 py-4">
        <h2 class="text-base font-black text-[color:var(--text)]">{{ title }}</h2>
        <button @click="open = false" class="flex h-8 w-8 items-center justify-center rounded-lg text-[color:var(--muted)] transition hover:bg-[color:var(--card-soft)] hover:text-[color:var(--text)]" aria-label="Fermer">
          <i data-lucide="x" style="width:16px;height:16px;"></i>
        </button>
      </div>

      <div class="px-6 py-5">
        {% if message %}
          <p class="text-sm leading-6 text-[color:var(--text)]">{{ message }}</p>
        {% endif %}
        {% slot "default" %}{% endslot %}
      </div>

      <div class="flex items-center justify-end gap-3 border-t border-[color:var(--line)] px-6 py-4">
        <button
          @click="open = false"
          class="inline-flex items-center justify-center gap-2 rounded-lg border border-[color:var(--line)] bg-[color:var(--card)] px-4 py-2 text-sm font-bold text-[color:var(--text)] transition hover:bg-[color:var(--card-soft)]"
        >
          {{ cancel_label }}
        </button>
        <button
          @click="open = false"
          {% if hx_post %}
            hx-post="{{ hx_post }}"
            hx-target="{{ hx_target }}"
          {% endif %}
          class="inline-flex items-center justify-center gap-2 rounded-lg px-4 py-2 text-sm font-bold text-white transition hover:opacity-90 focus:outline-none focus:ring-2 focus:ring-offset-2
                 {% if confirm_tone == 'danger' %}
                   bg-[color:var(--danger)] focus:ring-[color:var(--danger-soft)]
                 {% else %}
                   bg-[color:var(--school-primary)] focus:ring-[color:var(--school-primary-soft)]
                 {% endif %}"
        >
          {{ confirm_label }}
        </button>
      </div>
    </div>
  </div>
</div>
