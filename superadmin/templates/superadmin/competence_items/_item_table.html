<table class="data-table">
    <thead>
        <tr>
            <th>Programme</th>
            <th>Bloc</th>
            <th>Titre</th>
            <th>Description</th>
            <th>Ordre</th>
            <th class="text-right">Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for item in items %}
        <tr>
            <td>{{ item.block.programme.title }}</td>
            <td>{{ item.block.title }}</td>
            <td>{{ item.title }}</td>
            <td>{{ item.description|default:'-'|truncatechars:90 }}</td>
            <td>{{ item.order }}</td>
            <td class="text-right">
                <div class="inline-flex gap-2">
                    <a href="{% url 'superadmin:competence_item_edit' item.pk %}" class="btn btn-outline btn-sm">Modifier</a>
                    <form method="post" action="{% url 'superadmin:competence_item_delete' item.pk %}" onsubmit="return confirm('Supprimer cet item ?');">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger btn-sm">Supprimer</button>
                    </form>
                </div>
            </td>
        </tr>
        {% empty %}
        <tr><td colspan="6" class="py-10 text-center text-slate-500">Aucun item de competences.</td></tr>
        {% endfor %}
    </tbody>
</table>
