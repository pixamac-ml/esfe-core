<div class="mt-12 border-t border-gray-200 pt-8">
  <div class="flex flex-wrap items-center justify-between gap-4">
    <div class="flex items-center gap-6 text-sm text-gray-500">
      <span>{{ article.views_count }} vues</span>
      <span>{{ article.comments.count }} commentaires</span>
    </div>

    <div class="flex flex-wrap items-center gap-4">
      <a href="https://wa.me/?text={{ request.build_absolute_uri|urlencode }}"
         target="_blank" rel="noopener noreferrer"
         class="text-gray-500 transition hover:text-green-600">WhatsApp</a>
      <a href="https://www.facebook.com/sharer/sharer.php?u={{ request.build_absolute_uri|urlencode }}"
         target="_blank" rel="noopener noreferrer"
         class="text-gray-500 transition hover:text-blue-600">Facebook</a>
      <a href="https://www.linkedin.com/sharing/share-offsite/?url={{ request.build_absolute_uri|urlencode }}"
         target="_blank" rel="noopener noreferrer"
         class="text-gray-500 transition hover:text-blue-700">LinkedIn</a>
    </div>
  </div>
</div>
