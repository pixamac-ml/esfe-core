{% if items %}
<section class="py-10 ">
  <div class="max-w-7xl mx-auto px-6">

    <div class="max-w-3xl mb-16">
      <h2 class="text-3xl md:text-4xl font-bold text-primary">
        Ce que vous allez apprendre
      </h2>
      <p class="mt-4 text-gray-600 leading-relaxed">
        Des compétences concrètes et immédiatement applicables dans le domaine professionnel.
      </p>
    </div>

    <div class="grid md:grid-cols-2 gap-8">

      {% for item in items %}
        <div class="group bg-white rounded-2xl p-8 shadow-md
                    hover:shadow-xl hover:-translate-y-1
                    transition-all duration-300 border border-gray-100">

          <div class="flex items-start gap-5">

            <div class="w-12 h-12 rounded-xl bg-secondary/10
                        flex items-center justify-center shrink-0">

              <svg class="w-6 h-6 text-secondary"
                   fill="none" stroke="currentColor" stroke-width="2"
                   viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M5 13l4 4L19 7" />
              </svg>

            </div>

            <p class="text-gray-700 leading-relaxed text-base">
              {{ item }}
            </p>

          </div>
        </div>
      {% endfor %}

    </div>

  </div>
</section>
{% endif %}
