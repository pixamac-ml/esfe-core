<div id="sg-att-row-{{ row.student.id }}" class="row" style="flex-wrap:wrap">
  <div class="pic" style="background:#3d4f63">{{ row.student.full_name|slice:":2"|upper }}</div>
  <div class="main"><b>{{ row.student.full_name }}</b><span>{{ row.student.matricule }}</span></div>
  <span class="tail">
    {% if not roll_locked %}
      <button type="button"
              class="att-state {% if row.justification %}att-justifie{% elif row.status == 'present' %}att-present{% elif row.status == 'late' %}att-retard{% else %}att-absent{% endif %}"
              hx-post="{% url 'accounts_portal:supervisor_attendance_toggle_student' %}"
              hx-target="#sg-att-row-{{ row.student.id }}"
              hx-swap="outerHTML"
              hx-vals='{"schedule_event_id":"{{ selected_event.id }}","student_id":"{{ row.student.id }}","status":"{{ row.next_status }}","justification":"{{ row.justification|default:""|escapejs }}"}'
      >{% if row.justification %}Justifié{% elif row.status == "present" %}Présent{% elif row.status == "late" %}Retard{% else %}Absent{% endif %}</button>
    {% else %}
      <span class="chip mute">{% if row.status == "present" %}Présent{% elif row.status == "late" %}Retard{% else %}Absent{% endif %}</span>
    {% endif %}
  </span>
  <div style="flex:1 0 100%;margin-top:8px">
    <label class="f-l" style="margin-top:0">Motif absence (optionnel)</label>
    <input type="text"
           class="f-i"
           value="{{ row.justification }}"
           {% if roll_locked %}disabled{% endif %}
           hx-post="{% url 'accounts_portal:supervisor_attendance_toggle_student' %}"
           hx-trigger="change"
           hx-target="#sg-att-row-{{ row.student.id }}"
           hx-swap="outerHTML"
           hx-vals='{"schedule_event_id":"{{ selected_event.id }}","student_id":"{{ row.student.id }}","status":"{{ row.status }}"}'
           name="justification"
    >
  </div>
</div>
