<tr class="bg-emerald-50 border-y border-emerald-100">
    <td colspan="5" class="px-6 py-4">
        <div class="flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between">
            <div>
                <p class="text-sm font-semibold text-emerald-800">
                    Inscription creee pour {{ candidature.full_name }}
                </p>
                <p class="text-xs text-emerald-700 mt-1">
                    Token public: {{ inscription.public_token }} | Code d'acces: {{ inscription.access_code }}
                </p>
            </div>
            <a href="{{ inscription.get_public_url }}" target="_blank" class="inline-flex items-center justify-center px-4 py-2 rounded-xl bg-emerald-600 text-white text-sm font-semibold hover:bg-emerald-700 transition">
                Ouvrir le dossier
            </a>
        </div>
    </td>
</tr>
