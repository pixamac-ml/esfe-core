{% extends "base.html" %}
{% block content %}

<div class="min-h-screen bg-soft flex items-center justify-center py-16">
    <div class="bg-white shadow-lg rounded-xl p-10 w-full max-w-md border border-primary-100">

        <h1 class="text-2xl font-bold text-primary-700 mb-8 text-center">
            Connexion
        </h1>

        <form method="post" class="space-y-6">
            {% csrf_token %}

            <div>
                <label class="block text-sm font-medium text-gray-600 mb-2">
                    Nom d'utilisateur
                </label>
                {{ form.username }}
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-600 mb-2">
                    Mot de passe
                </label>
                {{ form.password }}
            </div>

            <button type="submit"
                    class="w-full bg-primary-500 hover:bg-primary-600 text-white py-3 rounded-lg font-semibold transition">
                Se connecter
            </button>

        </form>

        <div class="text-sm text-center text-gray-500 mt-6">
            Pas encore de compte ?
            <a href="{% url 'accounts:register' %}?next={{ request.GET.next }}"
               class="text-primary-600 hover:text-secondary font-medium">
                Créer un compte
            </a>
        </div>

    </div>
</div>

{% endblock %}
