<div class="tunnel-step-shell" x-data="{ phase: 'welcome' }">
  <div x-show="phase === 'welcome'"
       x-cloak
       x-transition:enter="transition duration-700 ease-[cubic-bezier(0.16,1,0.3,1)]"
       x-transition:enter-start="opacity-0 translate-y-4"
       x-transition:enter-end="opacity-100 translate-y-0"
       x-transition:leave="transition duration-500 ease-in-out"
       x-transition:leave-start="opacity-100 translate-y-0"
       x-transition:leave-end="opacity-0 -translate-y-4"
       class="h-full min-h-0 flex flex-col">
    <div class="tunnel-scroll pr-1 space-y-6 md:space-y-5">
      <p class="text-xs uppercase tracking-[0.3em] text-[#1db5b0] font-semibold" data-aos="fade-up" data-aos-duration="1000" data-aos-delay="200">
        Admission ESFE
      </p>

      <h2 class="text-2xl md:text-3xl lg:text-4xl xl:text-5xl font-extrabold leading-tight text-[#1e4f6f]" data-aos="fade-up" data-aos-duration="1100" data-aos-delay="100">
        Bienvenue a l'ESFE.
        <span class="block text-slate-700">Pret a transformer votre ambition en carriere ?</span>
      </h2>

      <button type="button"
              class="group inline-flex items-center gap-2 text-[#1e4f6f] text-base font-semibold transition hover:text-[#1db5b0]"
              @click="phase = 'identify'"
              data-aos="fade-up"
              data-aos-duration="1100"
              data-aos-delay="300">
        Commencer mon voyage
        <i class="fa-solid fa-chevron-right text-xs transition-transform group-hover:translate-x-1"></i>
      </button>
    </div>
  </div>

  <div x-show="phase === 'identify'"
       x-cloak
       x-transition:enter="transition duration-700 ease-[cubic-bezier(0.16,1,0.3,1)]"
       x-transition:enter-start="opacity-0 translate-y-4"
       x-transition:enter-end="opacity-100 translate-y-0"
       x-transition:leave="transition duration-500 ease-in-out"
       x-transition:leave-start="opacity-100 translate-y-0"
       x-transition:leave-end="opacity-0 -translate-y-4"
       class="h-full min-h-0 flex flex-col">
    <div class="tunnel-scroll pr-1 space-y-6 md:space-y-5">
      <div class="space-y-3">
        <p class="text-xs uppercase tracking-[0.26em] text-[#1db5b0] font-semibold" data-aos="fade-up" data-aos-duration="1000" data-aos-delay="200">
          Identification
        </p>
        <h2 class="text-3xl md:text-4xl lg:text-5xl xl:text-6xl font-extrabold leading-[0.95] text-[#1e4f6f]" data-aos="fade-up" data-aos-duration="1100" data-aos-delay="100">
          Qui etes-vous ?
        </h2>
        <p class="text-sm text-slate-600" data-aos="fade-up" data-aos-duration="1100" data-aos-delay="200">
          Pour mieux vous accompagner, comment devons-nous vous appeler ?
        </p>
      </div>

      <div class="space-y-5 max-w-2xl">
        <label class="relative block" data-aos="fade-up" data-aos-duration="1050" data-aos-delay="300">
          <input x-model="formData.last_name" type="text" placeholder=" " data-field="last_name"
                 class="peer h-12 md:h-14 w-full border-0 border-b border-slate-300 bg-transparent pr-10 pl-0 text-base md:text-lg text-slate-900 focus:border-[#1db5b0] focus:outline-none focus:ring-0"
                 :class="errors.last_name ? '!border-red-500' : ''" />
          <span class="pointer-events-none absolute left-0 transition-all duration-300"
                :class="fieldLabelClasses(formData.last_name)">Nom</span>
          <i class="fa-regular fa-user absolute right-1 top-5 text-slate-400 text-sm"></i>
          <p x-show="errors.last_name" x-cloak class="mt-1 text-xs text-red-600" x-text="errors.last_name"></p>
        </label>

        <label class="relative block" data-aos="fade-up" data-aos-duration="1050" data-aos-delay="300">
          <input x-model="formData.first_name" type="text" placeholder=" " data-field="first_name"
                 class="peer h-12 md:h-14 w-full border-0 border-b border-slate-300 bg-transparent pr-10 pl-0 text-base md:text-lg text-slate-900 focus:border-[#1db5b0] focus:outline-none focus:ring-0"
                 :class="errors.first_name ? '!border-red-500' : ''" />
          <span class="pointer-events-none absolute left-0 transition-all duration-300"
                :class="fieldLabelClasses(formData.first_name)">Prenom</span>
          <i class="fa-regular fa-user absolute right-1 top-5 text-slate-400 text-sm"></i>
          <p x-show="errors.first_name" x-cloak class="mt-1 text-xs text-red-600" x-text="errors.first_name"></p>
        </label>

        <label class="relative block" data-aos="fade-up" data-aos-duration="1050" data-aos-delay="300">
          <input x-model="formData.city" type="text" placeholder=" " data-field="city"
                 class="peer h-12 md:h-14 w-full border-0 border-b border-slate-300 bg-transparent pr-10 pl-0 text-base md:text-lg text-slate-900 focus:border-[#1db5b0] focus:outline-none focus:ring-0"
                 :class="errors.city ? '!border-red-500' : ''" />
          <span class="pointer-events-none absolute left-0 transition-all duration-300"
                :class="fieldLabelClasses(formData.city)">Ville d'origine</span>
          <i class="fa-solid fa-location-dot absolute right-1 top-5 text-slate-400 text-sm"></i>
          <p x-show="errors.city" x-cloak class="mt-1 text-xs text-red-600" x-text="errors.city"></p>
        </label>
      </div>
    </div>

    <div class="tunnel-nav" data-aos="fade-up" data-aos-duration="1150" data-aos-delay="300">
      <button type="button"
              class="group tunnel-btn-next"
              :disabled="!isStepComplete(1)"
              :class="!isStepComplete(1) ? 'opacity-60 cursor-not-allowed' : ''"
              @click="goTo(2)">
        Suivant
        <i class="fa-solid fa-chevron-right text-xs transition-transform group-hover:translate-x-1"></i>
      </button>
    </div>
  </div>
</div>
