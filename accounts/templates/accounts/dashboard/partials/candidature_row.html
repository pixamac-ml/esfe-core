{% with row=cand|default:candidature %}
<div id="candidature-row-{{ row.id }}"
     class="flex items-center justify-between p-4 rounded-xl bg-slate-50 hover:bg-slate-100 border border-slate-100 transition">

    <div class="flex items-center gap-4">

        <div class="w-12 h-12 rounded-xl bg-primary text-white flex items-center justify-center font-bold">

            {{ row.first_name.0|upper }}{{ row.last_name.0|upper }}

        </div>

        <div>

            <p class="font-semibold text-slate-800">
                {{ row.full_name }}
            </p>

            <p class="text-sm text-slate-500">
                {{ row.programme.title }}
            </p>

        </div>

    </div>

    <div class="flex items-center gap-2">

        <button
            hx-get="{% url 'accounts:candidature_detail_htmx' row.id %}"
            hx-target="#candidate-detail-content"
            hx-swap="innerHTML"

            onclick="openModal('candidate-detail-modal')"

            class="px-3 py-2 rounded-lg bg-primary/10 text-primary">

            <i class="fas fa-eye"></i>

        </button>

    </div>

</div>
{% endwith %}
