<div class="mb-6">
    <label class="block text-sm font-medium mb-2">
        {{ label }}
        {% if required %}
            <span class="text-red-600">*</span>
        {% endif %}
    </label>

    <label class="flex flex-col items-center justify-center border-2 border-dashed border-gray-300 rounded-xl p-6 cursor-pointer hover:border-primary-500 transition">
        <span class="text-gray-500 text-sm mb-2">
            Glissez-déposez ou cliquez pour sélectionner
        </span>

        <input type="file" name="{{ name }}" class="hidden">
    </label>
</div>
