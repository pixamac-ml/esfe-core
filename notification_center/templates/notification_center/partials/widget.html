{% load humanize %}
<div class="notification-widget"
     data-notification-widget
     data-notification-count="{{ notification_unread_count|default:0 }}"
     hx-get="{% url 'notification_center:notifications_widget' %}{% if request.resolver_match.namespace == 'secretary' or request.GET.surface == 'secretary' %}?surface=secretary{% endif %}"
     hx-trigger="every 25s"
     hx-swap="outerHTML">
  <style>
    .notification-widget{position:relative;display:inline-flex;z-index:80}.notification-widget-btn{position:relative;width:40px;height:40px;border:1px solid #dbe3ef;border-radius:12px;background:#fff;color:#334155;display:grid;place-items:center;cursor:pointer;transition:.16s}.notification-widget-btn:hover{background:#f8fafc;border-color:#bfdbfe;color:#2563eb}.notification-widget-btn.has-new{animation:notificationBell .75s ease 2}.notification-widget-badge{position:absolute;right:-5px;top:-5px;min-width:18px;height:18px;padding:0 5px;border-radius:999px;background:#ef4444;color:#fff;font-size:10px;font-weight:950;display:grid;place-items:center;line-height:1}.notification-widget-badge.is-empty{display:none}.notification-widget-panel{position:absolute;right:0;top:48px;width:min(390px,calc(100vw - 24px));max-height:520px;overflow:hidden;border:1px solid #dbe3ef;border-radius:14px;background:#fff;box-shadow:0 22px 55px rgba(15,23,42,.18);display:none}.notification-widget.is-open .notification-widget-panel{display:block}.notification-widget-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 14px;border-bottom:1px solid #eef2f7}.notification-widget-title{font-size:13px;font-weight:950;color:#0f172a}.notification-widget-sub{font-size:11px;font-weight:800;color:#64748b;margin-top:2px}.notification-widget-list{max-height:365px;overflow:auto}.notification-widget-item{width:100%;display:flex;gap:10px;padding:12px 14px;border:0;border-bottom:1px solid #f1f5f9;color:inherit;text-decoration:none;background:#fff;text-align:left;cursor:pointer}.notification-widget-item:hover{background:#f8fbff}.notification-widget-item.is-unread{background:#eff6ff}.notification-widget-dot{width:8px;height:8px;border-radius:999px;background:#2563eb;flex:0 0 8px;margin-top:6px}.notification-widget-item.is-read .notification-widget-dot{background:#cbd5e1}.notification-widget-item-title{font-size:12px;font-weight:950;color:#0f172a;line-height:1.25}.notification-widget-item-body{font-size:11px;color:#64748b;font-weight:700;line-height:1.35;margin-top:3px}.notification-widget-item-meta{font-size:10px;color:#94a3b8;font-weight:800;margin-top:4px}.notification-widget-link{font-size:11px;font-weight:950;color:#2563eb;text-decoration:none}.notification-widget-actions{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-top:1px solid #eef2f7;background:#fafcff}.notification-widget-mark{border:0;background:transparent;color:#2563eb;font-size:11px;font-weight:950;cursor:pointer;padding:0}.notification-drawer{position:fixed;inset:0;z-index:9998;display:none}.notification-drawer[aria-hidden="false"]{display:flex;align-items:stretch;justify-content:flex-end}.notification-drawer-backdrop{position:absolute;inset:0;background:rgba(15,23,42,.22)}.notification-drawer-panel{position:relative;width:min(420px,100vw);background:#fff;box-shadow:-6px 0 42px rgba(15,23,42,.14);overflow:auto}.notification-drawer-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid #eef2f7}.notification-drawer-body{padding:14px 18px 28px}@keyframes notificationBell{0%,100%{transform:rotate(0)}25%{transform:rotate(-12deg)}75%{transform:rotate(12deg)}}
  </style>
  <button type="button" class="notification-widget-btn" onclick="window.esfeToggleNotificationWidget(this)" aria-label="Notifications">
    <svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 17H9m9-2V11a6 6 0 0 0-12 0v4l-2 2h16l-2-2Zm-6 6a2.5 2.5 0 0 0 2.35-1.65h-4.7A2.5 2.5 0 0 0 12 21Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <span class="notification-widget-badge js-notification-unread-count {% if not notification_unread_count %}is-empty{% endif %}">{% if notification_unread_count %}{{ notification_unread_count }}{% endif %}</span>
  </button>
  <section class="notification-widget-panel">
    <div class="notification-widget-head">
      <div><div class="notification-widget-title">Notifications</div><div class="notification-widget-sub"><span class="js-notification-unread-text">{{ notification_unread_count|default:0 }}</span> non lue(s)</div></div>
      <a class="notification-widget-link" href="{% if request.resolver_match.namespace == 'secretary' or request.GET.surface == 'secretary' %}{% url 'secretary:secretary_dashboard' %}?section=notifications{% else %}{% url 'notification_center:notifications' %}{% endif %}">Tout voir</a>
    </div>
    <div class="notification-widget-list">
      {% for notification in recent_notifications %}
        <button type="button" class="notification-widget-item {% if notification.read_at %}is-read{% else %}is-unread{% endif %}" data-notification-detail-url="{% url 'notification_center:notification_detail' notification.id %}" onclick="window.esfeOpenNotification(this)">
          <span class="notification-widget-dot"></span><span style="min-width:0"><span class="notification-widget-item-title">{{ notification.title }}</span><span class="notification-widget-item-body">{{ notification.body|default:"Notification centralisée"|truncatechars:120 }}</span><span class="notification-widget-item-meta">{{ notification.created_at|date:"d/m/Y H:i" }}</span></span>
        </button>
      {% empty %}
        <div class="notification-widget-item is-read"><span class="notification-widget-dot"></span><span class="notification-widget-item-body">Aucune notification pour le moment.</span></div>
      {% endfor %}
    </div>
    <div class="notification-widget-actions">
      <button class="notification-widget-mark" type="button" hx-post="{% url 'notification_center:mark_all_notifications_read' %}" hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}' hx-target="closest .notification-widget" hx-swap="outerHTML">Tout marquer lu</button>
      <a class="notification-widget-link" href="{% url 'notification_center:notifications' %}">Centre</a>
    </div>
  </section>
  <div class="notification-drawer" data-notification-drawer aria-hidden="true">
    <div class="notification-drawer-backdrop" onclick="window.esfeCloseNotificationDrawer()"></div>
    <section class="notification-drawer-panel" role="dialog" aria-modal="true" aria-label="Détail de la notification">
      <header class="notification-drawer-head"><strong>Détail de la notification</strong><button type="button" onclick="window.esfeCloseNotificationDrawer()" aria-label="Fermer">×</button></header>
      <div class="notification-drawer-body" data-notification-drawer-body></div>
    </section>
  </div>
</div>
<script>
  window.esfeToggleNotificationWidget = window.esfeToggleNotificationWidget || function(button) {
    const widget = button.closest('[data-notification-widget]');
    document.querySelectorAll('[data-notification-widget].is-open').forEach(item => { if (item !== widget) item.classList.remove('is-open'); });
    widget.classList.toggle('is-open');
  };
  window.esfeCloseNotificationDrawer = window.esfeCloseNotificationDrawer || function() {
    document.querySelectorAll('[data-notification-drawer][aria-hidden="false"]').forEach(drawer => drawer.setAttribute('aria-hidden', 'true'));
  };
  window.esfeOpenNotification = window.esfeOpenNotification || function(button) {
    const widget = button.closest('[data-notification-widget]');
    const drawer = widget.querySelector('[data-notification-drawer]');
    const body = widget.querySelector('[data-notification-drawer-body]');
    const url = button.dataset.notificationDetailUrl;
    if (!drawer || !body || !url) return;
    widget.classList.remove('is-open');
    drawer.setAttribute('aria-hidden', 'false');
    body.textContent = 'Chargement de la notification…';
    fetch(url, {headers: {'X-Requested-With': 'XMLHttpRequest', 'HX-Request': 'true'}, credentials: 'same-origin'})
      .then(response => { if (!response.ok) throw new Error(); return response.text(); })
      .then(html => {
        body.innerHTML = html;
        button.classList.remove('is-unread'); button.classList.add('is-read');
        document.body.dispatchEvent(new CustomEvent('notification.read'));
      })
      .catch(() => { body.textContent = 'Impossible de charger cette notification.'; });
  };
</script>
{% include "notification_center/partials/realtime.html" %}
