<div class="space-y-6">

<h3 class="text-lg font-semibold text-primary-700 flex items-center gap-2">
<i data-lucide="activity" class="w-5 h-5"></i>
Activité récente
</h3>

<div class="space-y-4">

{% for answer in answers %}

<a href="{{ answer.topic.get_absolute_url }}"
   class="block bg-white border border-primary-100 rounded-xl p-4 hover:bg-primary-50 transition shadow-sm hover:shadow-md">

<div class="flex items-start justify-between gap-4">

<div class="flex-1">

<div class="text-primary-700 font-medium">
{{ answer.topic.title }}
</div>

<div class="flex flex-wrap items-center gap-3 mt-2 text-xs text-gray-500">

<span class="flex items-center gap-1">
<i data-lucide="reply" class="w-3 h-3"></i>
Réponse publiée
</span>

<span class="flex items-center gap-1">
<i data-lucide="clock" class="w-3 h-3"></i>
{{ answer.created_at|timesince }} ago
</span>

<span class="flex items-center gap-1 text-blue-600">
<i data-lucide="thumbs-up" class="w-3 h-3"></i>
{{ answer.upvotes }}
</span>

</div>

</div>

<div class="flex flex-col items-center text-xs text-gray-500">

<div class="flex items-center gap-1">
<i data-lucide="message-square" class="w-4 h-4"></i>
{{ answer.topic.answers.count }}
</div>

<div>réponses</div>

</div>

</div>

</a>

{% empty %}

<div class="bg-white border rounded-xl p-6 text-center text-gray-400">
<i data-lucide="inbox" class="mx-auto mb-2"></i>
Aucune activité récente.
</div>

{% endfor %}

</div>

</div>
