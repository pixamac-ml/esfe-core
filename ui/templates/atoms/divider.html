{% if label %}
  <div class="flex items-center gap-3">
    <span class="h-px flex-1 bg-[color:var(--line)]"></span>
    <span class="text-[11px] font-bold uppercase tracking-wide text-[color:var(--muted-2)]">{{ label }}</span>
    <span class="h-px flex-1 bg-[color:var(--line)]"></span>
  </div>
{% else %}
  <div class="h-px bg-[color:var(--line)]"></div>
{% endif %}
