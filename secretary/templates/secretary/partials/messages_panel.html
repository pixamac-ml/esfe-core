<div class="message-list">
    {% for message in recent_messages %}
        <div class="message chat-bubble">
            <strong>{{ message.get_actor_display_name }}</strong><br>
            <span class="help-text">{{ message.get_notification_type_display }} | {{ message.created_at|date:"d/m/Y H:i" }}</span>
        </div>
    {% empty %}
        <div class="message">Aucun message recent.</div>
    {% endfor %}
</div>
