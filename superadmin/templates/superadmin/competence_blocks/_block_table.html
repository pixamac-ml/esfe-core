<table class="data-table">
    <thead>
        <tr>
            <th>Programme</th>
            <th>Titre</th>
            <th>Description</th>
            <th>Ordre</th>
            <th class="text-right">Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for block in blocks %}
        <tr>
            <td>{{ block.programme.title }}</td>
            <td>{{ block.title }}</td>
            <td>{{ block.description|default:'-'|truncatechars:90 }}</td>
            <td>{{ block.order }}</td>
            <td class="text-right">
                <div class="inline-flex gap-2">
                    <a href="{% url 'superadmin:competence_block_edit' block.pk %}" class="btn btn-outline btn-sm">Modifier</a>
                    <form method="post" action="{% url 'superadmin:competence_block_delete' block.pk %}" onsubmit="return confirm('Supprimer ce bloc ?');">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger btn-sm">Supprimer</button>
                    </form>
                </div>
            </td>
        </tr>
        {% empty %}
        <tr><td colspan="5" class="py-10 text-center text-slate-500">Aucun bloc de competences.</td></tr>
        {% endfor %}
    </tbody>
</table>
