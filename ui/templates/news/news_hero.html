<section
  x-data="{ show: false }"
  x-intersect:enter.threshold.20.once="show = true"
  class="relative overflow-hidden
         bg-gradient-to-br
         from-primary-800
         via-primary
         to-primary-900
         text-white">

  <!-- Pattern identique à formations -->
  <div class="absolute inset-0 opacity-[0.05]">
    <svg class="w-full h-full" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="dot-pattern-news" width="50" height="50" patternUnits="userSpaceOnUse">
          <circle cx="2" cy="2" r="1.5" fill="white"/>
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#dot-pattern-news)" />
    </svg>
  </div>

  <div class="absolute inset-0 bg-gradient-to-t from-primary-900/40 to-transparent"></div>

  <div class="relative max-w-7xl mx-auto px-6 py-32">

    <div class="max-w-4xl space-y-10">

      <!-- Badge -->
      <div
        x-show="show"
        x-transition:enter="transition ease-out duration-700"
        x-transition:enter-start="opacity-0 translate-y-6"
        x-transition:enter-end="opacity-100 translate-y-0"
        class="inline-flex items-center gap-3
               bg-white/10 backdrop-blur-sm
               px-6 py-3 rounded-full
               text-xs uppercase tracking-wider font-medium">

        <span class="w-2 h-2 bg-secondary rounded-full"></span>
        Communication officielle
      </div>

      <!-- H1 -->
      <h1
        x-show="show"
        x-transition:enter="transition ease-out duration-900 delay-150"
        x-transition:enter-start="opacity-0 translate-y-8"
        x-transition:enter-end="opacity-100 translate-y-0"
        class="text-5xl md:text-6xl font-extrabold leading-tight tracking-tight">

        Actualités
        <span class="block text-white">
          & Communiqués Institutionnels
        </span>
      </h1>

      <!-- Description -->
      <p
        x-show="show"
        x-transition:enter="transition ease-out duration-900 delay-300"
        x-transition:enter-start="opacity-0 translate-y-8"
        x-transition:enter-end="opacity-100 translate-y-0"
        class="text-lg md:text-xl text-white/85 leading-relaxed max-w-3xl">

        {{ subtitle }}
      </p>

      <!-- Micro-indicateurs -->
      <div
        x-show="show"
        x-transition:enter="transition ease-out duration-900 delay-500"
        x-transition:enter-start="opacity-0 translate-y-6"
        x-transition:enter-end="opacity-100 translate-y-0"
        class="pt-8 flex flex-wrap gap-8 text-sm text-white/80">

        <div class="flex items-center gap-3">
          <span class="w-2 h-2 bg-secondary rounded-full"></span>
          Informations académiques
        </div>

        <div class="flex items-center gap-3">
          <span class="w-2 h-2 bg-secondary rounded-full"></span>
          Décisions administratives
        </div>

        <div class="flex items-center gap-3">
          <span class="w-2 h-2 bg-secondary rounded-full"></span>
          Partenariats institutionnels
        </div>

      </div>

    </div>

  </div>

</section>
