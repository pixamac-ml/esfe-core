{% extends "superadmin/base.html" %}

{% block page_title %}{{ page_title }}{% endblock %}
{% block page_subtitle %}Associer un document requis a un programme{% endblock %}

{% block content_main %}
<div class="max-w-3xl">
    <div class="card">
        <div class="card-body">
            <form method="post" class="space-y-4">
                {% csrf_token %}

                <label class="block text-sm text-slate-700">
                    <span class="block mb-1 font-medium">Programme</span>
                    <select name="programme" class="w-full rounded-lg border border-slate-300 px-3 py-2" required>
                        <option value="">Selectionner</option>
                        {% for p in programmes %}
                        <option value="{{ p.pk }}">{{ p.title }}</option>
                        {% endfor %}
                    </select>
                </label>

                <label class="block text-sm text-slate-700">
                    <span class="block mb-1 font-medium">Document requis</span>
                    <select name="document" class="w-full rounded-lg border border-slate-300 px-3 py-2" required>
                        <option value="">Selectionner</option>
                        {% for d in documents %}
                        <option value="{{ d.pk }}">{{ d.name }}</option>
                        {% endfor %}
                    </select>
                </label>

                <div class="flex justify-end gap-2 pt-2">
                    <a href="{% url 'superadmin:programme_required_document_list' %}" class="btn btn-outline">Annuler</a>
                    <button type="submit" class="btn btn-primary">Associer</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
