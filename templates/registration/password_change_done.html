{% extends "base.html" %}
{% block content %}

<section class="bg-soft min-h-screen py-20">
    <div class="max-w-xl mx-auto px-4">

        <div class="bg-white p-12 rounded-2xl shadow border border-primary-100 text-center">

            <!-- Icône succès -->
            <div class="mb-8">
                <div class="w-20 h-20 mx-auto bg-green-100 text-green-600 rounded-full flex items-center justify-center text-3xl">
                    ✓
                </div>
            </div>

            <h2 class="text-2xl font-bold text-primary-700 mb-4">
                Mot de passe modifié avec succès
            </h2>

            <p class="text-gray-600 leading-relaxed mb-10">
                Votre mot de passe a été mis à jour.
                Pour garantir la sécurité de votre compte, évitez d’utiliser le même mot de passe sur plusieurs plateformes.
            </p>

            <div class="flex flex-wrap justify-center gap-4">

                <a href="{% url 'accounts:profile' %}"
                   class="bg-primary-500 hover:bg-primary-600 text-white px-6 py-3 rounded-xl font-semibold transition shadow-md">
                    Retour au profil
                </a>

                <a href="{% url 'community:topic_list' %}"
                   class="bg-secondary hover:bg-secondary-dark text-white px-6 py-3 rounded-xl font-semibold transition shadow-md">
                    Aller à la communauté
                </a>

            </div>

        </div>

    </div>
</section>

{% endblock %}
