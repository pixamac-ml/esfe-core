<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard DG — Maquette Complète</title>
<script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f6f8fc; color: #0f172a; overflow: hidden; }
  canvas { display: block; max-width: 100%; }

  .dg-shell { display: flex; height: 100vh; min-height: 0; overflow: hidden; }

  /* SIDEBAR */
  .dg-sidebar { width: 270px; height: 100vh; flex: 0 0 270px; background: linear-gradient(180deg, #08172d 0%, #081b36 48%, #061326 100%); color: #fff; overflow: hidden; }
  .dg-logo { height: 78px; padding: 0 20px; display: flex; align-items: center; border-bottom: 1px solid rgba(255,255,255,.1); }
  .dg-logo-mark { width: 40px; height: 40px; background: linear-gradient(135deg, #2563eb, #4f46e5); border-radius: 10px; display: grid; place-items: center; }
  .dg-logo-text { font-size: 1.1rem; font-weight: 900; letter-spacing: -.02em; }
  .dg-logo-sub { font-size: .65rem; font-weight: 600; color: #94a3b8; margin-top: 1px; }
  .dg-sidebar-scroll { height: calc(100vh - 78px); overflow-y: auto; overflow-x: hidden; padding: 1rem .75rem; }
  .dg-cluster-label { font-size: .6rem; font-weight: 900; text-transform: uppercase; letter-spacing: .18em; color: #475569; padding: .5rem .5rem .2rem; }
  .dg-link { display: flex; align-items: center; gap: .75rem; min-height: 42px; padding: .5rem .75rem; border-radius: .75rem; color: #94a3b8; font-size: .82rem; font-weight: 700; cursor: pointer; transition: background .15s, color .15s; width: 100%; border: none; background: none; text-align: left; }
  .dg-link:hover { background: rgba(255,255,255,.06); color: #fff; }
  .dg-link.active { background: linear-gradient(135deg, #3257ff, #4f46e5); color: #fff; box-shadow: 0 8px 20px rgba(37,99,235,.25); }
  .dg-badge { margin-left: auto; font-size: .6rem; font-weight: 950; padding: .15rem .45rem; border-radius: 999px; }
  .dg-badge-red { background: #f43f5e; color: #fff; }
  .dg-badge-blue { background: #2563eb; color: #fff; }
  .dg-badge-amber { background: #f59e0b; color: #fff; }
  .dg-sidebar-divider { height: 1px; background: rgba(255,255,255,.08); margin: .5rem 0; }
  .dg-logout { margin-top: auto; }
  .dg-logout-btn { display: flex; align-items: center; gap: .75rem; min-height: 42px; padding: .5rem .75rem; border-radius: .75rem; color: #fca5a5; font-size: .82rem; font-weight: 700; width: 100%; cursor: pointer; background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.2); }

  /* MAIN */
  .dg-main { flex: 1; min-width: 0; min-height: 0; height: 100vh; display: flex; flex-direction: column; }

  /* TOPBAR */
  .dg-topbar { min-height: 72px; border-bottom: 1px solid #e2e8f0; background: rgba(255,255,255,.97); padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; gap: 18px; position: sticky; top: 0; z-index: 40; }
  .dg-topbar-left { display: flex; align-items: center; gap: 1rem; min-width: 0; }
  .dg-topbar-right { display: flex; align-items: center; gap: .75rem; flex-shrink: 0; }
  .dg-btn-icon { width: 44px; height: 44px; border: 1px solid #e2e8f0; border-radius: .75rem; background: #fff; display: grid; place-items: center; cursor: pointer; color: #475569; transition: background .15s; flex-shrink: 0; }
  .dg-btn-icon:hover { background: #f8fafc; }
  .dg-avatar { height: 44px; display: flex; align-items: center; gap: .75rem; border: 1px solid #e2e8f0; border-radius: .85rem; background: #fff; padding: .35rem .65rem .35rem .45rem; }
  .dg-avatar-img { width: 36px; height: 36px; border-radius: 999px; background: linear-gradient(135deg, #2563eb, #4f46e5); display: grid; place-items: center; color: #fff; font-weight: 900; font-size: .8rem; }
  .dg-filter { height: 44px; min-width: 150px; border: 1px solid #dbe3ef; border-radius: .7rem; background: #fff; padding: .4rem .75rem; display: flex; align-items: center; }
  .dg-filter select { width: 100%; border: 0; outline: 0; background: transparent; color: #0f172a; font-size: .82rem; font-weight: 700; }
  .dg-search { height: 44px; min-width: 240px; display: flex; align-items: center; gap: .5rem; border: 1px solid #dbe3ef; border-radius: .85rem; background: #fff; padding: 0 .9rem; }
  .dg-search input { border: 0; outline: 0; background: transparent; width: 100%; font-size: .85rem; font-weight: 600; }

  /* CONTENT */
  .dg-scroll-area { flex: 1 1 auto; min-height: 0; overflow-y: auto; overflow-x: hidden; }
  .dg-content-wrap { width: 100%; padding: 20px 24px; }
  .dg-section-block { margin-bottom: 20px; }
  .dg-section-block:last-child { margin-bottom: 0; }
  .dg-scope-bar { display: flex; align-items: center; gap: .5rem; flex-wrap: wrap; margin-bottom: 20px; }
  .dg-scope-chip { background: #fff; border: 1px solid #e2e8f0; border-radius: .5rem; padding: .4rem .75rem; font-size: .72rem; font-weight: 700; color: #475569; }

  /* TABS NAV */
  .dg-nav-tabs { display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap; }
  .dg-nav-tab { padding: .45rem .9rem; border-radius: .6rem; border: 1px solid #e2e8f0; background: #fff; font-size: .75rem; font-weight: 800; color: #64748b; cursor: pointer; transition: all .15s; }
  .dg-nav-tab:hover { background: #f1f5f9; }
  .dg-nav-tab.active { background: #2563eb; color: #fff; border-color: #2563eb; }

  /* PANELS */
  .dg-panel { background: #fff; border: 1px solid #dfe7f3; border-radius: 16px; padding: 18px; box-shadow: 0 4px 16px rgba(15,23,42,.04); }
  .dg-panel-title { font-size: .75rem; font-weight: 900; text-transform: uppercase; letter-spacing: .12em; color: #64748b; margin-bottom: 14px; }
  .dg-section-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
  .dg-section-header-title { font-size: .9rem; font-weight: 900; color: #0f172a; }
  .dg-section-header-sub { font-size: .72rem; color: #94a3b8; margin-top: 2px; }

  /* KPI GRID */
  .dg-kpi-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 14px; margin-bottom: 16px; overflow: hidden; }
  .dg-kpi-card { background: #fff; border: 1px solid #dfe7f3; border-radius: 16px; padding: 18px; min-height: 152px; position: relative; overflow: hidden; cursor: pointer; }
  .dg-kpi-card:hover { box-shadow: 0 8px 24px rgba(15,23,42,.08); }
  .dg-kpi-icon-wrap { position: absolute; right: 14px; top: 14px; width: 44px; height: 44px; border-radius: 999px; display: grid; place-items: center; font-size: .95rem; }
  .dg-kpi-label { font-size: .7rem; font-weight: 900; text-transform: uppercase; letter-spacing: .06em; }
  .dg-kpi-value { font-size: 1.9rem; font-weight: 900; color: #0f172a; line-height: 1.1; margin-top: .4rem; }
  .dg-kpi-detail { font-size: .65rem; font-weight: 700; color: #94a3b8; margin-top: .25rem; }
  .dg-kpi-trend { position: absolute; bottom: 8px; right: 8px; left: 8px; height: 30px; opacity: .85; }

  /* GRID LAYOUTS */
  .dg-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .dg-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  .dg-row-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }

  /* TABLE */
  .dg-table-wrap { overflow-x: auto; max-width: 100%; }
  .dg-table { width: min-content; min-width: 100%; border-collapse: collapse; }
  .dg-table th { padding: 9px 11px; border-bottom: 1px solid #e7edf6; background: #fbfcff; color: #64748b; font-size: .62rem; font-weight: 950; text-transform: uppercase; text-align: left; white-space: nowrap; }
  .dg-table td { padding: 11px 11px; border-bottom: 1px solid #f1f5f9; font-size: .78rem; white-space: nowrap; }
  .dg-table tr:hover td { background: #f8fbff; }
  .dg-table tr { cursor: pointer; }

  /* BADGES */
  .dg-badge-sm { font-size: .6rem; font-weight: 950; padding: .2rem .45rem; border-radius: 999px; white-space: nowrap; }
  .dg-badge-green { background: #dcfce7; color: #16a34a; }
  .dg-badge-red { background: #fee2e2; color: #ef4444; }
  .dg-badge-amber { background: #fef3c7; color: #d97706; }
  .dg-badge-blue { background: #dbeafe; color: #2563eb; }
  .dg-badge-gray { background: #f1f5f9; color: #64748b; }

  /* BARS */
  .dg-bar-item { margin-bottom: 8px; }
  .dg-bar-label { display: flex; justify-content: space-between; font-size: .68rem; font-weight: 700; color: #64748b; margin-bottom: 3px; }
  .dg-bar-track { height: 6px; background: #f1f5f9; border-radius: 999px; overflow: hidden; }
  .dg-bar-fill { height: 100%; border-radius: 999px; }

  /* PILLS */
  .dg-pill-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .dg-pill { border-radius: 10px; padding: 10px 12px; }
  .dg-pill-label { font-size: .6rem; font-weight: 800; text-transform: uppercase; }
  .dg-pill-value { font-size: 1.3rem; font-weight: 900; margin-top: 2px; }

  /* RISK ROWS */
  .dg-risk-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .dg-risk-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 10px; background: #f8fafc; border-radius: 8px; }
  .dg-risk-label { font-size: .72rem; font-weight: 700; color: #475569; }
  .dg-risk-val { font-size: .65rem; font-weight: 950; padding: .15rem .45rem; border-radius: 999px; }

  /* ACTION CARDS */
  .dg-action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .dg-action-card { display: flex; align-items: center; justify-content: space-between; border: 1px solid #dce6f3; border-radius: .75rem; background: #fff; padding: 10px 14px; cursor: pointer; transition: all .15s; }
  .dg-action-card:hover { border-color: #bfdbfe; background: #f8fbff; transform: translateY(-1px); }
  .dg-action-label { font-size: .78rem; font-weight: 800; }
  .dg-action-sub { font-size: .62rem; color: #94a3b8; font-weight: 600; margin-top: 1px; }
  .dg-action-count { font-size: .68rem; font-weight: 950; padding: .2rem .5rem; border-radius: 999px; flex-shrink: 0; }

  /* DONUT */
  .dg-donut-row { display: flex; gap: 16px; align-items: center; }
  .dg-donut-wrap { text-align: center; }
  .dg-donut-val { font-size: 1rem; font-weight: 900; color: #0f172a; }
  .dg-donut-lbl { font-size: .65rem; font-weight: 700; color: #64748b; }

  /* SECTION CONTENT */
  .dg-section-hero { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid #f1f5f9; }
  .dg-section-hero-title { font-size: 1.2rem; font-weight: 900; color: #0f172a; }
  .dg-section-hero-sub { font-size: .78rem; color: #64748b; margin-top: .2rem; }
  .dg-section-actions { display: flex; gap: 8px; }

  /* BUTTONS */
  .dg-btn { display: inline-flex; align-items: center; gap: .4rem; min-height: 36px; border-radius: .6rem; padding: 0 .85rem; font-size: .75rem; font-weight: 800; cursor: pointer; transition: all .15s; border: 1px solid; white-space: nowrap; }
  .dg-btn-primary { background: #2563eb; border-color: #2563eb; color: #fff; }
  .dg-btn-primary:hover { background: #1d4ed8; }
  .dg-btn-outline { background: #fff; border-color: #dbe3ef; color: #475569; }
  .dg-btn-outline:hover { background: #f8fafc; border-color: #bfdbfe; }
  .dg-btn-danger { background: #fff; border-color: #fecaca; color: #ef4444; }
  .dg-btn-danger:hover { background: #fef2f2; }
  .dg-btn-success { background: #fff; border-color: #bbf7d0; color: #16a34a; }
  .dg-btn-success:hover { background: #f0fdf4; }
  .dg-btn-warning { background: #fff; border-color: #fde68a; color: #d97706; }
  .dg-btn-warning:hover { background: #fffbeb; }

  /* FORMS */
  .dg-form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .dg-form-group { display: flex; flex-direction: column; gap: 4px; }
  .dg-form-label { font-size: .7rem; font-weight: 800; color: #475569; }
  .dg-form-input { height: 38px; border: 1px solid #dbe3ef; border-radius: .6rem; padding: 0 .75rem; font-size: .82rem; background: #fff; color: #0f172a; outline: none; transition: border-color .15s; }
  .dg-form-input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
  .dg-form-select { height: 38px; border: 1px solid #dbe3ef; border-radius: .6rem; padding: 0 .75rem; font-size: .82rem; background: #fff; color: #0f172a; outline: none; }

  /* STAT ROW */
  .dg-stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .dg-stat-box { text-align: center; padding: 12px; border-radius: 10px; }
  .dg-stat-val { font-size: 1.4rem; font-weight: 900; }
  .dg-stat-lbl { font-size: .62rem; font-weight: 800; text-transform: uppercase; margin-top: 2px; }

  /* EMPTY STATE */
  .dg-empty { text-align: center; padding: 32px 16px; color: #94a3b8; }
  .dg-empty-icon { font-size: 2rem; margin-bottom: 8px; opacity: .4; }
  .dg-empty-text { font-size: .8rem; font-weight: 700; }

  /* DIVIDER */
  .dg-divider { height: 1px; background: #f1f5f9; margin: 16px 0; }

  /* FOOTER */
  .dg-footer { text-align: center; padding: 10px; color: #94a3b8; font-size: .68rem; font-weight: 600; }

  /* RESPONSIVE */
  @media (max-width: 1200px) { .dg-kpi-grid { grid-template-columns: repeat(2, 1fr); } .dg-row-3 { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 768px) { .dg-sidebar { display: none; } .dg-kpi-grid { grid-template-columns: 1fr 1fr; } .dg-row-2, .dg-row-3, .dg-row-4 { grid-template-columns: 1fr; } .dg-risk-grid { grid-template-columns: 1fr 1fr; } }
</style>
</head>
<body>
<div class="dg-shell" x-data="{ section: 'overview' }">

  <!-- ======================== SIDEBAR ======================== -->
  <aside class="dg-sidebar">
    <div class="dg-logo">
      <div class="dg-logo-mark"><i class="fa-solid fa-user-doctor text-white"></i></div>
      <div style="margin-left: .75rem;">
        <div class="dg-logo-text">FELIX SANTE</div>
        <div class="dg-logo-sub">Ecole de Santé FHB - Mali</div>
      </div>
    </div>
    <div class="dg-sidebar-scroll">

      <div class="dg-cluster-label">Pilotage</div>
      <button type="button" :class="section === 'overview' ? 'dg-link active' : 'dg-link'" @click="section = 'overview'">
        <i class="fa-solid fa-home w-4 text-center"></i><span>Vue globale</span>
      </button>
      <button type="button" :class="section === 'analytics' ? 'dg-link active' : 'dg-link'" @click="section = 'analytics'">
        <i class="fa-solid fa-chart-line w-4 text-center"></i><span>Analytics</span>
      </button>
      <button type="button" :class="section === 'realtime' ? 'dg-link active' : 'dg-link'" @click="section = 'realtime'">
        <i class="fa-solid fa-wave-square w-4 text-center"></i><span>Temps réel</span>
        <span class="dg-badge dg-badge-blue">LIVE</span>
      </button>

      <div class="dg-sidebar-divider"></div>
      <div class="dg-cluster-label">Opérations</div>
      <button type="button" :class="section === 'alerts' ? 'dg-link active' : 'dg-link'" @click="section = 'alerts'">
        <i class="fa-solid fa-triangle-exclamation w-4 text-center"></i><span>Alertes & Risques</span>
        <span class="dg-badge dg-badge-red">12</span>
      </button>
      <button type="button" :class="section === 'workflows' ? 'dg-link active' : 'dg-link'" @click="section = 'workflows'">
        <i class="fa-solid fa-arrows-rotate w-4 text-center"></i><span>Passages & Réins.</span>
        <span class="dg-badge dg-badge-amber">7</span>
      </button>
      <button type="button" :class="section === 'schedule' ? 'dg-link active' : 'dg-link'" @click="section = 'schedule'">
        <i class="fa-regular fa-calendar-days w-4 text-center"></i><span>Emploi du temps</span>
      </button>

      <div class="dg-sidebar-divider"></div>
      <div class="dg-cluster-label">Ressources</div>
      <button type="button" :class="section === 'annexes' ? 'dg-link active' : 'dg-link'" @click="section = 'annexes'">
        <i class="fa-regular fa-building w-4 text-center"></i><span>Annexes</span>
      </button>
      <button type="button" :class="section === 'rh' ? 'dg-link active' : 'dg-link'" @click="section = 'rh'">
        <i class="fa-solid fa-user-group w-4 text-center"></i><span>RH / Staff</span>
      </button>

      <div class="dg-sidebar-divider"></div>
      <div class="dg-cluster-label">Finance</div>
      <button type="button" :class="section === 'finance' ? 'dg-link active' : 'dg-link'" @click="section = 'finance'">
        <i class="fa-solid fa-sack-dollar w-4 text-center"></i><span>Finance</span>
      </button>

      <div class="dg-sidebar-divider"></div>
      <div class="dg-logout">
        <button type="button" class="dg-logout-btn">
          <i class="fa-solid fa-arrow-right-from-bracket w-4 text-center"></i><span>Déconnexion</span>
        </button>
      </div>
    </div>
  </aside>

  <!-- ======================== MAIN ======================== -->
  <main class="dg-main">
    <header class="dg-topbar">
      <div class="dg-topbar-left">
        <button type="button" class="dg-btn-icon"><i class="fa-solid fa-bars-staggered"></i></button>
        <div>
          <div style="font-size: 1.1rem; font-weight: 900; color: #0f172a;">Dr. Boubacar Koné</div>
          <div style="font-size: .72rem; font-weight: 600; color: #94a3b8;">Directeur Exécutif — Mai 2026</div>
        </div>
      </div>
      <div class="dg-topbar-right">
        <div class="dg-search">
          <i class="fa-solid fa-magnifying-glass" style="color:#94a3b8;"></i>
          <input type="search" placeholder="Rechercher...">
        </div>
        <div class="dg-filter">
          <select><option>Toutes les annexes</option><option>Bamako</option><option>Ségou</option><option>Mopti</option></select>
        </div>
        <div class="dg-filter">
          <select><option>Ce mois</option><option>Cette semaine</option><option>Aujourd'hui</option></select>
        </div>
        <button type="button" class="dg-btn-icon" title="Actualiser"><i class="fa-solid fa-rotate-right"></i></button>
        <button type="button" class="dg-btn-icon" style="position:relative;">
          <i class="fa-regular fa-bell"></i>
          <span style="position:absolute; top:-4px; right:-4px; width:18px; height:18px; background:#f43f5e; color:#fff; font-size:.55rem; font-weight:950; border-radius:999px; display:grid; place-items:center;">12</span>
        </button>
        <div class="dg-avatar">
          <div>
            <div style="font-size:.8rem; font-weight:900; color:#0f172a;">Dr. Boubacar Koné</div>
            <div style="font-size:.62rem; font-weight:600; color:#94a3b8;">DG</div>
          </div>
          <div class="dg-avatar-img">BK</div>
        </div>
      </div>
    </header>

    <div class="dg-scroll-area">
    <div class="dg-content-wrap">

      <!-- SCOPE BAR -->
      <div class="dg-scope-bar">
        <span class="dg-scope-chip"><i class="fa-solid fa-globe" style="margin-right:4px;"></i>Toutes les annexes</span>
        <span class="dg-scope-chip"><i class="fa-solid fa-building" style="margin-right:4px;"></i>6 annexes</span>
        <span class="dg-scope-chip"><i class="fa-solid fa-users" style="margin-right:4px;"></i>1 847 étudiants</span>
        <span class="dg-scope-chip"><i class="fa-solid fa-calendar" style="margin-right:4px;"></i>218 cours / semaine</span>
      </div>

      <!-- NAV TABS -->
      <div class="dg-nav-tabs">
        <template x-for="s in ['overview','alerts','workflows','schedule','annexes','finance','rh','analytics','realtime']" :key="s">
          <button type="button" :class="section === s ? 'dg-nav-tab active' : 'dg-nav-tab'" @click="section = s" x-text="{
            overview:'Vue globale',alerts:'Alertes',workflows:'Passages',schedule:'EDT',
            annexes:'Annexes',finance:'Finance',rh:'RH',analytics:'Analytics',realtime:'Temps réel'
          }[s]"></button>
        </template>
      </div>

      <!-- ======================== SECTION: OVERVIEW ======================== -->
      <template x-if="section === 'overview'">
      <div>
        <!-- KPIs -->
        <div class="dg-kpi-grid">
          <div class="dg-kpi-card" style="border-top: 3px solid #2563eb;">
            <div class="dg-kpi-icon-wrap" style="background:#eff6ff; color:#2563eb;"><i class="fa-solid fa-users"></i></div>
            <div class="dg-kpi-label" style="color:#2563eb;">Étudiants</div>
            <div class="dg-kpi-value">1 847</div>
            <div class="dg-kpi-detail">Inscrits 2026</div>
          </div>
          <div class="dg-kpi-card" style="border-top: 3px solid #16a34a;">
            <div class="dg-kpi-icon-wrap" style="background:#f0fdf4; color:#16a34a;"><i class="fa-solid fa-sack-dollar"></i></div>
            <div class="dg-kpi-label" style="color:#16a34a;">Revenus</div>
            <div class="dg-kpi-value" style="color:#16a34a;">45.2M</div>
            <div class="dg-kpi-detail">FCFA ce mois</div>
          </div>
