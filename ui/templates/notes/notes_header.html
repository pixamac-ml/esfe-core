<div class="sheet-summary">
  <div>
    <h3>Gestion des notes</h3>
    <p>{{ rows|length }} etudiant(s) affiches. Scroll horizontal et colonnes fixes actifs.</p>
  </div>
  <div class="sheet-meta">
    <span class="meta-chip">{{ academic_class.display_name|default:academic_class }}</span>
    <span class="meta-chip">Semestre {{ semester.number }}</span>
    <span class="meta-chip">Session {{ active_session_label }}</span>
    <span class="meta-chip status-chip">{{ workflow_badge.icon|safe }} {{ workflow_badge.label }}</span>
  </div>
</div>
