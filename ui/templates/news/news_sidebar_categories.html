<div class="bg-white p-6 rounded-2xl shadow-sm border border-primary-50">

    <h3 class="text-sm font-semibold uppercase tracking-wide text-gray-500 mb-6 flex items-center gap-2">
        <i class="fa-solid fa-layer-group text-primary-500"></i>
        Catégories
    </h3>

    <ul class="space-y-3 text-sm">
        <li>
            <a
                hx-get="{% url 'news:list' %}?{% if current_search %}q={{ current_search|urlencode }}&{% endif %}"
                hx-target="#news-content"
                hx-swap="outerHTML"
                hx-push-url="true"
                hx-indicator="#news-loading"
                class="block px-3 py-2 rounded-lg transition {% if not current_category %}bg-primary-50 text-primary-600 font-medium{% else %}text-gray-600 hover:bg-primary-50 hover:text-primary-600{% endif %}">
                <i class="fa-regular fa-newspaper mr-2"></i>
                Toutes les actualites
            </a>
        </li>
        {% for cat in categories %}
        <li>
            <a
                hx-get="{% url 'news:list' %}?category={{ cat.slug }}{% if current_search %}&q={{ current_search|urlencode }}{% endif %}"
                hx-target="#news-content"
                hx-swap="outerHTML"
                hx-push-url="true"
                hx-indicator="#news-loading"
                class="block px-3 py-2 rounded-lg transition
                {% if current_category == cat.slug %}
                    bg-primary-50 text-primary-600 font-medium
                {% else %}
                    text-gray-600 hover:bg-primary-50 hover:text-primary-600
                {% endif %}">
                <i class="fa-solid fa-tag mr-2 text-primary-400"></i>
                {{ cat.nom }}
            </a>
        </li>
        {% endfor %}
    </ul>

</div>
