{% load static %}

{% if is_subscribed %}
    <!-- BOUTON DÉSABONNEMENT -->
    <form hx-post="{% url 'community:unsubscribe_category' category.slug %}"
          hx-target="#subscribe-btn-{{ category.slug }}"
          hx-swap="innerHTML"
          class="inline">
        {% csrf_token %}
        <button type="submit"
                class="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium
                       bg-gray-100 text-gray-600 hover:bg-red-50 hover:text-red-600
                       transition-all duration-200 border border-gray-200 hover:border-red-200">
            <svg xmlns="http://www.w3.org/2000/svg"
                 class="h-4 w-4"
                 fill="none"
                 viewBox="0 0 24 24"
                 stroke="currentColor">
                <path stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M5 13l4 4L19 7"/>
            </svg>
            Abonné
        </button>
    </form>
{% else %}
    <!-- BOUTON ABONNEMENT -->
    <form hx-post="{% url 'community:subscribe_category' category.slug %}"
          hx-target="#subscribe-btn-{{ category.slug }}"
          hx-swap="innerHTML"
          class="inline">
        {% csrf_token %}
        <button type="submit"
                class="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium
                       bg-primary-600 text-white hover:bg-primary-700
                       transition-all duration-200 shadow-sm hover:shadow-md">
            <svg xmlns="http://www.w3.org/2000/svg"
                 class="h-4 w-4"
                 fill="none"
                 viewBox="0 0 24 24"
                 stroke="currentColor">
                <path stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M12 4v16m8-8H4"/>
            </svg>
            S'abonner
        </button>
    </form>
{% endif %}
