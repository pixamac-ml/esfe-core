<div class="sg-panel">
  <div class="sg-panel-title"><i class="fa-regular fa-clock" style="margin-right:6px;"></i>Aujourd'hui</div>
  {% if today_events %}
    <div class="message-list">
      {% for event in today_events %}
      <div class="sg-action-card">
        <div><div class="sg-action-label">{{ event.title }}</div><div class="sg-action-sub">{{ event.class_name }} · {{ event.time_range }} · {{ event.location|default:"-" }}</div></div>
        <button type="button" class="sg-btn sg-btn-primary" hx-get="{% url 'accounts_portal:teacher_lesson_log_panel' event.id %}" hx-target="#sg-drawer-content" hx-swap="innerHTML" style="min-height:28px;font-size:.65rem;">
          <i class="fa-solid fa-pen"></i>Cahier
        </button>
      </div>
      {% endfor %}
    </div>
  {% else %}
    <div class="sg-empty" style="padding:24px 0;">
      <div class="sg-empty-text" style="font-size:.85rem;">Aucun cours prevu aujourd'hui.</div>
    </div>
  {% endif %}
</div>
