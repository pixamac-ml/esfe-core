{% load component_tags %}
<select
  id="{{ id }}"
  name="{{ name }}"
  hx-get="{{ hx_get }}"
  hx-target="{{ hx_target }}"
  hx-include="this"
  hx-push-url="true"
  hx-trigger="change"
  hx-indicator="#topbar-loader"
>
  <option value="">{{ placeholder }}</option>
  {% for item in items %}
  <option value="{{ item.id }}" {% if selected_id|stringformat:"s" == item.id|stringformat:"s" %}selected{% endif %}>{{ item.label }} ({{ item.student_count }})</option>
  {% endfor %}
</select>
