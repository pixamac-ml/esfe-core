<div class="space-y-5">
  <div class="rounded-[28px] border border-slate-200 bg-gradient-to-br from-slate-50 via-white to-blue-50 p-5 shadow-sm">
    <p class="portal-section-kicker">Validation</p>
    <h3 class="mt-2 text-2xl font-black text-slate-900">{{ result_panel_title }}</h3>
    <p class="mt-2 text-sm font-semibold text-slate-500">{{ result_panel_subtitle }}</p>
    {% if selected_class %}
      <div class="mt-4 flex flex-wrap gap-2">
        <span class="rounded-full bg-white px-3 py-2 text-xs font-black text-slate-700 ring-1 ring-slate-200">{{ selected_class.display_name }}</span>
        {% if selected_semester %}
          <span class="rounded-full bg-blue-600 px-3 py-2 text-xs font-black text-white">Semestre {{ selected_semester.number }}</span>
        {% endif %}
      </div>
    {% endif %}
  </div>
  <div class="rounded-[28px] bg-white">
    {% include "portal/staff/director/partials/panels/result_semester_panel.html" %}
  </div>
</div>
