<div class="bg-white p-6 rounded-xl shadow">
    <h3 class="font-semibold mb-4 text-lg">Catégories</h3>

    <ul class="space-y-2 text-sm text-gray-600">
        {% for cat in categories %}
        <li>
            <a href="?category={{ cat.slug }}"
               class="{% if current_category == cat.slug %}text-blue-600 font-semibold{% else %}hover:text-blue-600{% endif %}">
                {{ cat.nom }}
            </a>
        </li>
        {% endfor %}
    </ul>
</div>
