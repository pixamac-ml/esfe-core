<form method="post"
      action="{{ article.get_absolute_url }}"
      class="space-y-6">

  {% csrf_token %}

  <!-- Honeypot anti-spam -->
  <input type="text"
         name="website"
         class="hidden"
         autocomplete="off">

  <div>
    <label class="block text-sm font-medium text-gray-700 mb-2">
      Votre nom
    </label>
    <input type="text"
           name="author_name"
           required
           class="w-full rounded-lg border border-gray-300 px-4 py-3
                  focus:ring-2 focus:ring-[#0f2c59] focus:border-[#0f2c59]
                  transition">
  </div>

  <div>
    <label class="block text-sm font-medium text-gray-700 mb-2">
      Votre email
    </label>
    <input type="email"
           name="author_email"
           required
           class="w-full rounded-lg border border-gray-300 px-4 py-3
                  focus:ring-2 focus:ring-[#0f2c59] focus:border-[#0f2c59]
                  transition">
  </div>

  <div>
    <label class="block text-sm font-medium text-gray-700 mb-2">
      Votre commentaire
    </label>
    <textarea name="content"
              rows="5"
              required
              class="w-full rounded-lg border border-gray-300 px-4 py-3
                     focus:ring-2 focus:ring-[#0f2c59] focus:border-[#0f2c59]
                     transition resize-none"></textarea>
  </div>

  <div class="flex justify-end">
    <button type="submit"
            class="bg-[#0f2c59] text-white px-6 py-3 rounded-lg
                   font-medium hover:bg-[#0c2347]
                   transition">
      Publier le commentaire
    </button>
  </div>

</form>
