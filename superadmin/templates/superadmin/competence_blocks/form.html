{% extends "superadmin/base.html" %}

{% block page_title %}{{ page_title }}{% endblock %}
{% block page_subtitle %}Edition d'un bloc de competences{% endblock %}

{% block content_main %}
<div class="max-w-3xl">
    <div class="card">
        <div class="card-body">
            <form method="post" class="space-y-4">
                {% csrf_token %}
                <label class="block text-sm text-slate-700">
                    <span class="block mb-1 font-medium">Programme</span>
                    <select name="programme" class="w-full rounded-lg border border-slate-300 px-3 py-2" required>
                        <option value="">Selectionner</option>
                        {% for p in programmes %}
                        <option value="{{ p.pk }}" {% if block.programme_id == p.pk %}selected{% endif %}>{{ p.title }}</option>
                        {% endfor %}
                    </select>
                </label>
                <label class="block text-sm text-slate-700">
                    <span class="block mb-1 font-medium">Titre</span>
                    <input type="text" name="title" value="{{ block.title|default:'' }}" class="w-full rounded-lg border border-slate-300 px-3 py-2" required>
                </label>
                <label class="block text-sm text-slate-700">
                    <span class="block mb-1 font-medium">Description</span>
                    <textarea name="description" rows="5" class="w-full rounded-lg border border-slate-300 px-3 py-2">{{ block.description|default:'' }}</textarea>
                </label>
                <label class="block text-sm text-slate-700">
                    <span class="block mb-1 font-medium">Ordre</span>
                    <input type="number" name="order" value="{{ block.order|default:'0' }}" class="w-full rounded-lg border border-slate-300 px-3 py-2">
                </label>
                <div class="flex justify-end gap-2 pt-2">
                    <a href="{% url 'superadmin:competence_block_list' %}" class="btn btn-outline">Annuler</a>
                    <button type="submit" class="btn btn-primary">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
