<div class="flex flex-wrap items-center gap-4 border-b border-primary-100 mb-8 pb-2">

<button
class="profile-tab flex items-center gap-2 px-4 py-2 text-sm font-medium border-b-2 border-primary-600 text-primary-700 hover:text-primary-600 hover:border-primary-300 transition"
hx-get="{% url 'community:profile_activity' profile_user.username %}"
hx-target="#profile-content"
hx-swap="innerHTML"
hx-push-url="true"
hx-indicator="#profile-tab-loader">

<i data-lucide="activity" class="w-4 h-4"></i>
Activité

</button>


<button
class="profile-tab flex items-center gap-2 px-4 py-2 text-sm font-medium border-b-2 border-transparent hover:text-primary-600 hover:border-primary-300 transition"
hx-get="{% url 'community:profile_answers' profile_user.username %}"
hx-target="#profile-content"
hx-swap="innerHTML"
hx-push-url="true"
hx-indicator="#profile-tab-loader">

<i data-lucide="reply" class="w-4 h-4"></i>
Réponses

</button>


<button
class="profile-tab flex items-center gap-2 px-4 py-2 text-sm font-medium border-b-2 border-transparent hover:text-primary-600 hover:border-primary-300 transition"
hx-get="{% url 'community:profile_topics' profile_user.username %}"
hx-target="#profile-content"
hx-swap="innerHTML"
hx-push-url="true"
hx-indicator="#profile-tab-loader">

<i data-lucide="message-square" class="w-4 h-4"></i>
Sujets

</button>


<button
class="profile-tab flex items-center gap-2 px-4 py-2 text-sm font-medium border-b-2 border-transparent hover:text-primary-600 hover:border-primary-300 transition"
hx-get="{% url 'community:profile_badges' profile_user.username %}"
hx-target="#profile-content"
hx-swap="innerHTML"
hx-push-url="true"
hx-indicator="#profile-tab-loader">

<i data-lucide="award" class="w-4 h-4"></i>
Badges

</button>

</div>

<div id="profile-tab-loader" class="htmx-indicator text-xs text-primary-500 mb-3">Chargement...</div>
