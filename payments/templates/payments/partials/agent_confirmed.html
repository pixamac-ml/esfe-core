<!-- ============================================ -->
<!-- AGENT CONFIRMED - Agent vérifié avec succès -->
<!-- Le code de vérification n'est PAS affiché pour des raisons de sécurité -->
<!-- ============================================ -->

<div id="agent-result" class="mt-2">
    <div class="flex items-center gap-2 text-sm text-secondary bg-secondary/10 border border-secondary/20 rounded-lg px-3 py-2">
        <div class="w-6 h-6 bg-secondary/20 rounded-full flex items-center justify-center flex-shrink-0">
            <svg class="w-4 h-4 text-secondary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
            </svg>
        </div>
        <div>
            <span class="font-medium text-gray-900">{{ agent.user.get_full_name }}</span>
            <span class="text-secondary ml-1">(Agent vérifié)</span>
        </div>
    </div>

    {% if session %}
    <div class="mt-3 p-3 bg-primary-50 border border-primary-200 rounded-lg">
        <p class="text-sm text-primary-800">
            <strong>Demande de paiement créée</strong>
        </p>
        <p class="text-xs text-primary-600 mt-1">
            Votre demande est en attente de validation par l'agent.
            <br>Un reçu vous sera délivré une fois le paiement confirmé.
        </p>
    </div>
    {% endif %}
</div>
