{% load humanize %}
<div class="space-y-3">
  <p class="text-xs font-bold uppercase tracking-wide text-[color:var(--muted)]">Mon panier</p>
  {% if pending_orders %}
    <div class="space-y-2">
      {% for order in pending_orders %}
        <button type="button"
           hx-get="{% url 'shop:student_order_detail' order.pk %}"
           hx-target="#shop"
           hx-swap="innerHTML"
           class="group w-full text-left block rounded-xl border border-[color:var(--line)] bg-[color:var(--card)] p-4 transition hover:border-primary/30 hover:shadow-sm">
          <div class="flex items-center justify-between gap-3">
            <div class="min-w-0">
              <p class="text-sm font-bold text-[color:var(--text)] group-hover:text-primary">{{ order.reference|default:order.pk }}</p>
              <p class="mt-0.5 text-xs text-[color:var(--muted)]">{{ order.items.count }} article{{ order.items.count|pluralize }}</p>
              <div class="mt-1 flex flex-wrap gap-1">
                {% for item in order.items.all %}
                <span class="rounded bg-slate-100 px-1.5 py-0.5 text-[10px] text-slate-600">{{ item.product.name }}</span>
                {% endfor %}
              </div>
            </div>
            <div class="shrink-0 text-right">
              <p class="text-sm font-bold text-[color:var(--text)]">{{ order.total_amount|intcomma }} FCFA</p>
              <span class="inline-block mt-1 rounded-full px-2.5 py-0.5 text-[11px] font-bold
                {% if order.status == 'pending_payment' %}bg-amber-100 text-amber-700
                {% else %}bg-slate-100 text-slate-600{% endif %}">
                {{ order.get_status_display }}
              </span>
            </div>
          </div>
        </button>
      {% endfor %}
    </div>
    <div class="rounded-xl border border-[color:var(--line)] bg-[color:var(--card)] p-4">
      <div class="flex items-center justify-between text-sm">
        <span class="font-semibold text-[color:var(--text)]">Total du a payer</span>
        <span class="font-bold text-primary">{{ total_due|intcomma }} FCFA</span>
      </div>
    </div>
  {% else %}
    <div class="rounded-xl border border-dashed border-[color:var(--line)] bg-[color:var(--card)] p-8 text-center">
      <i data-lucide="shopping-cart" class="mx-auto h-8 w-8 text-[color:var(--muted)]"></i>
      <p class="mt-3 text-sm font-semibold text-[color:var(--text)]">Panier vide</p>
      <p class="mt-1 text-xs text-[color:var(--muted)]">Vous n'avez aucune commande en attente de paiement.</p>
    </div>
  {% endif %}
</div>
