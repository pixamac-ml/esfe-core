<div class="message-list">
    {% for message in recent_messages %}
        <div class="message chat-bubble">
            <strong>{{ message.title }}</strong><br>
            <span class="help-text">{{ message.body|default:"Notification centralisee" }} | {{ message.created_at|date:"d/m/Y H:i" }}</span>
        </div>
    {% empty %}
        <div class="message">Aucun message recent.</div>
    {% endfor %}
</div>
