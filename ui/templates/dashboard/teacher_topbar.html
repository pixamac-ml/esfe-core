{% load component_tags %}
<header class="flex h-[68px] shrink-0 items-center justify-between gap-4 border-b border-[color:var(--line)] bg-[color:var(--card)] px-4 sticky top-0 z-30">
  <!-- Left -->
  <div class="flex items-center gap-3 min-w-0">
    <button type="button"
            class="grid h-9 w-9 shrink-0 place-items-center rounded-lg border border-[color:var(--line)] text-[color:var(--muted)] hover:bg-[color:var(--card-soft)] transition"
            @click="$dispatch('sidebar-toggle')"
            aria-label="Ouvrir ou fermer la navigation"
            title="Basculer la barre latérale">
      <i data-lucide="menu" class="h-[18px] w-[18px]" aria-hidden="true"></i>
    </button>
    <div class="min-w-0">
      <div class="truncate text-sm font-black text-[color:var(--text)]">Espace enseignant</div>
      <div class="truncate text-[12px] font-semibold text-[color:var(--muted-2)]">{{ branch_name|default:"Annexe non définie" }}</div>
    </div>
  </div>

  <!-- Right -->
  <div class="flex items-center gap-2 shrink-0">
    <!-- Date -->
    <div class="hidden items-center gap-2 rounded-xl border border-[color:var(--line)] px-3 py-2 md:flex">
      <span class="grid h-7 w-7 place-items-center rounded-lg bg-[color:var(--school-primary-soft)] text-[color:var(--school-primary)]">
        <i data-lucide="calendar" style="width:15px;height:15px;"></i>
      </span>
      <div class="leading-tight">
        <div class="text-[13px] font-bold text-[color:var(--text)]" data-sg-current-date></div>
        <div class="text-[11px] font-semibold text-[color:var(--muted-2)]" data-sg-current-time></div>
      </div>
    </div>

    <!-- Search -->
    <div class="sg-search-wrap relative hidden md:block">
      <div class="flex items-center gap-2 rounded-xl border border-[color:var(--line)] bg-[color:var(--card)] px-3 py-2">
        <i data-lucide="search" style="width:15px;height:15px;color:var(--muted-2)"></i>
        <input type="search" name="q" placeholder="Rechercher..."
               aria-label="Rechercher dans mon espace enseignant"
               hx-get="{% url 'accounts_portal:portal_teacher' %}?section=search"
               hx-trigger="input delay:300ms, search"
               hx-target="#search-results-panel"
               hx-swap="innerHTML"
               autocomplete="off"
               class="w-[160px] border-0 bg-transparent text-xs font-semibold text-[color:var(--text)] outline-none placeholder:text-[color:var(--muted-2)]">
      </div>
      <div id="search-results-panel" class="absolute right-0 top-full z-50 mt-2 hidden w-[380px] rounded-xl border border-[color:var(--line)] bg-[color:var(--card)] shadow-xl" aria-live="polite"></div>
    </div>

    <!-- Notifications -->
    <a href="?section=notifications" hx-get="?section=notifications" hx-target="#teacher-workspace" hx-swap="outerHTML" hx-push-url="true"
       aria-label="Ouvrir les notifications"
       class="relative grid h-9 w-9 place-items-center rounded-lg border border-[color:var(--line)] text-[color:var(--muted)] hover:bg-[color:var(--card-soft)] transition">
      <i data-lucide="bell" style="width:17px;height:17px;"></i>
      {% if notifications_count %}
      <span class="absolute -right-1 -top-1 inline-flex h-4 min-w-[16px] items-center justify-center rounded-full bg-[color:var(--danger)] px-1 text-[9px] font-black text-white border border-white">
        {{ notifications_count }}
      </span>
      {% endif %}
    </a>

    <!-- Avatar -->
    <a href="?section=settings" hx-get="?section=settings" hx-target="#teacher-workspace" hx-swap="outerHTML" hx-push-url="true"
       aria-label="Ouvrir les paramètres du compte"
       class="flex items-center gap-2 rounded-xl border border-[color:var(--line)] px-2 py-1.5 transition hover:bg-[color:var(--card-soft)]">
      <div class="hidden text-right sm:block">
        <div class="text-[13px] font-black text-[color:var(--text)]">{{ user_display_name }}</div>
        <div class="text-[10px] font-bold text-[color:var(--muted-2)]">Enseignant</div>
      </div>
      <div class="grid h-8 w-8 shrink-0 place-items-center rounded-full bg-[color:var(--school-primary)] text-xs font-black text-white">
        {% if user.profile.avatar %}
        <img src="{{ user.profile.avatar.url }}" alt="Portrait de {{ user_display_name }}" class="h-full w-full rounded-full object-cover">
        {% else %}
        {{ user_display_name|first|upper }}
        {% endif %}
      </div>
    </a>
  </div>
</header>
