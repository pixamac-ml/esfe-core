{% if photo_url %}
<img src="{{ photo_url }}" alt="{{ initials }}" class="{{ size_class }} rounded-full object-cover border-2 border-[color:var(--border)]">
{% else %}
<span class="{{ size_class }} rounded-full bg-[color:var(--school-primary-soft)] text-[color:var(--school-primary)] inline-flex items-center justify-center font-black">{{ initials }}</span>
{% endif %}
