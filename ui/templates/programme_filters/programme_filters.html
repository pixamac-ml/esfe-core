<div class="bg-white rounded-3xl border border-primary/10 shadow-sm p-5 sm:p-6 md:p-8 space-y-8 sticky top-28"
     x-data="{ currentCycle: '{{ current_cycle|default:'' }}' }">

    <!-- RECHERCHE -->
    <div class="space-y-4">
        <h3 class="text-sm font-semibold text-primary uppercase tracking-wide">
            Recherche
        </h3>

        <form hx-get="{% url 'formations:list' %}"
              hx-target="#programme-container"
              hx-swap="innerHTML"
              hx-push-url="true"
              hx-trigger="keyup changed delay:300ms">

            <input type="hidden" name="cycle" value="{{ current_cycle|default:'' }}">

            <div class="relative">
                <input
                    type="text"
                    name="q"
                    value="{{ search_query|default:'' }}"
                    placeholder="Rechercher une formation..."
                    class="w-full pl-12 pr-4 py-3.5 text-sm rounded-xl border border-primary/20 focus:ring-2 focus:ring-secondary/30 focus:border-secondary transition-all duration-200"
                />

                <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-primary" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <circle cx="11" cy="11" r="8"/>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
            </div>
        </form>
    </div>

    <!-- FILTRE CYCLE -->
    <div class="space-y-3">

        <!-- Bouton Toutes -->
        <a href="?{% if search_query %}q={{ search_query }}{% endif %}"
           hx-get="?{% if search_query %}q={{ search_query }}{% endif %}"
           hx-target="#programme-container"
           hx-swap="innerHTML"
           hx-push-url="true"
           @click="currentCycle = ''"
           :class="currentCycle === '' ? 'bg-primary text-white shadow-md border border-primary' : 'bg-white text-primary border border-primary/20 hover:bg-primary hover:text-white hover:border-primary hover:shadow'"
           class="block w-full px-5 py-4 rounded-xl text-sm font-medium text-center transition-all duration-200">
            Toutes les formations
        </a>

        <!-- Boutons Cycles -->
        {% for cycle in cycles %}
        <a href="?cycle={{ cycle.slug }}{% if search_query %}&q={{ search_query }}{% endif %}"
           hx-get="?cycle={{ cycle.slug }}{% if search_query %}&q={{ search_query }}{% endif %}"
           hx-target="#programme-container"
           hx-swap="innerHTML"
           hx-push-url="true"
           @click="currentCycle = '{{ cycle.slug }}'"
           :class="currentCycle === '{{ cycle.slug }}' ? 'bg-primary text-white shadow-md border border-primary' : 'bg-white text-primary border border-primary/20 hover:bg-primary hover:text-white hover:border-primary hover:shadow'"
           class="block w-full px-5 py-4 rounded-xl text-sm font-medium text-center transition-all duration-200">
            {{ cycle.name }}
        </a>
        {% endfor %}

    </div>

    <!-- STATS -->
    <div class="pt-4 border-t border-primary/10">
        <p class="text-sm text-gray-500">
            <span class="font-semibold text-primary">{{ total_programmes }}</span> formation(s) disponible(s)
        </p>
    </div>

</div>
