<header class="student-topbar">
  <div class="flex min-w-0 flex-1 items-center gap-2.5">
    <button class="grid h-10 w-10 place-items-center rounded-2xl border border-[color:var(--line)] bg-[color:var(--card)] text-[color:var(--school-primary)]" @click="toggleSidebar()">
      <i data-lucide="menu" style="width:20px;height:20px;"></i>
    </button>
    <label class="flex h-10 w-full max-w-xl items-center gap-3 rounded-full border border-[color:var(--line)] bg-[color:var(--card)] px-4 text-[color:var(--muted-2)]">
      <i data-lucide="search" style="width:17px;height:17px;"></i>
      <input x-model="search" type="search" placeholder="Rechercher un cours, une ressource..." class="w-full border-0 bg-transparent text-sm font-medium text-[color:var(--text)] outline-none">
    </label>
  </div>

  <div class="flex shrink-0 items-center gap-2.5">
    <button class="grid h-10 w-10 place-items-center rounded-2xl border border-[color:var(--line)] bg-[color:var(--card)] text-[color:var(--school-primary)]" @click="toggleDarkMode()">
      <i :data-lucide="darkMode ? 'moon' : 'sun'" style="width:18px;height:18px;"></i>
    </button>
    <button type="button" @click="goToSection('courses', 'Mes cours')" class="hidden rounded-2xl border border-[color:var(--line)] bg-[color:var(--card)] px-4 py-2 text-sm font-bold text-[color:var(--text)] transition hover:border-primary-200 hover:text-primary-600 md:inline-flex">
      Mes cours
    </button>
    <div class="flex items-center gap-3 rounded-2xl border border-[color:var(--line)] bg-[color:var(--card)] px-3 py-2">
      <div class="grid h-9 w-9 place-items-center rounded-2xl bg-[color:var(--school-primary-soft)] font-black text-[color:var(--school-primary-dark)]">
        {{ student.full_name|default:student.user.username|slice:":1"|upper }}
      </div>
      <div class="hidden text-left sm:block">
        <strong class="block text-sm">{{ student.full_name|default:student.user.username }}</strong>
        <span class="block text-xs text-[color:var(--muted)]">
          {% if enrollment %}{{ enrollment.academic_class.level }} · {{ enrollment.programme.title }}{% else %}Affectation en attente{% endif %}
        </span>
      </div>
    </div>
  </div>
</header>
