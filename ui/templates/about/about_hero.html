<section class="relative overflow-hidden bg-gradient-to-br from-primary/95 via-primary/90 to-secondary/80 text-white">
    <div class="max-w-7xl mx-auto px-4 md:px-6 lg:px-8 py-12 md:py-16 lg:py-20">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 lg:gap-12 items-center">
            <div class="space-y-5 text-center lg:text-left" data-aos="fade-up">
                {% if label %}
                    <span class="inline-flex px-4 py-1.5 bg-white/20 backdrop-blur-sm rounded-full text-xs md:text-sm font-medium">
                        {{ label }}
                    </span>
                {% endif %}

                <h1 class="text-2xl md:text-4xl lg:text-5xl font-bold leading-tight">
                    {{ title|default:"Former les professionnels de demain" }}
                </h1>

                <p class="text-sm md:text-lg text-white/90 max-w-2xl {% if not image %}mx-auto lg:mx-0{% endif %}">
                    {{ subtitle|default:"Une institution d'excellence" }}
                </p>

                <p class="text-secondary text-xs sm:text-sm md:text-base font-semibold uppercase tracking-[0.22em]" data-aos="fade-in" data-aos-delay="120">
                    Demain c’est aujourd’hui
                </p>

                {% if cta_text %}
                    <a href="{{ cta_url }}"
                       class="inline-flex items-center gap-2 px-6 py-3 bg-accent hover:bg-accent/90 text-white font-semibold rounded-xl shadow-lg hover:shadow-xl hover:-translate-y-0.5 transition-all duration-300">
                        {{ cta_text }}
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/>
                        </svg>
                    </a>
                {% endif %}
            </div>

            {% if image %}
            <div class="relative" data-aos="fade-up" data-aos-delay="100">
                <div class="rounded-2xl overflow-hidden shadow-2xl border border-white/15">
                    <img src="{{ image }}"
                         alt="{{ title|default:'A propos ESFE' }}"
                         class="w-full h-56 sm:h-72 lg:h-[420px] object-cover">
                </div>
            </div>
            {% endif %}
        </div>
    </div>
</section>
