{% load static %}

<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="htmx-config" content='{"historyCacheSize": 10}'>

  <title>{% block title %}{% firstof page_title seo_site_name "ESFE" %}{% endblock %}</title>
  <meta name="robots" content="noindex, nofollow">

  <!-- STYLES -->
  <link rel="stylesheet" href="{% static 'public/css/main.css' %}">
  <link rel="stylesheet" href="{% static 'core/css/esfe_theme.css' %}">
  <link rel="stylesheet" href="{% static 'vendor/fontawesome/css/all.min.css' %}">

  <style>
[x-cloak] { display: none !important; }

main {
    position: relative;
}
  </style>

  <!-- LIBS auto-hebergees (defer: execution apres parsing du document) -->
  <script defer src="{% static 'vendor/lucide/lucide.min.js' %}"></script>
  <script defer src="{% static 'vendor/alpinejs/alpine-intersect.min.js' %}"></script>
  <script defer src="{% static 'vendor/alpinejs/alpine.min.js' %}"></script>
  <script defer src="{% static 'vendor/htmx/htmx.min.js' %}"></script>
  <script defer src="{% static 'vendor/chartjs/chart.umd.min.js' %}"></script>

  <!-- ESFE OPTIMISTIC ENGINE — instant feedback for ALL HTMX actions -->
  <style>
    .esfe-overlay{position:absolute;inset:0;z-index:50;background:color-mix(in srgb, var(--card) 80%, transparent);-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;border-radius:inherit;opacity:0;transition:opacity .12s ease;pointer-events:none}
    .esfe-overlay.is-active{opacity:1;pointer-events:auto}
    .esfe-spinner{width:28px;height:28px;border:3px solid var(--line);border-top-color:var(--school-primary);border-radius:50%;animation:esfe-spin .6s linear infinite}
    @keyframes esfe-spin{to{transform:rotate(360deg)}}
  </style>
  <script>
  (function(){
    'use strict';
    var reqs={};
    function qa(s,p){return(p||document).querySelectorAll(s)}
    function overlay(el,a){
      if(!el)return;
      if(a){
        if(el.querySelector('.esfe-overlay'))return;
        var d=document.createElement('div');d.className='esfe-overlay is-active';
        d.innerHTML='<div class="esfe-spinner"></div>';
        if(getComputedStyle(el).position==='static')el.style.position='relative';
        el.appendChild(d);
      }else{
        var o=el.querySelector('.esfe-overlay');if(o)o.remove();
      }
    }
    function disable(el){
      if(!el)return;
      qa('button,input[type=submit],input[type=reset],.sg-btn,.dg-btn,.btn',el).forEach(function(b){b.disabled=true;b.classList.add('opacity-60','cursor-not-allowed')});
    }
    function enable(el){
      if(!el)return;
      qa('button,input[type=submit],input[type=reset],.sg-btn,.dg-btn,.btn',el).forEach(function(b){b.disabled=false;b.classList.remove('opacity-60','cursor-not-allowed')});
    }
    function path(evt){return(evt.detail.pathInfo&&evt.detail.pathInfo.requestPath)||evt.detail.path||''}
    function refresh(p){
      document.body.dispatchEvent(new CustomEvent('esfe:data-changed',{bubbles:true}));
      var m={
        paiement:'payments',payment:'payments',
        candidature:'candidatures',candidat:'candidatures',
        caisse:'session',cash:'session',session:'session',
        depense:'expenses',expense:'expenses',
        boutique:'shop',shop:'shop',
        salaire:'salaries',salary:'salaries',
        inscription:'inscriptions',
        secretaire:'secretary',secretary:'secretary',
        enseignant:'teachers',teacher:'teachers'
      };
      for(var k in m){if(p.indexOf(k)!==-1){document.body.dispatchEvent(new CustomEvent('esfe:'+m[k]+'-changed',{bubbles:true}));}}
      if(window.lucide){try{lucide.createIcons()}catch(e){}}
    }

    document.addEventListener('htmx:beforeRequest',function(evt){
      var el=evt.detail.elt;if(!el)return;
      var id=el.id||Math.random().toString(36).slice(2);reqs[id]=true;
      var c=el.closest('form')||el.closest('tr,div[id],.sg-panel')||el;
      overlay(c,true);disable(c);
    });

    document.addEventListener('htmx:afterRequest',function(evt){
      var el=evt.detail.elt;if(!el)return;delete reqs[el.id||''];
      if(!evt.detail.successful)return;
      var c=el.closest('form')||el.closest('tr,div[id],.sg-panel')||el;
      overlay(c,false);enable(c);
      refresh(path(evt));
    });

    document.addEventListener('htmx:responseError',function(evt){
      var el=evt.detail.elt;if(!el)return;delete reqs[el.id||''];
      var c=el.closest('form')||el.closest('tr,div[id],.sg-panel')||el;
      overlay(c,false);enable(c);
      window.esfeToast('Erreur '+(evt.detail.xhr?evt.detail.xhr.status:'réseau'),'error',5000);
    });

    document.addEventListener('htmx:sendError',function(evt){
      var el=evt.detail.elt;if(!el)return;
      var c=el.closest('form')||el.closest('tr,div[id],.sg-panel')||el;
      overlay(c,false);enable(c);
      window.esfeToast('Erreur réseau - vérifiez votre connexion','error',5000);
    });
  })();
  </script>

  <!-- Alpine optimistic component (for templates using x-data="optimistic(...)") -->
  <script>
    document.addEventListener('alpine:init',()=>{
      Alpine.data('optimistic',(c={})=>({
        processing:false,done:false,
        init(){this.done=c.done||false},
        exec(e){if(!this.processing)this.processing=true;if(c.optimistic)c.optimistic.call(this)},
        resetOnError(){if(c.revert)c.revert.call(this);this.processing=false}
      }));
    });
  </script>

  {% block extra_head %}{% endblock %}
</head>

<body class="min-h-screen flex flex-col bg-slate-50 text-slate-800 font-roboto antialiased overflow-x-hidden"
      hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>

  <!-- ================= GLOBAL TOAST SYSTEM ================= -->
  {% include "toast.html" %}

  <!-- ================= GLOBAL LOADER ================= -->
  <div id="global-loader"
       class="hidden fixed bottom-6 right-6 z-50">
    <div class="h-6 w-6 border-2 border-gray-300 border-t-primary-500 rounded-full animate-spin"></div>
  </div>

  <!-- ================= CONTENT ================= -->
  <main id="app-main" class="flex-grow">
    {% block content %}{% endblock %}
  </main>

  <!-- ================= SCRIPTS ================= -->

  <!-- Lucide Icons Init -->
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      if (window.lucide) {
        lucide.createIcons();
      }
    });

    document.addEventListener("htmx:afterSwap", function () {
      if (window.lucide) {
        lucide.createIcons();
      }
    });
  </script>

  <!-- HTMX GLOBAL EVENTS -->
  <script>
    const loader = document.getElementById("global-loader");

    document.body.addEventListener("htmx:beforeRequest", () => {
      loader.classList.remove("hidden");
    });

    document.body.addEventListener("htmx:afterRequest", () => {
      loader.classList.add("hidden");
    });

    document.body.addEventListener("htmx:responseError", () => {
      loader.classList.add("hidden");
      console.error("Erreur HTMX détectée.");
    });
  </script>

  {% block extra_scripts %}{% endblock %}

  {% include "notification_center/partials/realtime.html" %}
</body>
</html>
