{% if partners %}
<section class="py-24 bg-gray-50 overflow-hidden">
    <div class="max-w-7xl mx-auto px-6">

        <!-- Header -->
        <div class="text-center mb-16" data-aos="fade-up">
            <span class="inline-block px-4 py-1.5 text-xs font-bold uppercase tracking-widest
                         text-secondary-600 bg-secondary-100 rounded-full mb-4">
                Confiance
            </span>
            <h2 class="text-4xl md:text-5xl font-bold text-gray-900 mb-6">{{ title }}</h2>
            {% if subtitle %}
            <p class="text-xl text-gray-600 max-w-3xl mx-auto">{{ subtitle }}</p>
            {% endif %}
        </div>

        <!-- Grille de logos -->
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-8">

            {% for partner in partners %}
            <div class="group flex items-center justify-center"
                 data-aos="zoom-in"
                 data-aos-duration="400"
                 data-aos-delay="{{ forloop.counter0 }}0">

                <a href="{{ partner.website|default:'#' }}"
                   {% if partner.website %}target="_blank"{% endif %}
                   class="relative w-full p-6 bg-white rounded-2xl
                          border border-gray-100 hover:border-primary-200
                          shadow-sm hover:shadow-xl
                          transform hover:-translate-y-1 hover:scale-105
                          transition-all duration-300">

                    <!-- Logo -->
                    <img src="{{ partner.logo.url }}"
                         alt="{{ partner.name }}"
                         class="w-full h-16 object-contain filter grayscale group-hover:grayscale-0
                                opacity-70 group-hover:opacity-100
                                transition-all duration-300">

                    <!-- Tooltip -->
                    <div class="absolute -bottom-2 left-1/2 -translate-x-1/2 translate-y-full
                                px-3 py-1.5 bg-gray-900 text-white text-xs rounded-lg
                                opacity-0 group-hover:opacity-100 pointer-events-none
                                transition-opacity duration-300 whitespace-nowrap z-10">
                        {{ partner.name }}
                        <div class="absolute -top-1 left-1/2 -translate-x-1/2 w-2 h-2 bg-gray-900 rotate-45"></div>
                    </div>

                </a>
            </div>
            {% endfor %}

        </div>

    </div>
</section>
{% endif %}
