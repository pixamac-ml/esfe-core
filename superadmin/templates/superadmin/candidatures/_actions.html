<div class="flex flex-wrap items-center justify-between gap-3">
    <div class="text-sm text-slate-500">
        Sélectionnez des lignes puis appliquez une action groupée.
    </div>
    <div class="flex items-center gap-2">
        <select name="action" form="bulk-action-form" class="rounded-lg border border-slate-300 px-3 py-2 text-sm">
            <option value="">Action groupée...</option>
            <option value="under_review">Marquer en analyse</option>
            <option value="to_complete">Marquer à compléter</option>
            <option value="accepted">Accepter</option>
            <option value="accepted_with_reserve">Accepter sous réserve</option>
            <option value="rejected">Rejeter</option>
            <option value="delete">Supprimer</option>
        </select>
        <button type="submit" form="bulk-action-form" class="btn btn-secondary">
            <i class="fas fa-layer-group"></i>Appliquer
        </button>
    </div>
</div>
