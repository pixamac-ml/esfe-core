<div id="sg-dashboard-scope"
     class="flex flex-wrap items-center gap-3 px-4 py-2"
     hx-get="{% url 'secretary:htmx_dashboard_scope' %}"
     hx-trigger="secretary:kpis-updated from:body, secretary:registry-updated from:body, secretary:visits-updated from:body"
     hx-swap="outerHTML">
  <span class="inline-flex items-center gap-1.5 rounded-full bg-[color:var(--accent-bg)] px-3 py-1 text-xs font-bold text-[color:var(--text)]">
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-building"><rect width="16" height="20" x="4" y="2" rx="2" ry="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M12 6h.01"/><path d="M12 10h.01"/><path d="M12 14h.01"/><path d="M16 10h.01"/><path d="M16 14h.01"/><path d="M8 10h.01"/><path d="M8 14h.01"/></svg>
    {{ branch.name|default:"Annexe non definie" }}
  </span>
  <span class="inline-flex items-center gap-1.5 rounded-full bg-[color:var(--accent-bg)] px-3 py-1 text-xs font-bold text-[color:var(--text)]">
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-clock"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    <span data-sg-clock></span>
  </span>
  <span class="inline-flex items-center gap-1.5 rounded-full bg-[color:var(--accent-bg)] px-3 py-1 text-xs font-bold text-[color:var(--text)]">
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-route"><circle cx="6" cy="19" r="3"/><path d="M9 19h8.5a3.5 3.5 0 0 0 0-7h-11a3.5 3.5 0 0 1 0-7H15"/><circle cx="18" cy="5" r="3"/></svg>
    {{ pending_registry_count|default:0 }} entrees a router
  </span>
  <span class="inline-flex items-center gap-1.5 rounded-full bg-[color:var(--accent-bg)] px-3 py-1 text-xs font-bold text-[color:var(--text)]">
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-user-clock"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    {{ active_visits|default:0 }} visites ouvertes
  </span>
</div>
