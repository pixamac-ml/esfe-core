{% extends "base.html" %}

{% block title %}Paiement - ESFE{% endblock %}

{% block content %}
<section class="max-w-md mx-auto px-4 md:px-6 lg:px-8 py-12 md:py-16 lg:py-20">

  <h1 class="text-xl font-bold mb-4">
    Initier un paiement
  </h1>

  <p class="text-sm text-gray-600 mb-6">
    Solde restant : <strong>{{ inscription.balance }} FCFA</strong>
  </p>

  <form method="post" class="space-y-5 [&_p]:space-y-2 [&_label]:block [&_label]:text-sm [&_label]:font-medium [&_label]:text-gray-700 [&_input]:w-full [&_select]:w-full [&_textarea]:w-full [&_input]:rounded-xl [&_select]:rounded-xl [&_textarea]:rounded-xl [&_input]:border [&_select]:border [&_textarea]:border [&_input]:border-gray-300 [&_select]:border-gray-300 [&_textarea]:border-gray-300 [&_input]:px-4 [&_select]:px-4 [&_textarea]:px-4 [&_input]:py-3 [&_select]:py-3 [&_textarea]:py-3 [&_input]:text-sm [&_select]:text-sm [&_textarea]:text-sm [&_input]:focus:outline-none [&_select]:focus:outline-none [&_textarea]:focus:outline-none [&_input]:focus:ring-2 [&_select]:focus:ring-2 [&_textarea]:focus:ring-2 [&_input]:focus:ring-primary-200 [&_select]:focus:ring-primary-200 [&_textarea]:focus:ring-primary-200 [&_input]:focus:border-primary-500 [&_select]:focus:border-primary-500 [&_textarea]:focus:border-primary-500 [&_ul]:text-xs [&_ul]:text-red-600 [&_ul]:list-none [&_ul]:p-0 [&_ul]:mt-1.5">
    {% csrf_token %}
    {{ form.as_p }}

    <button
      type="submit"
      class="w-full bg-primary-600 text-white py-3.5 rounded-xl font-semibold hover:bg-primary-700 transition"
    >
      Envoyer la demande
    </button>
  </form>

</section>
{% endblock %}
