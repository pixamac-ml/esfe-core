{% load component_tags %}
<span x-data="{ show: false }" class="relative inline-flex">
  <span
    @mouseenter="show = true"
    @mouseleave="show = false"
    @focusin="show = true"
    @focusout="show = false"
    class="inline-flex"
  >
    {% slot "default" %}{% endslot %}
  </span>
  <span
    x-show="show"
    x-transition:enter="transition ease-out duration-150"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100"
    x-transition:leave="transition ease-in duration-100"
    x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0"
    x-cloak
    class="absolute z-50 {{ position_class }} pointer-events-none"
    role="tooltip"
  >
    <span class="block rounded-lg bg-[color:var(--text)] px-2.5 py-1.5 text-xs font-semibold text-[color:var(--card)] whitespace-nowrap shadow-lg">
      {{ text }}
    </span>
    <span class="absolute {{ arrow_class }}"></span>
  </span>
</span>
