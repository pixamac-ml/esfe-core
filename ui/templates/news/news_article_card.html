<article class="bg-white rounded-xl shadow overflow-hidden hover:shadow-xl transition">

    {% if news.image %}
    <a href="{{ news.get_absolute_url }}">
        <img src="{{ news.image.url }}"
             alt="{{ news.titre }}"
             class="w-full h-72 object-cover">
    </a>
    {% endif %}

    <div class="p-8">

        <div class="text-sm text-gray-500 mb-3">
            {{ news.published_at|date:"d M Y" }} — {{ news.categorie.nom }}
        </div>

        <h2 class="text-3xl font-bold mb-4">
            <a href="{{ news.get_absolute_url }}"
               class="hover:text-blue-600 transition">
                {{ news.titre }}
            </a>
        </h2>

        {% if news.resume %}
        <p class="text-gray-600 mb-6">
            {{ news.resume|truncatewords:30 }}
        </p>
        {% endif %}

        <div class="flex justify-between items-center text-sm">

            <a href="{{ news.get_absolute_url }}"
               class="text-blue-600 font-medium hover:underline">
                Lire le communiqué →
            </a>

            <div class="flex gap-4 text-gray-500">
                <button class="hover:text-blue-600 transition">
                    👍 J’aime
                </button>
                <button class="hover:text-blue-600 transition">
                    🔗 Partager
                </button>
            </div>

        </div>

    </div>

</article>
