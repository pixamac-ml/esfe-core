{# Activity Wave - Visualisation d'activité avec onde animée #}
<div class="aw-container" x-data="activityWave()">
  <div class="aw-wave-wrapper">
    <svg class="aw-wave" viewBox="0 0 400 100" preserveAspectRatio="none">
      <defs>
        <linearGradient id="waveGradient" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.8" />
          <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:0.8" />
          <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0.8" />
        </linearGradient>
      </defs>
      <path 
        class="aw-path"
        d="M0,50 Q50,30 100,50 T200,50 T300,50 T400,50 L400,100 L0,100 Z"
        fill="url(#waveGradient)"
      />
    </svg>
    <div class="aw-dots">
      {% for i in bars %}
      <div class="aw-dot" :style="{ animationDelay: {{ i }} * 0.1 + 's' }"></div>
      {% endfor %}
    </div>
  </div>
  <div class="aw-stats">
    <div class="aw-stat">
      <span class="aw-stat-value" x-text="currentValue">0</span>
      <span class="aw-stat-label">Actif</span>
    </div>
    <div class="aw-stat">
      <span class="aw-stat-value" x-text="peakValue">0</span>
      <span class="aw-stat-label">Pic</span>
    </div>
  </div>
</div>

<style>
  .aw-container {
    position: relative;
    background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(139, 92, 246, 0.1));
    border-radius: 20px;
    padding: 1.5rem;
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.2);
  }

  .aw-wave-wrapper {
    position: relative;
    height: {{ height }}px;
    margin-bottom: 1rem;
  }

  .aw-wave {
    width: 100%;
    height: 100%;
  }

  .aw-path {
    animation: waveMove 3s ease-in-out infinite;
    transform-origin: center;
  }

  @keyframes waveMove {
    0%, 100% { transform: translateY(0) scaleY(1); }
    25% { transform: translateY(-5px) scaleY(1.1); }
    50% { transform: translateY(0) scaleY(0.9); }
    75% { transform: translateY(5px) scaleY(1.05); }
  }

  .aw-dots {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: space-around;
    padding: 0 2rem;
  }

  .aw-dot {
    width: 8px;
    height: 8px;
    background: rgba(255, 255, 255, 0.8);
    border-radius: 50%;
    animation: dotPulse 2s ease-in-out infinite;
  }

  @keyframes dotPulse {
    0%, 100% { transform: scale(1); opacity: 0.5; }
    50% { transform: scale(1.5); opacity: 1; }
  }

  .aw-stats {
    display: flex;
    gap: 2rem;
    justify-content: center;
  }

  .aw-stat {
    text-align: center;
  }

  .aw-stat-value {
    font-size: 1.5rem;
    font-weight: 900;
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .aw-stat-label {
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #64748b;
  }
</style>

<script>
function activityWave() {
  return {
    currentValue: 0,
    peakValue: 0,
    
    init() {
      this.simulateActivity();
      setInterval(() => this.simulateActivity(), 2000);
    },
    
    simulateActivity() {
      const base = 50;
      const variation = Math.random() * 30 - 15;
      this.currentValue = Math.floor(base + variation);
      this.peakValue = Math.max(this.peakValue, this.currentValue);
    }
  };
}
</script>
