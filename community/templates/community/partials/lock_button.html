<!-- community/templates/community/partials/lock_button.html -->

{% if request.user.is_staff or request.user == topic.author %}
    {% if topic.is_locked %}
        <!-- SUJET VERROUILLÉ -->
        <button
            hx-post="{% url 'community:lock_topic' topic.slug %}"
            hx-swap="outerHTML"
            hx-target="this"
            class="group flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-medium
                   bg-amber-100 text-amber-700 border border-amber-300
                   hover:bg-amber-200 transition-all duration-300"
            title="Cliquez pour déverrouiller">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
            </svg>
            Verrouillé
            <span class="text-xs opacity-70">(déverrouiller)</span>
        </button>
    {% else %}
        <!-- SUJET OUVERT -->
        <button
            hx-post="{% url 'community:lock_topic' topic.slug %}"
            hx-swap="outerHTML"
            hx-target="this"
            class="group flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-medium
                   bg-gray-100 text-gray-600 border border-gray-300
                   hover:bg-amber-50 hover:text-amber-600 hover:border-amber-300
                   transition-all duration-300"
            title="Verrouiller ce sujet">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 group-hover:scale-110 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z"/>
            </svg>
            Verrouiller
        </button>
    {% endif %}
{% endif %}
