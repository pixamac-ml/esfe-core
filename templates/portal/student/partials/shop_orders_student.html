{% load humanize %}
<div class="space-y-3" x-data="{ shopTab: 'orders' }">
  <div class="flex items-center justify-between gap-2 border-b border-[color:var(--line)] pb-3">
    <nav class="flex gap-4">
      <button type="button"
        :class="shopTab === 'orders' ? 'text-primary border-b-2 border-primary' : 'text-[color:var(--muted)]'"
        class="pb-2 text-xs font-bold uppercase tracking-wide transition"
        @click="shopTab='orders'">
        Mes commandes
      </button>
      <button type="button"
        :class="shopTab === 'cart' ? 'text-primary border-b-2 border-primary' : 'text-[color:var(--muted)]'"
        class="pb-2 text-xs font-bold uppercase tracking-wide transition"
        @click="shopTab='cart';
          $nextTick(() => {
            const el = document.getElementById('shop-cart-target');
            if (el && el.dataset.loaded !== '1') {
              el.dataset.loaded='1';
              htmx.ajax('GET', el.dataset.cartUrl, {target: '#shop-cart-target', swap: 'innerHTML'});
            }
          })">
        Mon panier
      </button>
      <button type="button"
        :class="shopTab === 'catalog' ? 'text-primary border-b-2 border-primary' : 'text-[color:var(--muted)]'"
        class="pb-2 text-xs font-bold uppercase tracking-wide transition"
        @click="shopTab='catalog';
          $nextTick(() => {
            const el = document.getElementById('shop-catalog-target');
            if (el && el.dataset.loaded !== '1') {
              el.dataset.loaded='1';
              htmx.ajax('GET', el.dataset.catalogUrl, {target: '#shop-catalog-target', swap: 'innerHTML'});
            }
          })">
        Catalogue
      </button>
    </nav>
    <div class="flex items-center gap-1">
      <a href="{% if branch_slug %}{% url 'shop:public_catalog' branch_slug %}{% else %}#{% endif %}"
         target="_blank"
         class="flex items-center gap-1 rounded-xl border border-[color:var(--line)] px-3 py-2 text-[11px] font-bold text-[color:var(--muted)] transition hover:text-primary"
         title="Voir la boutique vitrine">
        <i data-lucide="external-link" style="width:12px;height:12px;"></i> Vitrine
      </a>
      <button type="button"
         hx-get="{% url 'shop:student_required_modal' %}"
         hx-target="#shop-order-modal-target"
         hx-swap="innerHTML"
         class="rounded-xl bg-primary-600 px-4 py-2 text-xs font-bold text-white shadow-sm transition hover:bg-primary-700">
        Commander un article
      </button>
    </div>
  </div>
  <div id="shop-order-modal-target"></div>
  <div x-show="shopTab === 'orders'">
    {% if orders %}
      {% for order in orders %}
        <button type="button"
           hx-get="{% url 'shop:student_order_detail' order.pk %}"
           hx-target="#shop"
           hx-swap="innerHTML"
           class="group w-full text-left block rounded-xl border border-[color:var(--line)] bg-[color:var(--card)] p-4 transition hover:border-primary/30 hover:shadow-sm">
          <div class="flex items-center justify-between gap-3">
            <div class="min-w-0">
              <p class="text-sm font-bold text-[color:var(--text)] group-hover:text-primary">{{ order.reference|default:order.pk }}</p>
              <p class="mt-0.5 text-xs text-[color:var(--muted)]">{{ order.created_at|date:"d/m/Y H:i" }}</p>
              <p class="mt-0.5 text-xs text-[color:var(--muted)]">{{ order.items.count }} article{{ order.items.count|pluralize }}</p>
            </div>
            <div class="shrink-0 text-right">
              <p class="text-sm font-bold text-[color:var(--text)]">{{ order.total_amount|intcomma }} FCFA</p>
              <span class="inline-block mt-1 rounded-full px-2.5 py-0.5 text-[11px] font-bold
                {% if order.status == 'delivered' %}bg-emerald-100 text-emerald-700
                {% elif order.status == 'ready' %}bg-blue-100 text-blue-700
                {% elif order.status == 'paid' %}bg-violet-100 text-violet-700
                {% elif order.status == 'pending_payment' %}bg-amber-100 text-amber-700
                {% elif order.status == 'cancelled' %}bg-rose-100 text-rose-700
                {% else %}bg-slate-100 text-slate-600{% endif %}">
                {{ order.get_status_display }}
              </span>
            </div>
          </div>
        </button>
      {% endfor %}
    {% else %}
      <div class="rounded-xl border border-dashed border-[color:var(--line)] bg-[color:var(--card)] p-8 text-center">
        <i data-lucide="shopping-bag" class="mx-auto h-8 w-8 text-[color:var(--muted)]"></i>
        <p class="mt-3 text-sm font-semibold text-[color:var(--text)]">Aucune commande</p>
        <p class="mt-1 text-xs text-[color:var(--muted)]">Vous n'avez pas encore passe de commande dans la boutique.</p>
        <button type="button"
           hx-get="{% url 'shop:student_required_modal' %}"
           hx-target="#shop-order-modal-target"
           hx-swap="innerHTML"
           class="mt-4 inline-block rounded-xl bg-primary-600 px-5 py-2.5 text-xs font-bold text-white transition hover:bg-primary-700">
          Decouvrir la boutique
        </button>
      </div>
    {% endif %}
  </div>
  <div x-show="shopTab === 'cart'">
    <div id="shop-cart-target"
      data-cart-url="{% url 'portal_student:shop_cart_partial' %}"
      data-loaded="0">
      <div class="flex items-center justify-center py-12 text-xs text-[color:var(--muted)]">
        <i data-lucide="loader-circle" class="mr-2 h-4 w-4 animate-spin"></i> Chargement du panier...
      </div>
    </div>
  </div>
  <div x-show="shopTab === 'catalog'">
    <div id="shop-catalog-target"
      data-catalog-url="{% url 'portal_student:shop_catalog_partial' %}"
      data-loaded="0">
      <div class="flex items-center justify-center py-12 text-xs text-[color:var(--muted)]">
        <i data-lucide="loader-circle" class="mr-2 h-4 w-4 animate-spin"></i> Chargement du catalogue...
      </div>
    </div>
  </div>
</div>
