<div class="max-h-80 overflow-y-auto">
  {% for n in notifications %}
    <button
      type="button"
      class="flex w-full items-start gap-3 border-b border-slate-100 px-5 py-4 text-left transition hover:bg-slate-50 {% if not n.read_at %}bg-blue-50/50{% endif %}"
      hx-get="{% url 'communication:notification_detail' n.id %}"
      hx-target="#it-drawer-content"
      hx-swap="innerHTML"
      @click="notificationDropdownOpen = false"
    >
      <div class="mt-0.5 flex h-10 w-10 shrink-0 items-center justify-center rounded-2xl bg-slate-100 text-slate-700">
        <i data-lucide="bell" style="width:16px;height:16px;"></i>
      </div>
      <div class="min-w-0 flex-1">
        <p class="truncate text-sm font-bold text-slate-900">{{ n.title }}</p>
        <p class="mt-1 line-clamp-2 text-xs font-semibold text-slate-500">{{ n.body|truncatechars:80 }}</p>
        <p class="mt-1 text-[10px] font-bold uppercase tracking-wide text-slate-400">{{ n.created_at|timesince }}</p>
      </div>
      {% if not n.read_at %}
        <span class="mt-2 h-2 w-2 shrink-0 rounded-full bg-blue-500"></span>
      {% endif %}
    </button>
  {% empty %}
    <div class="p-6 text-center">
      <i data-lucide="bell-off" style="width:32px;height:32px;" class="mx-auto text-slate-300"></i>
      <p class="mt-2 text-sm font-bold text-slate-500">Aucune notification</p>
      <p class="text-xs text-slate-400">Pas de nouvelles alertes pour le moment.</p>
    </div>
  {% endfor %}
</div>
{% if unread_count > 0 %}
  <div class="border-t border-slate-100 bg-slate-50 px-5 py-3">
    <button
      class="w-full text-center text-xs font-black text-blue-600 hover:text-blue-800"
      hx-post="{% url 'communication:mark_all_notifications_read' %}"
      hx-target="#it-notif-dropdown-content"
      hx-swap="innerHTML"
      hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
      @click="unreadCount = 0"
    >
      Tout marquer comme lu
    </button>
  </div>
{% endif %}
