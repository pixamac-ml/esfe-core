<section id="hero-section" class="relative h-[100dvh] min-h-[560px] sm:min-h-[620px] max-h-[1200px] w-full overflow-hidden isolate">

  <!-- ================= BACKGROUND AVEC ZOOM ================= -->
  <div class="absolute inset-0 hero-zoom z-0">
    {% if image_url %}
    <img src="{{ image_url }}"
         class="w-full h-full object-cover object-[52%_center] sm:object-center hero-ken-burns"
         alt="Campus ESFE"
         loading="eager">
    {% else %}
    <div class="w-full h-full bg-gradient-to-br from-primary-700 via-primary-600 to-secondary"></div>
    {% endif %}
    <div class="absolute inset-0 bg-gradient-to-b from-black/30 via-black/50 to-black/80
                sm:from-black/40 sm:via-black/55 sm:to-black/75"></div>
  </div>

  <!-- ================= PARTICULES DÉCORATIVES ================= -->
  <div class="absolute inset-0 z-10 pointer-events-none overflow-hidden hidden sm:block">
    <div class="absolute top-1/4 left-1/4 w-32 sm:w-48 md:w-64 lg:w-80 h-32 sm:h-48 md:h-64 lg:h-80 bg-secondary/10 rounded-full blur-3xl animate-pulse-slow"></div>
    <div class="absolute bottom-1/4 right-1/4 w-40 sm:w-56 md:w-72 lg:w-96 h-40 sm:h-56 md:h-72 lg:h-96 bg-primary/10 rounded-full blur-3xl animate-pulse-slow delay-1000"></div>
  </div>

  <!-- ================= LOGO ================= -->
  <div class="absolute top-4 left-4 sm:top-6 sm:left-6 z-30 hero-fade-in" data-aos="fade-in">
    {% if logo_url %}
    <img src="{{ logo_url }}"
         class="h-10 sm:h-14 md:h-16 lg:h-20 opacity-95 drop-shadow-lg"
         alt="Logo ESFE">
    {% endif %}
  </div>

  <!-- ================= BADGE EXCELLENCE ================= -->
    <div class="absolute top-4 right-4 sm:top-6 sm:right-6 z-30 hero-fade-in-delayed hidden md:block" data-aos="fade-in" data-aos-delay="90">
    <div class="bg-white/10 backdrop-blur-md border border-white/20 rounded-2xl px-3 py-1.5 lg:px-4 lg:py-2 flex items-center gap-2 shadow-outline-soft">
      <span class="w-1.5 h-1.5 lg:w-2 lg:h-2 bg-secondary rounded-full animate-pulse"></span>
      <span class="text-white/90 text-xs lg:text-sm font-medium">Excellence depuis 2008</span>
    </div>
  </div>

  <!-- ================= CONTENU CENTRAL ================= -->
  <div class="relative z-20 h-full w-full max-w-7xl mx-auto flex flex-col items-center justify-center text-white px-4 sm:px-6 lg:px-8 text-center pt-20 pb-24 sm:pt-20 sm:pb-28 lg:pb-32" data-aos="fade-up">

    <!-- Titre animé -->
    <div class="hero-line hero-title-enter">
      <span class="brand text-white drop-shadow-2xl">{{ title }}</span>
      <span class="city-mask">
        <span id="cityText" class="city-text text-secondary drop-shadow-lg"></span>
        <span id="cursor" class="cursor"></span>
      </span>
    </div>

    <!-- Tagline -->
    <p class="hero-tagline hero-tagline-enter mt-3 sm:mt-4 lg:mt-6">
      <strong>{{ subtitle|default:"Former les cadres de la santé" }}</strong>
    </p>

    <p class="mt-3 text-secondary/95 text-sm sm:text-base md:text-lg font-semibold tracking-[0.18em] uppercase hero-desc-enter">
      Demain c’est aujourd’hui
    </p>

    <!-- Sous-texte descriptif -->
    <p class="mt-4 sm:mt-6 text-white/75 text-sm sm:text-base md:text-lg max-w-sm sm:max-w-xl md:max-w-2xl hero-desc-enter leading-relaxed text-balance">
      École Santé Félix Houphouët Boigny - Mali
    </p>

    <!-- Boutons CTA -->
    <div class="mt-6 sm:mt-8 lg:mt-10 flex flex-col sm:flex-row gap-3 sm:gap-4 hero-cta-enter w-full sm:w-auto px-1 sm:px-0">
      <a href="{% url 'formations:list' %}"
         class="group inline-flex items-center justify-center gap-2 bg-secondary hover:bg-secondary/90 text-white px-6 sm:px-8 py-3 sm:py-4 rounded-2xl font-semibold text-sm sm:text-base transition-all duration-300 shadow-glow hover:shadow-premium hover:-translate-y-1 w-full sm:w-auto">
        <span>Découvrir nos formations</span>
        <svg class="w-4 h-4 sm:w-5 sm:h-5 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/>
        </svg>
      </a>
      <a href="https://wa.me/22397672087?text=Bonjour%2C%20je%20souhaite%20obtenir%20des%20informations%20sur%20les%20inscriptions%20%C3%A0%20l%E2%80%99ESF%C3%A9."
         target="_blank"
         rel="noopener noreferrer"
         aria-label="Contacter ESFé sur WhatsApp"
         class="inline-flex items-center justify-center gap-2 bg-white/10 hover:bg-white/20 backdrop-blur-sm text-white border border-white/30 px-6 sm:px-8 py-3 sm:py-4 rounded-2xl font-semibold text-sm sm:text-base transition-all duration-300 hover:-translate-y-1 w-full sm:w-auto shadow-outline-soft">
        <span>Contacter sur WhatsApp</span>
      </a>
    </div>

  </div>


  <!-- ================= SCROLL BUTTON ================= -->
  <a href="#a-propos"
     class="scroll-button group"
     aria-label="Aller à la section suivante">
    <svg class="w-5 h-5 sm:w-6 sm:h-6 group-hover:translate-y-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"/>
    </svg>
  </a>

</section>

<style>
/* ============================= */
/* VARIABLES                     */
/* ============================= */
:root {
  --color-primary: #1e4f6f;
  --color-secondary: #1db5b0;
}

/* ============================= */
/* HERO ISOLATION                */
/* ============================= */
#hero-section {
  isolation: isolate;
}

/* ============================= */
/* ZOOM BACKGROUND               */
/* ============================= */
.hero-zoom {
  transform: scale(1);
  transition: transform 20s ease-out;
  will-change: transform;
}

@keyframes kenBurns {
  0% { transform: scale(1.02); }
  100% { transform: scale(1.12); }
}

.hero-ken-burns {
  animation: kenBurns 18s ease-out forwards;
  transform-origin: center center;
}

@media (max-width: 1023px) {
  .hero-ken-burns {
    animation-duration: 24s;
  }
}

/* ============================= */
/* ANIMATIONS D'ENTRÉE           */
/* ============================= */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes slideInLeft {
  from { opacity: 0; transform: translateX(-20px); }
  to { opacity: 1; transform: translateX(0); }
}

@keyframes slideInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.hero-fade-in {
  animation: fadeIn 0.8s ease-out forwards;
}

.hero-fade-in-delayed {
  opacity: 0;
  animation: fadeIn 0.8s ease-out 0.4s forwards;
}

.hero-title-enter {
  opacity: 0;
  animation: fadeInUp 0.8s ease-out 0.2s forwards;
}

.hero-tagline-enter {
  opacity: 0;
  animation: fadeInUp 0.8s ease-out 0.35s forwards;
}

.hero-desc-enter {
  opacity: 0;
  animation: fadeInUp 0.8s ease-out 0.5s forwards;
}

.hero-cta-enter {
  opacity: 0;
  animation: fadeInUp 0.8s ease-out 0.65s forwards;
}

.hero-social-enter {
  opacity: 0;
  animation: slideInUp 0.6s ease-out 0.9s forwards;
}

@media (min-width: 640px) {
  .hero-social-enter {
    animation: slideInLeft 0.6s ease-out 0.9s forwards;
  }
}

/* ============================= */
/* TITRE RESPONSIVE              */
/* ============================= */
.hero-line {
  display: flex;
  align-items: baseline;
  justify-content: center;
  gap: 0.5rem;
  flex-wrap: wrap;
}

@media (min-width: 640px) {
  .hero-line { gap: 0.75rem; }
}

@media (min-width: 1024px) {
  .hero-line { gap: 1rem; }
}

.brand, .city-text {
  font-family: 'Poppins', sans-serif;
  font-weight: 700;
  white-space: nowrap;
  letter-spacing: -0.02em;
  line-height: 1.1;
}

/* Tailles responsive */
.brand, .city-text {
  font-size: 2.5rem; /* Mobile */
}

@media (min-width: 480px) {
  .brand, .city-text { font-size: 3rem; }
}

@media (min-width: 640px) {
  .brand, .city-text { font-size: 3.5rem; }
}

@media (min-width: 768px) {
  .brand, .city-text { font-size: 4.5rem; }
}

@media (min-width: 1024px) {
  .brand, .city-text { font-size: 5.5rem; }
}

@media (min-width: 1280px) {
  .brand, .city-text { font-size: 6.5rem; }
}

/* ============================= */
/* WRITING EFFECT                */
/* ============================= */
.city-mask {
  position: relative;
  display: inline-block;
  overflow: hidden;
}

.cursor {
  position: absolute;
  top: 10%;
  right: -4px;
  width: 2px;
  height: 80%;
  background: var(--color-secondary);
  opacity: 0.8;
  transition: opacity 0.3s ease;
  border-radius: 2px;
}

@media (min-width: 768px) {
  .cursor {
    width: 3px;
    right: -6px;
  }
}

/* ============================= */
/* TAGLINE RESPONSIVE            */
/* ============================= */
.hero-tagline {
  font-size: 1rem;
  font-weight: 500;
  color: rgba(255,255,255,0.95);
}

@media (min-width: 480px) {
  .hero-tagline { font-size: 1.1rem; }
}

@media (min-width: 640px) {
  .hero-tagline { font-size: 1.25rem; }
}

@media (min-width: 768px) {
  .hero-tagline { font-size: 1.5rem; }
}

@media (min-width: 1024px) {
  .hero-tagline { font-size: 1.75rem; }
}

/* ============================= */
/* SCROLL BUTTON RESPONSIVE      */
/* ============================= */
.scroll-button {
  position: absolute;
  bottom: 1.5rem;
  left: 50%;
  transform: translateX(-50%);
  z-index: 40;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.25);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  text-decoration: none;
  transition: all 0.3s ease;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
}

@media (min-width: 640px) {
  .scroll-button {
    width: 52px;
    height: 52px;
    bottom: 2rem;
  }
}

@media (min-width: 1024px) {
  .scroll-button {
    width: 56px;
    height: 56px;
    bottom: 2.5rem;
  }
}

@keyframes bounceSoft {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(6px); }
}

.scroll-button {
  animation: bounceSoft 2.5s infinite ease-in-out;
}

.scroll-button:hover {
  background: rgba(255,255,255,0.95);
  color: var(--color-primary);
  transform: translateX(-50%) scale(1.1);
  animation-play-state: paused;
}

/* ============================= */
/* PULSE ANIMATION               */
/* ============================= */
@keyframes pulseSlow {
  0%, 100% { opacity: 0.2; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(1.05); }
}

.animate-pulse-slow {
  animation: pulseSlow 6s infinite ease-in-out;
}

.delay-1000 {
  animation-delay: 1s;
}

/* ============================= */
/* MOBILE FIRST ADJUSTMENTS      */
/* ============================= */
@media (max-width: 479px) {
  .hero-line {
    flex-direction: column;
    gap: 0.25rem;
  }

  #hero-section {
    min-height: 100vh;
    min-height: 100dvh; /* Dynamic viewport height for mobile browsers */
  }
}

/* Fix pour les navigateurs mobiles (barre d'adresse) */
@supports (min-height: 100dvh) {
  #hero-section {
    min-height: 100dvh;
  }
}

/* ============================= */
/* REDUCED MOTION                */
/* ============================= */
@media (prefers-reduced-motion: reduce) {
  .hero-zoom,
  .scroll-button,
  .animate-pulse-slow {
    animation: none;
    transition: none;
  }

  .hero-fade-in,
  .hero-fade-in-delayed,
  .hero-title-enter,
  .hero-tagline-enter,
  .hero-desc-enter,
  .hero-cta-enter,
  .hero-social-enter {
    opacity: 1;
    animation: none;
  }
}
</style>

<script>
document.addEventListener("DOMContentLoaded", function() {

  // Zoom background
  const zoom = document.querySelector(".hero-zoom");
  if (zoom) {
    const viewportWidth = window.innerWidth;
    const targetScale = viewportWidth < 640 ? 1.02 : viewportWidth < 1024 ? 1.04 : 1.06;
    setTimeout(() => { zoom.style.transform = `scale(${targetScale})`; }, 100);
  }

  // Writing animation
  const rawCities = {{ cities|safe }};
  const text = document.getElementById("cityText");
  const cursor = document.getElementById("cursor");
  const viewport = window.innerWidth;
  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  let cities = Array.isArray(rawCities) ? rawCities.slice() : [];
  if (viewport < 640) {
    cities = cities.slice(0, 3);
  } else if (viewport < 1024) {
    cities = cities.slice(0, 5);
  }

  if (cities && cities.length && text && cursor) {
    if (prefersReducedMotion) {
      text.textContent = cities[0];
      cursor.style.opacity = 0;
      return;
    }

    const speedPerChar = viewport < 640 ? 0.22 : viewport < 1024 ? 0.18 : 0.15;
    const holdDuration = viewport < 640 ? 2300 : viewport < 1024 ? 2000 : 1500;
    const cycleDuration = viewport < 640 ? 7600 : viewport < 1024 ? 6800 : 6000;
    let index = 0;

    function animateWord(word) {
      text.textContent = word;
      const duration = Math.max(word.length * speedPerChar, 0.9);

      text.style.transition = "none";
      text.style.clipPath = "inset(0 100% 0 0)";

      requestAnimationFrame(() => {
        text.style.transition = `clip-path ${duration}s cubic-bezier(0.25, 0.46, 0.45, 0.94)`;
        text.style.clipPath = "inset(0 0 0 0)";
        cursor.style.opacity = 1;

        setTimeout(() => {
          cursor.style.opacity = 0;
          setTimeout(() => {
            text.style.transition = "clip-path 0.35s ease-in";
            text.style.clipPath = "inset(0 100% 0 0)";
          }, holdDuration);
        }, duration * 1000 + holdDuration);
      });
    }

    function cycle() {
      animateWord(cities[index]);
      index = (index + 1) % cities.length;
    }

    cycle();
    setInterval(cycle, cycleDuration);
  }

  // Smooth scroll
  const scrollBtn = document.querySelector('.scroll-button');
  if (scrollBtn) {
    scrollBtn.addEventListener('click', function(e) {
      e.preventDefault();
      const target = document.querySelector(this.getAttribute('href'));
      if (target) {
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    });
  }
});
</script>
