{% extends "base.html" %}
{% block content %}

<div class="bg-soft min-h-screen py-16">
    <div class="max-w-3xl mx-auto bg-white shadow-lg rounded-xl p-10 border border-primary-100">

        <h1 class="text-2xl font-bold text-primary-700 mb-10">
            Modifier mon profil
        </h1>

        <form method="post" enctype="multipart/form-data" class="space-y-8">
            {% csrf_token %}

            <div>
                <label class="block text-sm font-medium text-gray-600 mb-2">
                    Photo de profil
                </label>
                {{ form.avatar }}
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-600 mb-2">
                    Bio
                </label>
                {{ form.bio }}
            </div>

            <button type="submit"
                    class="bg-primary-500 hover:bg-primary-600 text-white px-6 py-3 rounded-lg font-semibold transition">
                Enregistrer
            </button>

        </form>

    </div>
</div>

{% endblock %}
