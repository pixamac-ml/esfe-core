{% load component_tags %}
<div style="display:flex;align-items:center;justify-content:center;height:340px">
  <div style="text-align:center;max-width:380px">
    <div style="width:56px;height:56px;border-radius:16px;background:var(--accent-soft);display:grid;place-items:center;margin:0 auto 18px">
      <svg style="width:26px;height:26px;stroke:var(--accent);stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round" viewBox="0 0 24 24">
        <rect x="3" y="4" width="18" height="6" rx="1"/><rect x="3" y="14" width="18" height="6" rx="1"/>
      </svg>
    </div>
    <h4 style="font-size:16px;font-weight:800;color:var(--ink);margin-bottom:8px">Sélectionne une classe</h4>
    <p style="font-size:13px;color:var(--ink-2);line-height:1.6">
      Utilise le sélecteur de classe en haut à gauche pour choisir la classe sur laquelle travailler.
    </p>
  </div>
</div>
