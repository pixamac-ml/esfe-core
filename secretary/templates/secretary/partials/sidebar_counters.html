<span id="sg-sidebar-counters"
      hx-get="{% url 'secretary:htmx_sidebar_counters' %}"
      hx-trigger="secretary:sidebar-updated from:body"
      hx-swap="outerHTML"
      hidden></span>
<span id="sg-count-registry" class="sg-badge sg-badge-blue" hx-swap-oob="true">{{ pending_registry_count|default:0 }}</span>
<span id="sg-count-visits" class="sg-badge sg-badge-amber" hx-swap-oob="true">{{ active_visits|default:0 }}</span>
<span id="sg-count-documents" class="sg-badge sg-badge-amber" hx-swap-oob="true">{{ pending_documents_count|default:0 }}</span>
<span id="sg-count-appointments" class="sg-badge sg-badge-blue" hx-swap-oob="true">{{ appointments_today|default:0 }}</span>
<span id="sg-count-notifications" class="sg-badge sg-badge-red" hx-swap-oob="true">{{ messages_count|default:0 }}</span>
