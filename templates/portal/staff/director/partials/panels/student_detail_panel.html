<div class="overflow-x-auto">
  <table class="director-inline-table">
    <tbody>
      <tr>
        <th>Classe</th>
        <td>{{ selected_class.display_name }}</td>
      </tr>
      <tr>
        <th>Inscription</th>
        <td>{{ selected_student_entry.is_enrolled|yesno:"Active,Inactive" }}</td>
      </tr>
      <tr>
        <th>Matricule</th>
        <td>{{ selected_student_entry.matricule }}</td>
      </tr>
      <tr>
        <th>Email</th>
        <td>{{ selected_student_entry.email }}</td>
      </tr>
      <tr>
        <th>Actions directes</th>
        <td>
          <div class="flex flex-wrap gap-2">
            <button type="button" class="director-btn director-btn-secondary" hx-get="{% url 'accounts_portal:director_workspace' %}?section=academic&class_id={{ selected_class.id }}&week_start={{ week_start|date:'Y-m-d' }}" hx-target="#director-workspace" hx-swap="innerHTML">Voir la classe</button>
            <button type="button" class="director-btn director-btn-primary" hx-get="{% url 'accounts_portal:director_workspace' %}?section=results&class_id={{ selected_class.id }}" hx-target="#director-workspace" hx-swap="innerHTML">Voir les resultats</button>
            <button type="button" class="director-btn director-btn-secondary" hx-get="{% url 'accounts_portal:director_workspace' %}?section=documents" hx-target="#director-workspace" hx-swap="innerHTML">Ouvrir transferts</button>
          </div>
        </td>
      </tr>
    </tbody>
  </table>
</div>
