{% load component_tags %}

<style>
@keyframes slowZoom {
  0%   { transform: scale(1); }
  50%  { transform: scale(1.04); }
  100% { transform: scale(1); }
}

.zoom-slow {
  animation: slowZoom 24s ease-in-out infinite;
}
</style>

<section class="bg-neutral-50 py-20">
    <div class="max-w-7xl mx-auto px-6">
        <div class="grid lg:grid-cols-2 gap-12 items-stretch">

            <!-- IMAGE -->
            <div class="relative rounded-2xl overflow-hidden shadow-md">

                <div class="absolute inset-0 bg-gradient-to-t
                            from-black/45 via-black/10 to-transparent z-10">
                </div>

                <img
                    src="{{ image_url }}"
                    alt="Admission ESFE"
                    class="w-full h-full object-cover zoom-slow"
                />

                <div class="absolute bottom-8 left-8 z-20 text-white max-w-sm">
                    {% if image_text_title %}
                        <h3 class="text-xl md:text-2xl font-semibold mb-2 drop-shadow-md">
                            {{ image_text_title }}
                        </h3>
                    {% endif %}

                    {% if image_text_subtitle %}
                        <p class="text-white/85 text-sm drop-shadow-sm">
                            {{ image_text_subtitle }}
                        </p>
                    {% endif %}
                </div>
            </div>

            <!-- FORM -->
            <div class="flex items-center">
                <div class="w-full">
                    {% slot "content" %}
                    {% endslot %}
                </div>
            </div>

        </div>
    </div>
</section>
