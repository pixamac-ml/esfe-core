<div class="mb-10 space-y-4">
    <div class="flex flex-col gap-4 xl:flex-row xl:items-end xl:justify-between">
        <form
            hx-get="{{ request.path }}"
            hx-target="#topic-list-container"
            hx-swap="innerHTML"
            hx-push-url="true"
            hx-trigger="submit, keyup changed delay:250ms from:input[name='q']"
            class="w-full xl:max-w-2xl"
        >
            <input type="hidden" name="sort" value="{{ current_sort }}">
            <input type="hidden" name="focus" value="{{ current_focus }}">
            <label class="sr-only" for="community-search">Recherche</label>
            <input
                id="community-search"
                type="text"
                name="q"
                value="{{ query }}"
                placeholder="Rechercher un sujet, tag ou auteur..."
                class="w-full rounded-2xl border border-primary-200 bg-white px-4 py-3 text-sm text-gray-700 shadow-sm focus:outline-none focus:ring-2 focus:ring-primary-300"
            >
        </form>

        {% if user.is_authenticated %}
            <a href="{% url 'community:create_topic' %}"
               class="inline-flex items-center justify-center rounded-2xl bg-accent px-6 py-3 text-sm font-semibold text-white shadow-md transition-all duration-300 hover:-translate-y-0.5 hover:bg-accent-dark">
                <i class="fa-solid fa-plus mr-2 text-xs"></i>
                Nouveau sujet
            </a>
        {% endif %}
    </div>

    <div class="flex flex-wrap items-center gap-2">
        <a href="{{ request.path }}?sort={{ current_sort }}&q={{ query|urlencode }}"
           class="rounded-full border px-4 py-2 text-sm font-bold transition {% if not current_focus %}border-primary-300 bg-primary-50 text-primary-700{% else %}border-slate-200 bg-white text-slate-600 hover:bg-slate-50{% endif %}">
            Tout
        </a>
        <a href="{{ request.path }}?sort={{ current_sort }}&focus=pinned&q={{ query|urlencode }}"
           class="rounded-full border px-4 py-2 text-sm font-bold transition {% if current_focus == 'pinned' %}border-amber-300 bg-amber-50 text-amber-700{% else %}border-slate-200 bg-white text-slate-600 hover:bg-slate-50{% endif %}">
            Épinglés
        </a>
        <a href="{{ request.path }}?sort={{ current_sort }}&focus=unanswered&q={{ query|urlencode }}"
           class="rounded-full border px-4 py-2 text-sm font-bold transition {% if current_focus == 'unanswered' %}border-rose-300 bg-rose-50 text-rose-700{% else %}border-slate-200 bg-white text-slate-600 hover:bg-slate-50{% endif %}">
            Sans réponse
        </a>
        <a href="{{ request.path }}?sort={{ current_sort }}&focus=answered&q={{ query|urlencode }}"
           class="rounded-full border px-4 py-2 text-sm font-bold transition {% if current_focus == 'answered' %}border-emerald-300 bg-emerald-50 text-emerald-700{% else %}border-slate-200 bg-white text-slate-600 hover:bg-slate-50{% endif %}">
            Résolus
        </a>
    </div>

    <div class="flex flex-wrap gap-2 rounded-2xl border border-primary-100 bg-white p-1.5 shadow-sm w-fit">
        <button type="button"
                hx-get="{{ request.path }}?sort=active&focus={{ current_focus }}&q={{ query|urlencode }}"
                hx-target="#topic-list-container"
                hx-swap="innerHTML"
                hx-push-url="true"
                hx-indicator="#list-loader"
                class="px-4 py-2.5 rounded-xl transition-all duration-200 {% if current_sort == 'active' %}bg-primary-50 text-primary-700 font-semibold{% else %}hover:bg-primary-50 text-gray-600{% endif %}">
            <i class="fa-solid fa-fire mr-2 text-xs"></i>
            Actif
        </button>

        <button type="button"
                hx-get="{{ request.path }}?sort=hot&focus={{ current_focus }}&q={{ query|urlencode }}"
                hx-target="#topic-list-container"
                hx-swap="innerHTML"
                hx-push-url="true"
                hx-indicator="#list-loader"
                class="px-4 py-2.5 rounded-xl transition-all duration-200 {% if current_sort == 'hot' %}bg-primary-50 text-primary-700 font-semibold{% else %}hover:bg-primary-50 text-gray-600{% endif %}">
            <i class="fa-solid fa-bolt mr-2 text-xs"></i>
            Chaud
        </button>

        <button type="button"
                hx-get="{{ request.path }}?sort=recent&focus={{ current_focus }}&q={{ query|urlencode }}"
                hx-target="#topic-list-container"
                hx-swap="innerHTML"
                hx-push-url="true"
                hx-indicator="#list-loader"
                class="px-4 py-2.5 rounded-xl transition-all duration-200 {% if current_sort == 'recent' %}bg-primary-50 text-primary-700 font-semibold{% else %}hover:bg-primary-50 text-gray-600{% endif %}">
            <i class="fa-regular fa-clock mr-2 text-xs"></i>
            Récent
        </button>

        <button type="button"
                hx-get="{{ request.path }}?sort=answers&focus={{ current_focus }}&q={{ query|urlencode }}"
                hx-target="#topic-list-container"
                hx-swap="innerHTML"
                hx-push-url="true"
                hx-indicator="#list-loader"
                class="px-4 py-2.5 rounded-xl transition-all duration-200 {% if current_sort == 'answers' %}bg-primary-50 text-primary-700 font-semibold{% else %}hover:bg-primary-50 text-gray-600{% endif %}">
            <i class="fa-regular fa-comment-dots mr-2 text-xs"></i>
            Réponses
        </button>

        <button type="button"
                hx-get="{{ request.path }}?sort=views&focus={{ current_focus }}&q={{ query|urlencode }}"
                hx-target="#topic-list-container"
                hx-swap="innerHTML"
                hx-push-url="true"
                hx-indicator="#list-loader"
                class="px-4 py-2.5 rounded-xl transition-all duration-200 {% if current_sort == 'views' %}bg-primary-50 text-primary-700 font-semibold{% else %}hover:bg-primary-50 text-gray-600{% endif %}">
            <i class="fa-regular fa-eye mr-2 text-xs"></i>
            Vues
        </button>
    </div>
</div>
