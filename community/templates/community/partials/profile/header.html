<section class="bg-gradient-to-br from-primary-700 to-primary-800 text-white py-20">

<div class="max-w-6xl mx-auto px-4 flex items-center gap-6">

{% if profile_user.profile.avatar %}
<img src="{{ profile_user.profile.avatar.url }}"
class="w-24 h-24 rounded-full border-4 border-white object-cover shadow-lg">
{% else %}
<div class="w-24 h-24 rounded-full bg-white text-primary-700 flex items-center justify-center text-3xl font-bold">
{{ profile_user.username|first|upper }}
</div>
{% endif %}

<div class="flex-1">

<h1 class="text-3xl font-bold">
{{ profile_user.username }}
</h1>

{% if profile_user.profile.bio %}
<p class="text-primary-200 mt-2 max-w-xl">
{{ profile_user.profile.bio }}
</p>
{% endif %}

<div class="text-primary-200 text-sm mt-3 flex items-center gap-6">

<span class="flex items-center gap-2">
<i data-lucide="calendar"></i>
Membre depuis {{ profile_user.date_joined|date:"F Y" }}
</span>

<span class="flex items-center gap-2">
<i data-lucide="award"></i>
{{ stats.reputation }}
</span>

</div>

</div>

</div>

</section>
