{% extends "base.html" %}
{% block content %}

<div class="bg-soft min-h-screen py-16">
    <div class="max-w-md mx-auto bg-white p-10 rounded-xl shadow border border-primary-100">

        <h2 class="text-xl font-bold text-primary-700 mb-6">
            Modifier le mot de passe
        </h2>

        <form method="post" class="space-y-6">
            {% csrf_token %}
            {{ form.old_password }}
            {{ form.new_password1 }}
            {{ form.new_password2 }}

            <button type="submit"
                    class="w-full bg-primary-500 text-white py-3 rounded-lg">
                Mettre à jour
            </button>
        </form>

    </div>
</div>

{% endblock %}
