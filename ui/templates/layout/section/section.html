<section
  class="
    {% if variant == 'primary' %}
        bg-primary-500 text-white
    {% elif variant == 'secondary' %}
        bg-secondary text-white
    {% elif variant == 'soft' %}
        bg-soft text-gray-800
    {% else %}
        bg-white text-gray-800
    {% endif %}

    {% if padding == 'sm' %}
        section-frame-sm
    {% elif padding == 'lg' %}
        section-frame-lg
    {% else %}
        section-frame
    {% endif %}
  "
>
  <div class="container-shell">
    {{ content|safe }}
  </div>
</section>
