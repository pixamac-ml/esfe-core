{% load humanize %}
{% load custom_filters %}
<div class="flex items-center justify-between p-4 bg-green-50 rounded-lg border border-green-200" id="payment-row-{{ payment.id }}">
    <div>
        <p class="font-medium text-gray-800">{{ payment.inscription.candidature.full_name }}</p>
        <p class="text-sm text-gray-500">{{ payment.inscription.candidature.programme.title }}</p>
        <p class="text-xs text-gray-400">{{ payment.amount|intcomma }} F - {{ payment.get_method_display }}</p>
    </div>
    <span class="px-3 py-1.5 bg-green-100 text-green-700 text-sm rounded-lg">
        <i class="fas fa-check-circle"></i> Validé
    </span>
</div>
