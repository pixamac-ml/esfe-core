{% if state %}
<section class="workflow-band workflow-band-{{ state.code }}">
  <div>
    <p class="workflow-kicker">Etat du workflow</p>
    <h3>{{ state.label }}</h3>
    <p>{{ state.description }}</p>
  </div>
  <span>{{ state.entered_grades }}/{{ state.expected_grades }} notes</span>
</section>
{% if state.technical_alerts %}
<section class="workflow-table-shell">
  <p class="workflow-kicker">Controle technique</p>
  <div class="workflow-list">
    {% for alert in state.technical_alerts %}
    <article>
      <div>
        <strong>Alerte</strong>
        <span>{{ alert }}</span>
      </div>
    </article>
    {% endfor %}
  </div>
</section>
{% endif %}
{% endif %}
