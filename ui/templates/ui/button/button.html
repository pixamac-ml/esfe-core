{% if href %}
<a
  href="{{ href }}"
{% else %}
<button type="{{ type }}"
{% endif %}
  class="
    inline-flex items-center justify-center gap-2 font-semibold rounded-2xl transition-all duration-300 ease-premium
    focus:outline-none focus:ring-2 focus:ring-primary-200/70 focus:ring-offset-2

    {% if full_width %} w-full {% endif %}

    {% if size == 'sm' %}
        px-4 py-2 text-sm
    {% elif size == 'lg' %}
        px-7 py-3.5 text-base
    {% else %}
        px-5 py-3 text-sm
    {% endif %}

    {% if variant == 'primary' %}
        bg-accent text-white hover:bg-accent-dark shadow-soft hover:shadow-premium hover:-translate-y-0.5
    {% elif variant == 'secondary' %}
        bg-primary-500 text-white hover:bg-primary-600 shadow-soft hover:shadow-premium hover:-translate-y-0.5
    {% elif variant == 'outline' %}
        border border-primary-200 text-primary-600 bg-white/90 hover:bg-primary-50 hover:border-primary-300
    {% elif variant == 'ghost' %}
        text-primary-600 hover:bg-primary-50
    {% elif variant == 'soft' %}
        bg-slate-100 text-slate-700 hover:bg-slate-200
    {% endif %}

    {% if disabled %}
        opacity-50 pointer-events-none
    {% endif %}
  "
  aria-disabled="{{ disabled }}"
>
  {% if icon_left %}
    <span class="mr-2">{{ icon_left }}</span>
  {% endif %}

  {{ label }}

  {% if icon_right %}
    <span class="ml-2">{{ icon_right }}</span>
  {% endif %}
{% if href %}
</a>
{% else %}
</button>
{% endif %}
