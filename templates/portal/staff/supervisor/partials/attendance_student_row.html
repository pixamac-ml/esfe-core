<div id="sg-att-row-{{ row.student.id }}" class="p-4">
  <div class="flex flex-wrap items-center justify-between gap-3">
    <div class="min-w-[240px]">
      <p class="text-sm font-extrabold text-slate-900">{{ row.student.full_name }}</p>
      <p class="mt-1 text-xs font-semibold text-slate-500">{{ row.student.matricule }}</p>
    </div>

    <div class="flex items-center gap-2">
      {% if not roll_locked %}
        <button type="button"
                class="rounded-xl border border-slate-200 bg-white px-3 py-2 text-xs font-bold {% if row.status == 'present' %}text-emerald-700{% else %}text-slate-700{% endif %}"
                hx-post="{% url 'accounts_portal:supervisor_attendance_toggle_student' %}"
                hx-target="#sg-att-row-{{ row.student.id }}"
                hx-swap="outerHTML"
                hx-vals='{"schedule_event_id":"{{ selected_event.id }}","student_id":"{{ row.student.id }}","status":"present","justification":"{{ row.justification|default:''|escapejs }}"}'
        >Présent</button>
        <button type="button"
                class="rounded-xl border border-slate-200 bg-white px-3 py-2 text-xs font-bold {% if row.status == 'absent' %}text-rose-700{% else %}text-slate-700{% endif %}"
                hx-post="{% url 'accounts_portal:supervisor_attendance_toggle_student' %}"
                hx-target="#sg-att-row-{{ row.student.id }}"
                hx-swap="outerHTML"
                hx-vals='{"schedule_event_id":"{{ selected_event.id }}","student_id":"{{ row.student.id }}","status":"absent","justification":"{{ row.justification|default:''|escapejs }}"}'
        >Absent</button>
      {% else %}
        <span class="rounded-full bg-slate-100 px-3 py-1 text-xs font-bold text-slate-700">{{ row.status }}</span>
      {% endif %}
    </div>
  </div>

  <div class="mt-3">
    <label class="block text-xs font-bold text-slate-600">Motif absence (optionnel)</label>
    <input type="text"
           class="mt-1 w-full rounded-xl border border-slate-200 px-3 py-2 text-sm"
           value="{{ row.justification }}"
           {% if roll_locked %}disabled{% endif %}
           hx-post="{% url 'accounts_portal:supervisor_attendance_toggle_student' %}"
           hx-trigger="change"
           hx-target="#sg-att-row-{{ row.student.id }}"
           hx-swap="outerHTML"
           hx-vals='{"schedule_event_id":"{{ selected_event.id }}","student_id":"{{ row.student.id }}","status":"{{ row.status }}"}'
           name="justification"
    >
  </div>
</div>
