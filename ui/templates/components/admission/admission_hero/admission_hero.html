<section class="relative overflow-hidden">

    <!-- Dégradé plus subtil -->
    <div class="absolute inset-0 bg-gradient-to-br
                from-[#0f2c59]
                via-[#123a6b]
                to-[#1b4f8c]">
    </div>

    <!-- Pattern discret -->
    <div class="absolute inset-0 opacity-[0.05]"
         style="background-image: radial-gradient(circle at 1px 1px, white 1px, transparent 0);
                background-size: 28px 28px;">
    </div>

    <div class="relative max-w-5xl mx-auto px-6 py-20 text-center text-white">

        {% if badge %}
            <span class="inline-flex items-center gap-2
                         bg-white/15 backdrop-blur-sm
                         px-5 py-1.5
                         rounded-full
                         text-sm
                         font-medium
                         tracking-wide
                         uppercase
                         mb-6">

                <!-- Icône calendrier -->
                <svg xmlns="http://www.w3.org/2000/svg"
                     class="w-4 h-4 opacity-80"
                     fill="none"
                     viewBox="0 0 24 24"
                     stroke="currentColor">
                    <path stroke-linecap="round"
                          stroke-linejoin="round"
                          stroke-width="1.5"
                          d="M8 7V3m8 4V3m-9 8h10m-11 8h12a2 2 0 002-2V7a2 2 0 00-2-2H6a2 2 0 00-2 2v10a2 2 0 002 2z" />
                </svg>

                {{ badge }}
            </span>
        {% endif %}

        <h1 class="text-3xl md:text-4xl font-semibold mb-4">
            {{ title }}
        </h1>

        {% if subtitle %}
            <p class="text-base md:text-lg text-white/80 max-w-2xl mx-auto">
                {{ subtitle }}
            </p>
        {% endif %}

    </div>

</section>
