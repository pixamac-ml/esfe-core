{% load humanize %}
<tr id="donation-row-{{ donation.id }}">
  <td style="font-weight:800;">{{ donation.donor_name }}</td>
  <td>{{ donation.amount|intcomma }} FCFA</td>
  <td>{{ donation.get_motif_display }}</td>
  <td>{{ donation.get_payment_method_display }}</td>
  <td>{{ donation.date|date:"d/m/Y" }}</td>
  <td>{{ donation.receipt_number|default:"-" }}</td>
</tr>
