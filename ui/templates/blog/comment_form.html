<form method="post"
      action="{{ article.get_absolute_url }}"
      class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8 space-y-8">

  {% csrf_token %}

  <!-- Honeypot anti-spam -->
  <input type="text"
         name="website"
         class="hidden"
         autocomplete="off">

  <!-- Header -->
  <div class="flex items-center gap-3">
    <div class="bg-[#0f2c59]/10 p-2 rounded-lg">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-[#0f2c59]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M8 10h.01M12 10h.01M16 10h.01M21 12c0 4.418-4.03 8-9 8a9.77 9.77 0 01-4-.8L3 20l1.2-3.6A7.7 7.7 0 013 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
      </svg>
    </div>
    <h3 class="text-lg font-semibold text-gray-900">
      Laisser un commentaire
    </h3>
  </div>

  <!-- Nom -->
  <div class="space-y-2">
    <label class="text-sm font-medium text-gray-700">
      Votre nom
    </label>
    <input type="text"
           name="author_name"
           required
           class="w-full rounded-xl border border-gray-300 px-4 py-3
                  focus:ring-2 focus:ring-[#0f2c59]
                  focus:border-[#0f2c59]
                  transition duration-200">
  </div>

  <!-- Email -->
  <div class="space-y-2">
    <label class="text-sm font-medium text-gray-700">
      Votre email
    </label>
    <input type="email"
           name="author_email"
           required
           class="w-full rounded-xl border border-gray-300 px-4 py-3
                  focus:ring-2 focus:ring-[#0f2c59]
                  focus:border-[#0f2c59]
                  transition duration-200">
  </div>

  <!-- Commentaire -->
  <div class="space-y-2">
    <label class="text-sm font-medium text-gray-700">
      Votre commentaire
    </label>
    <textarea name="content"
              rows="5"
              required
              class="w-full rounded-xl border border-gray-300 px-4 py-3
                     focus:ring-2 focus:ring-[#0f2c59]
                     focus:border-[#0f2c59]
                     transition duration-200 resize-none"></textarea>
  </div>

  <!-- Submit -->
  <div class="flex justify-end">
    <button type="submit"
            class="inline-flex items-center gap-2
                   bg-[#0f2c59] text-white px-6 py-3 rounded-xl
                   font-medium hover:bg-[#0c2347]
                   transition duration-200 shadow-sm">

      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M3 10l9-6 9 6-9 6-9-6zm0 4l9 6 9-6" />
      </svg>

      Publier le commentaire
    </button>
  </div>

</form>
