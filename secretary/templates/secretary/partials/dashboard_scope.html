<div id="sg-dashboard-scope"
     class="sg-scope-bar"
     hx-get="{% url 'secretary:htmx_dashboard_scope' %}"
     hx-trigger="secretary:kpis-updated from:body, secretary:registry-updated from:body, secretary:visits-updated from:body"
     hx-swap="outerHTML">
  <span class="sg-scope-chip"><i class="fa-solid fa-building" style="margin-right:4px;"></i>{{ branch.name|default:"Annexe non definie" }}</span>
  <span class="sg-scope-chip"><i class="fa-solid fa-clock" style="margin-right:4px;"></i><span data-sg-clock></span></span>
  <span class="sg-scope-chip"><i class="fa-solid fa-route" style="margin-right:4px;"></i>{{ pending_registry_count|default:0 }} entrees a router</span>
  <span class="sg-scope-chip"><i class="fa-solid fa-user-clock" style="margin-right:4px;"></i>{{ active_visits|default:0 }} visites ouvertes</span>
</div>
