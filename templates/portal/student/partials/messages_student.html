<div class="mb-5 flex items-start justify-between gap-3">
  <div>
    <p class="student-section-kicker">Communication</p>
    <h3 class="mt-1 student-section-title">Messages recents</h3>
  </div>
  <button
    type="button"
    class="inline-flex items-center gap-2 rounded-full border border-[color:var(--line)] bg-[color:var(--card)] px-3 py-2 text-xs font-extrabold text-[color:var(--muted)]"
    @click="refreshSection('messages')"
  >
    <span class="htmx-indicator">Actualisation...</span>
    <span>Actualiser</span>
  </button>
</div>

{% if messages %}
  <div class="grid gap-3">
    {% for message in messages %}
      <div class="flex items-start gap-3 rounded-lg border border-[color:var(--line)] bg-[color:var(--card-soft)] p-3.5">
        <div class="grid h-10 w-10 shrink-0 place-items-center rounded-lg bg-[color:var(--school-primary-soft)] font-black text-[color:var(--school-primary-dark)]">
          {{ message.name|slice:":1"|upper }}
        </div>
        <div class="min-w-0 flex-1">
          <strong class="block truncate text-sm text-[color:var(--text)]">{{ message.name }}</strong>
          <span class="mt-1 block text-xs leading-5 text-[color:var(--muted)]">{{ message.text }}</span>
        </div>
        <span class="shrink-0 text-[11px] font-extrabold text-[color:var(--muted-2)]">{{ message.time }}</span>
      </div>
    {% endfor %}
  </div>
{% else %}
  <div class="rounded-xl border border-dashed border-[color:var(--line)] bg-[color:var(--card-soft)] p-5 text-sm text-[color:var(--muted)]">
    Aucun message recent.
  </div>
{% endif %}
