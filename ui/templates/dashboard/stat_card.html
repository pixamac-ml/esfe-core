{% load component_tags %}
<a
  {% if href %}href="{{ href }}"{% endif %}
  class="group block rounded-xl border border-[color:var(--line)] bg-[color:var(--card)] px-4 py-4 transition hover:border-[color:var(--school-primary)]/30 hover:shadow-[0_8px_24px_rgba(15,23,42,0.06)]"
>
  <div class="flex items-start justify-between">
    <div class="min-w-0">
      <span class="block text-[11px] font-bold uppercase tracking-wide text-[color:var(--muted)]">{{ label }}</span>
      <strong class="mt-1 block truncate text-2xl font-black tracking-tight text-[color:var(--text)]">{{ value }}</strong>
    </div>
    {% if icon %}
      <span class="grid h-10 w-10 shrink-0 place-items-center rounded-xl
        {% if tone == 'success' %}bg-[color:var(--success-soft)] text-[color:var(--success)]
        {% elif tone == 'warning' %}bg-[color:var(--warning-soft)] text-[color:var(--warning)]
        {% elif tone == 'danger' %}bg-[color:var(--danger-soft)] text-[color:var(--danger)]
        {% else %}bg-[color:var(--school-primary-soft)] text-[color:var(--school-primary)]{% endif %}">
        <i data-lucide="{{ icon }}" style="width:20px;height:20px;"></i>
      </span>
    {% endif %}
  </div>
  {% if trend != 0 %}
    <div class="mt-3 flex items-center gap-1.5">
      <span class="inline-flex items-center gap-0.5 text-xs font-bold
        {% if trend > 0 %}text-[color:var(--success)]
        {% elif trend < 0 %}text-[color:var(--danger)]
        {% else %}text-[color:var(--muted)]{% endif %}">
        {% if trend > 0 %}<i data-lucide="trending-up" style="width:14px;height:14px;"></i>
        {% elif trend < 0 %}<i data-lucide="trending-down" style="width:14px;height:14px;"></i>{% endif %}
        {{ trend }}%
      </span>
      {% if trend_label %}
        <span class="text-xs text-[color:var(--muted-2)]">{{ trend_label }}</span>
      {% endif %}
    </div>
  {% endif %}
</a>
