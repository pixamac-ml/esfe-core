{% load component_tags %}
<div class="flex flex-wrap items-center justify-between gap-3 {{ class_str }}">
  <div class="flex flex-wrap items-center gap-2">
    {% slot "left" %}
      {% if total_count > 0 %}
        <span class="text-xs font-bold text-[color:var(--muted-2)]">{{ total_count }} {{ count_label }}{% if total_count > 1 %}s{% endif %}</span>
      {% endif %}
    {% endslot %}
  </div>
  <div class="flex flex-wrap items-center gap-2">
    {% slot "right" %}
      <div class="flex items-center gap-2">
        {% slot "actions" %}{% endslot %}
      </div>
    {% endslot %}
  </div>
</div>
