{% load humanize %}
<div id="widget-sidebar-badges"
     hx-get="{% url 'accounts:widget_sidebar_badges' %}"
     hx-trigger="every 30s, candidatureUpdated from:body, paymentUpdated from:body"
     hx-swap="outerHTML"
     style="display:contents;">
  {% if candidatures_pending %}
  <span class="dg-badge" data-badge="candidatures">{{ candidatures_pending }}</span>
  {% endif %}
  {% if pending_payments %}
  <span class="dg-badge" data-badge="payments">{{ pending_payments }}</span>
  {% endif %}
</div>
