<div class="flex flex-wrap items-center justify-between gap-3">
    <div class="text-sm text-slate-500">Actions groupées métier sur les inscriptions sélectionnées.</div>
    <div class="flex items-center gap-2">
        <select name="action" form="inscription-bulk-form" class="rounded-lg border border-slate-300 px-3 py-2 text-sm">
            <option value="">Action groupée...</option>
            <option value="awaiting_payment">Passer en attente paiement</option>
            <option value="partial_paid">Passer en partiel</option>
            <option value="active">Activer</option>
            <option value="suspended">Suspendre</option>
            <option value="cancelled">Annuler</option>
            <option value="completed">Terminer</option>
            <option value="relance">Enregistrer une relance</option>
            <option value="regenerate_access_code">Régénérer code d'accès</option>
            <option value="archive">Archiver</option>
            <option value="restore">Restaurer</option>
        </select>
        <button type="submit" form="inscription-bulk-form" class="btn btn-secondary"><i class="fas fa-layer-group"></i>Appliquer</button>
    </div>
</div>
