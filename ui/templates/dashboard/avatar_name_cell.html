<div class="flex items-center gap-2.5">
  {% if photo_url %}
    <img src="{{ photo_url }}" alt="{{ name }}" class="h-8 w-8 rounded-full object-cover border border-[color:var(--line)]">
  {% else %}
    <span class="flex h-8 w-8 items-center justify-center rounded-full bg-[color:var(--school-primary-soft)] text-[10px] font-black text-[color:var(--school-primary)]">{{ initials }}</span>
  {% endif %}
  <div class="min-w-0">
    <span class="block truncate text-sm font-bold text-[color:var(--text)]">{{ name }}</span>
    {% if subtitle %}
      <span class="block truncate text-[11px] font-semibold text-[color:var(--muted-2)]">{{ subtitle }}</span>
    {% endif %}
  </div>
</div>
