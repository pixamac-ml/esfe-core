<h2 class="font-semibold text-lg mb-4 text-gray-800">Situation académique</h2>
<div class="flex flex-col h-full justify-between">
  <div class="mb-4">
    <div class="flex items-center gap-2 mb-2">
      <span class="text-2xl font-bold text-blue-600">{{ average }}</span>
      <span class="px-2 py-1 text-xs rounded bg-blue-100 text-blue-600 font-semibold tracking-wide">{{ status }}</span>
    </div>
    <div class="flex flex-wrap gap-3 mb-1">
      <span class="text-gray-500 text-xs">Crédits : <span class="font-semibold text-gray-700">{{ credits }}</span></span>
      <span class="text-gray-500 text-xs">Semestre : <span class="font-semibold text-gray-700">{{ semester }}</span></span>
    </div>
    <div class="flex flex-wrap gap-3 mb-1">
      <span class="text-gray-500 text-xs">Formation : <span class="font-semibold text-gray-700">{{ formation }}</span></span>
      <span class="text-gray-500 text-xs">Classe : <span class="font-semibold text-gray-700">{{ classroom }}</span></span>
    </div>
  </div>
  <div class="w-full h-2 bg-gray-200 rounded-full overflow-hidden mt-2">
    <div class="h-full bg-gradient-to-r from-blue-400 to-blue-600 transition-all duration-300" style="width:{{ progress }}%"></div>
  </div>
</div>
