{% load component_tags %}
<div class="flex items-center gap-3 {% if align == 'right' %}justify-end{% elif align == 'center' %}justify-center{% else %}justify-start{% endif %} {{ class_str }}">
  {% if cancel_url %}
    <a href="{{ cancel_url }}" class="text-sm font-semibold text-[color:var(--muted)] hover:text-[color:var(--text)] transition px-4 py-2">Annuler</a>
  {% endif %}
  <button type="submit" class="inline-flex items-center justify-center gap-2 rounded-lg bg-[color:var(--school-primary)] px-5 py-2.5 text-sm font-bold text-white transition hover:opacity-90 focus:outline-none focus:ring-2 focus:ring-[color:var(--school-primary-soft)] focus:ring-offset-2">
    {% slot "default" %}{{ submit_label }}{% endslot %}
  </button>
</div>
