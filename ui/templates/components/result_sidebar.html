<div class="bg-white rounded-xl shadow-sm border p-6">

    <h3 class="text-sm font-semibold uppercase tracking-wide text-gray-500 mb-6">
        Années académiques
    </h3>

    {% for annee in annees %}
        <div class="mb-4">

            <div class="text-sm font-medium text-gray-700 mb-2">
                {{ annee }}
            </div>

            <div class="ml-3 space-y-1">
                {% for annexe in annexes_par_annee.annee %}
                    <a href="?annee={{ annee }}&annexe={{ annexe }}"
                       class="block text-xs px-3 py-1 rounded-md
                           {% if current_annexe == annexe %}
                               bg-primary-600 text-white
                           {% else %}
                               hover:bg-gray-100
                           {% endif %}
                       transition">
                        {{ annexe }}
                    </a>
                {% endfor %}
            </div>

        </div>
    {% endfor %}

</div>
