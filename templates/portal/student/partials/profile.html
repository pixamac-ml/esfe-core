<h2 class="font-semibold text-lg mb-4 text-gray-800">Profil</h2>
<div class="flex flex-col h-full justify-between">
  <div class="flex items-center gap-4 mb-5">
    {% if photo_url %}
      <img src="{{ photo_url }}" alt="Photo de profil" class="w-16 h-16 rounded-full object-cover border-2 border-blue-100 shadow" />
    {% else %}
      <div class="w-16 h-16 rounded-full bg-blue-100 flex items-center justify-center text-2xl font-bold text-blue-600 border-2 border-blue-200 shadow">
        {{ full_name|default:"?"|slice:":1"|upper }}
      </div>
    {% endif %}
    <div>
      <div class="font-semibold text-lg text-gray-900">{{ full_name }}</div>
      <div class="text-gray-500 text-sm mt-1">{{ email }}</div>
      <div class="text-gray-400 text-xs mt-1">{{ phone }}</div>
    </div>
  </div>
  <div class="space-y-1 text-sm text-gray-600">
    <div class="flex items-center gap-2">
      <span class="font-medium text-gray-700">Matricule :</span> <span>{{ matricule }}</span>
    </div>
    <div class="flex items-center gap-2">
      <span class="font-medium text-gray-700">Formation :</span> <span>{{ formation }}</span>
    </div>
    <div class="flex items-center gap-2">
      <span class="font-medium text-gray-700">Classe :</span> <span>{{ classroom }}</span>
    </div>
    <div class="flex items-center gap-2">
      <span class="font-medium text-gray-700">Annexe :</span> <span>{{ annexe }}</span>
    </div>
  </div>
</div>
