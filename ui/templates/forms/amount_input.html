<div class="relative {{ class_str }}">
  <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3">
    <span class="text-sm font-bold text-[color:var(--muted)]">{{ currency }}</span>
  </div>
  <input
    type="text"
    inputmode="numeric"
    name="{{ name }}"
    id="{{ name }}"
    value="{{ value }}"
    placeholder="{{ placeholder }}"
    {% if required %}required{% endif %}
    {% if disabled %}disabled{% endif %}
    x-data
    x-on:input.debounce.200ms="$el.value = $el.value.replace(/[^0-9]/g, '')"
    class="block w-full rounded-lg border bg-[color:var(--card)] pl-14 pr-3 py-2.5 text-sm text-[color:var(--text)] placeholder:text-[color:var(--muted-2)] transition outline-none text-right font-bold
           border-[color:var(--line)] focus:border-[color:var(--school-primary)] focus:ring-2 focus:ring-[color:var(--school-primary-soft)]
           {% if errors %}border-[color:var(--danger)]! focus:border-[color:var(--danger)]! focus:ring-[color:var(--danger-soft)]!{% endif %}
           {% if disabled %}opacity-50 pointer-events-none{% endif %}"
  >
</div>
{% for error in errors %}
  <p class="text-xs font-semibold text-[color:var(--danger)] mt-1">{{ error }}</p>
{% endfor %}
