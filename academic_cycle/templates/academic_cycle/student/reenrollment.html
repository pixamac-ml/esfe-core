{% extends "base.html" %}
{% block content %}
<main class="mx-auto max-w-4xl px-4 py-6">
  <h1 class="text-2xl font-semibold">Reinscription {{ reenrollment.target_academic_year }}</h1>
  <p>Classe cible : {{ reenrollment.target_class|default:"A confirmer" }}</p>
  <form method="post">
    {% csrf_token %}
    <button type="submit">Soumettre la reinscription</button>
  </form>
</main>
{% endblock %}
