{% if academic_class and semester %}
<section class="workflow-table-shell">
  <div class="workflow-table-head">
    <div>
      <p class="workflow-kicker">Grille de notes</p>
      <h3>{{ academic_class.display_name }} - Semestre {{ semester.number }}</h3>
    </div>
  </div>
  <div
    id="notes-workspace"
    class="workflow-grid-placeholder"
    hx-get="{% url 'accounts_portal:load_notes_workspace' %}?classe={{ academic_class.id }}&semester={{ semester.id }}"
    hx-trigger="load"
    hx-target="#notes-workspace"
    hx-swap="innerHTML"
  >
    Chargement automatique de la maquette...
  </div>
</section>
{% endif %}
