<div class="flex items-center gap-2">
  {% if icon %}
    <span class="flex h-7 w-7 items-center justify-center rounded-md
      {% if color == 'success' %}bg-[color:var(--success-soft)] text-[color:var(--success)]
      {% elif color == 'warning' %}bg-[color:var(--warning-soft)] text-[color:var(--warning)]
      {% elif color == 'danger' %}bg-[color:var(--danger-soft)] text-[color:var(--danger)]
      {% elif color == 'primary' %}bg-[color:var(--school-primary-soft)] text-[color:var(--school-primary)]
      {% else %}bg-[color:var(--card-soft)] text-[color:var(--muted)]{% endif %}">
      <i data-lucide="{{ icon }}" style="width:12px;height:12px;"></i>
    </span>
  {% endif %}
  <div>
    <strong class="block text-sm font-black text-[color:var(--text)]">{{ value }}</strong>
    <span class="text-[10px] font-bold uppercase tracking-wide text-[color:var(--muted-2)]">{{ label }}</span>
  </div>
</div>
