

<style>
@keyframes patternMove {
  0% { background-position: 0 0; }
  100% { background-position: 40px 40px; }
}
</style>
<section class="relative overflow-hidden">

    <!-- Dégradé institutionnel équilibré -->
    <div class="absolute inset-0 bg-gradient-to-br
                from-[#0e2a47]
                via-[#14406b]
                to-[#1d5f96]">
    </div>

    <!-- Pattern discret -->
    <div class="absolute inset-0 opacity-[0.06]"
         style="background-image: radial-gradient(circle at 1px 1px, white 1px, transparent 0);
                background-size: 32px 32px;
                animation: patternMove 25s linear infinite;">
    </div>

    <div class="relative max-w-5xl mx-auto px-6 py-24 text-center text-white">

        {% if badge %}
            <span class="inline-flex items-center gap-2
                         bg-white/12 backdrop-blur-sm
                         px-6 py-2.5
                         rounded-full
                         text-base
                         font-semibold
                         tracking-wide
                         uppercase
                         mb-8">

                <svg xmlns="http://www.w3.org/2000/svg"
                     class="w-5 h-5 opacity-90"
                     fill="none"
                     viewBox="0 0 24 24"
                     stroke="currentColor">
                    <path stroke-linecap="round"
                          stroke-linejoin="round"
                          stroke-width="1.5"
                          d="M8 7V3m8 4V3m-9 8h10m-11 8h12a2 2 0 002-2V7a2 2 0 00-2-2H6a2 2 0 00-2 2v10a2 2 0 002 2z" />
                </svg>

                {{ badge }}
            </span>
        {% endif %}

        <h1 class="text-4xl md:text-5xl font-bold text-white mb-6">
            {{ title }}
        </h1>

        {% if subtitle %}
            <p class="text-lg md:text-xl text-white/85 max-w-2xl mx-auto">
                {{ subtitle }}
            </p>
        {% endif %}

    </div>

</section>
