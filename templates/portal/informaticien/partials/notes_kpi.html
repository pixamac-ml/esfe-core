<div
  id="notes-kpi"
  class="kpi-grid"
  style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:16px"
  hx-trigger="kpi-update from:body"
  hx-get="{% url 'accounts_portal:it_notes_kpi' %}?class_id={{ class_id }}&semester_id={{ semester_id }}"
  hx-target="#notes-kpi"
  hx-swap="outerHTML"
>
  <div class="kpi-card" style="background:white;border:1px solid #e2e8f0;border-radius:14px;padding:16px;box-shadow:0 4px 12px rgba(15,23,42,.06)">
    <p style="font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;color:#64748b;margin:0">Étudiants</p>
    <p style="font-size:28px;font-weight:900;color:#0f172a;margin:4px 0 0">{{ enrollment_count }}</p>
    <p style="font-size:11px;color:#94a3b8;margin:2px 0 0">{{ expected_grades }} notes attendues</p>
  </div>
  <div class="kpi-card" style="background:white;border:1px solid #e2e8f0;border-radius:14px;padding:16px;box-shadow:0 4px 12px rgba(15,23,42,.06)">
    <p style="font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;color:#64748b;margin:0">Saisie</p>
    <p style="font-size:28px;font-weight:900;color:#2563eb;margin:4px 0 0">{{ progress }}%</p>
    <p style="font-size:11px;color:#94a3b8;margin:2px 0 0">{{ entered_grades }}/{{ expected_grades }}</p>
  </div>
  <div class="kpi-card" style="background:white;border:1px solid #e2e8f0;border-radius:14px;padding:16px;box-shadow:0 4px 12px rgba(15,23,42,.06)">
    <p style="font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;color:#64748b;margin:0">Validé</p>
    <p style="font-size:28px;font-weight:900;color:#16a34a;margin:4px 0 0">{{ validated_grades }}</p>
    <p style="font-size:11px;color:#94a3b8;margin:2px 0 0">EC validés</p>
  </div>
  <div class="kpi-card" style="background:white;border:1px solid #e2e8f0;border-radius:14px;padding:16px;box-shadow:0 4px 12px rgba(15,23,42,.06)">
    <p style="font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;color:#64748b;margin:0">Échecs</p>
    <p style="font-size:28px;font-weight:900;color:#dc2626;margin:4px 0 0">{{ failed_grades }}</p>
    <p style="font-size:11px;color:#94a3b8;margin:2px 0 0">EC non validés</p>
  </div>
  <div class="kpi-card" style="background:white;border:1px solid #e2e8f0;border-radius:14px;padding:16px;box-shadow:0 4px 12px rgba(15,23,42,.06)">
    <p style="font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;color:#64748b;margin:0">Dettes</p>
    <p style="font-size:28px;font-weight:900;color:#d97706;margin:4px 0 0">{{ pending_debts }}</p>
    <p style="font-size:11px;color:#94a3b8;margin:2px 0 0">Actives</p>
  </div>
</div>
