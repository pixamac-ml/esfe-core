{% if toast %}
<div class="sg-toast-inline sg-toast-{{ toast.level }}">{{ toast.message }}</div>
{% if toast.level == 'success' %}
<script>window.setTimeout(function(){ sgClose(); sgToast('Mot de passe modifie', '', 'success'); sgPlaySound('success'); }, 800);</script>
{% endif %}
{% endif %}

<div class="sg-modal-header">
  <div>
    <div class="sg-modal-title"><i class="fa-solid fa-key" style="margin-right:8px;color:#2563eb;"></i>Changer mot de passe</div>
    <div class="sg-modal-sub">Votre mot de passe doit contenir au moins 8 caracteres.</div>
  </div>
  <button type="button" onclick="sgClose()" class="sg-modal-close" aria-label="Fermer"><i class="fa-solid fa-xmark"></i></button>
</div>

<form method="post" action="{% url 'accounts_portal:teacher_change_password_modal' %}"
      hx-post="{% url 'accounts_portal:teacher_change_password_modal' %}"
      hx-target="#sg-modal-content" hx-swap="innerHTML">
  {% csrf_token %}
  <div class="sg-form-grid">
    <div class="field">
      <label><i class="fa-solid fa-lock" style="margin-right:4px;"></i>Mot de passe actuel</label>
      <input type="password" name="current_password" class="sg-form-input" required placeholder="Votre mot de passe actuel">
    </div>
    <div class="field">
      <label><i class="fa-solid fa-lock-open" style="margin-right:4px;"></i>Nouveau mot de passe</label>
      <input type="password" name="new_password1" class="sg-form-input" required placeholder="Au moins 8 caracteres" minlength="8">
    </div>
    <div class="field">
      <label><i class="fa-solid fa-check-double" style="margin-right:4px;"></i>Confirmer le nouveau mot de passe</label>
      <input type="password" name="new_password2" class="sg-form-input" required placeholder="Confirmation">
    </div>
  </div>
  <div class="sg-form-note" style="margin-top:8px;"><i class="fa-solid fa-circle-info"></i> Utilisez un mot de passe fort, melange de lettres, chiffres et symboles.</div>
  <div class="sg-modal-footer">
    <button type="button" onclick="sgClose()" class="sg-btn sg-btn-outline">Annuler</button>
    <button type="submit" class="sg-btn sg-btn-primary"><i class="fa-solid fa-save"></i>Changer le mot de passe</button>
  </div>
</form>
