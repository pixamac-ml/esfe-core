{% extends "base.html" %}
{% block content %}

<div class="min-h-screen flex items-center justify-center bg-soft">
    <div class="bg-white p-10 rounded-xl shadow border border-primary-100 w-full max-w-md">

        <form method="post" class="space-y-6">
            {% csrf_token %}
            {{ form.new_password1 }}
            {{ form.new_password2 }}

            <button type="submit"
                    class="w-full bg-primary-500 text-white py-3 rounded-lg">
                Confirmer
            </button>
        </form>

    </div>
</div>

{% endblock %}
