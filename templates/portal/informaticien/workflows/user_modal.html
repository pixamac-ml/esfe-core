<div class="fixed inset-0 z-[120] grid place-items-center bg-slate-950/55 p-4" onclick="if(event.target===this){document.getElementById('it-modal-root').innerHTML='';}">
  <section class="w-full max-w-2xl rounded-2xl border border-slate-200 bg-white p-5 shadow-2xl dark:border-slate-700 dark:bg-slate-900">
    <div class="mb-4 flex items-start justify-between gap-4">
      <div>
        <p class="workflow-kicker">Voir / Modifier utilisateur</p>
        <h3 class="mt-1 text-xl font-black">{{ target_user.get_full_name|default:target_user.username }}</h3>
      </div>
      <button type="button" class="workflow-btn workflow-btn-secondary" onclick="document.getElementById('it-modal-root').innerHTML = ''"><i data-lucide="x" class="h-4 w-4"></i> Fermer</button>
    </div>

    {% if toast %}
    <section class="workflow-toast workflow-toast-{{ toast.level }}">{{ toast.message }}</section>
    {% endif %}

    <form
      class="grid gap-4"
      method="post"
      action="{% url 'accounts_portal:it_user_modal_save' target_user.id %}"
      hx-post="{% url 'accounts_portal:it_user_modal_save' target_user.id %}"
      hx-target="#it-modal-root"
      hx-swap="innerHTML"
    >
      {% csrf_token %}
      <div class="grid gap-3 sm:grid-cols-2">
        <label class="grid gap-1 text-sm font-bold">Nom
          <input class="rounded-xl border border-slate-200 px-3 py-2 dark:border-slate-700 dark:bg-slate-950" name="last_name" value="{{ target_user.last_name }}">
        </label>
        <label class="grid gap-1 text-sm font-bold">Prenom
          <input class="rounded-xl border border-slate-200 px-3 py-2 dark:border-slate-700 dark:bg-slate-950" name="first_name" value="{{ target_user.first_name }}">
        </label>
        <label class="grid gap-1 text-sm font-bold">Email
          <input class="rounded-xl border border-slate-200 px-3 py-2 dark:border-slate-700 dark:bg-slate-950" type="email" name="email" value="{{ target_user.email }}">
        </label>
        <div class="grid gap-1 text-sm font-bold">Role
          <span class="rounded-xl border border-slate-200 px-3 py-2 text-slate-500 dark:border-slate-700 dark:text-slate-300">{{ profile.get_position_display|default:"Non renseigne" }}</span>
        </div>
        <div class="grid gap-1 text-sm font-bold">Annexe
          <span class="rounded-xl border border-slate-200 px-3 py-2 text-slate-500 dark:border-slate-700 dark:text-slate-300">{{ profile.branch.name|default:"Non rattache" }}</span>
        </div>
        <label class="flex items-center gap-2 text-sm font-bold">
          <input type="checkbox" name="is_active" value="1" {% if target_user.is_active %}checked{% endif %}>
          Compte actif
        </label>
      </div>
      <button class="workflow-btn workflow-btn-primary" type="submit"><i data-lucide="save" class="h-4 w-4"></i> Enregistrer</button>
    </form>
  </section>
</div>
