{% if related_articles %}
<div class="space-y-6">

  <h3 class="text-2xl font-semibold text-gray-900">
    Articles similaires
  </h3>

  <div class="grid md:grid-cols-2 gap-6">
    {% for article in related_articles %}
      {% component "related_article_card" article=article %}
      {% endcomponent %}
    {% endfor %}
  </div>

</div>
{% endif %}
