<article
  class="group bg-white rounded-xl border border-gray-200
         overflow-hidden transition-all duration-300
         shadow-sm hover:shadow-lg hover:-translate-y-1"
>

  <!-- IMAGE -->
  <div class="relative h-40 overflow-hidden bg-gray-100">

    {% if article.featured_image %}
      <img
        src="{{ article.featured_image.url }}"
        alt="{{ article.title }}"
        class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105"
        loading="lazy"
      >
    {% else %}
      <div class="w-full h-full flex items-center justify-center text-gray-400 text-xs bg-gray-50">
        Image non disponible
      </div>
    {% endif %}

    {% if article.category %}
      <div class="absolute top-3 left-3">
        <span class="px-2 py-0.5 text-[10px] font-medium
                     bg-[#0f2c59] text-white rounded-full shadow">
          {{ article.category.name }}
        </span>
      </div>
    {% endif %}

  </div>

  <!-- CONTENT -->
  <div class="p-4">

    <h3 class="text-sm font-semibold text-gray-900 leading-snug
               transition-colors duration-200
               group-hover:text-[#0f2c59]">

      <a href="{{ article.get_absolute_url }}">
        {{ article.title|truncatechars:70 }}
      </a>

    </h3>

    <div class="mt-3 flex items-center justify-between text-xs text-gray-500">

      {% if article.published_at %}
        <span>
          {{ article.published_at|date:"d M Y" }}
        </span>
      {% endif %}

      <span class="text-[#0f2c59] font-medium opacity-0
                   group-hover:opacity-100 transition-opacity duration-200">
        Lire →
      </span>

    </div>

  </div>

</article>
