{% extends "base.html" %}

{% block title %}Candidature envoyee | ESFE{% endblock %}

{% block content %}
<section class="bg-slate-50 py-16">
  <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="rounded-3xl border border-slate-200 bg-white p-8 text-center shadow-sm" data-aos="fade-up">
      <p class="text-sm uppercase tracking-widest text-[#1db5b0] font-semibold">Admission</p>
      <h1 class="mt-2 text-3xl font-bold text-[#1e4f6f]">Candidature envoyee avec succes</h1>
      <p class="mt-4 text-slate-600">Merci. Votre dossier a bien ete enregistre sous la reference <strong>{{ candidature.reference }}</strong>.</p>
      <div class="mt-6">
        <a href="{% url 'core:home' %}" class="inline-flex rounded-xl bg-[#1e4f6f] px-6 py-3 font-semibold text-white hover:bg-[#163a52]">Retour a l'accueil</a>
      </div>
    </div>
  </div>
</section>
{% endblock %}
