{% load component_tags %}
<div
  x-data="{
    files: [],
    dragOver: false,
    maxSize: {{ max_size_mb }} * 1024 * 1024,
    addFiles(fileList) {
      Array.from(fileList).forEach(file => {
        if (file.size > this.maxSize) return;
        if (this.files.some(f => f.name === file.name && f.size === file.size)) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          this.files.push({ name: file.name, size: file.size, type: file.type, preview: e.target.result, file: file });
        };
        reader.readAsDataURL(file);
      });
    },
    removeFile(index) {
      this.files.splice(index, 1);
    },
    formatSize(bytes) {
      if (bytes < 1024) return bytes + ' o';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' Ko';
      return (bytes / (1024 * 1024)).toFixed(1) + ' Mo';
    },
    isImage(type) { return type.startsWith('image/'); }
  }"
  class="{{ class_str }}"
>
  {% if label %}
    <label class="mb-1.5 block text-[11px] font-bold uppercase tracking-wide text-[color:var(--muted)]">
      {{ label }}{% if required %}<span class="text-[color:var(--danger)] ml-0.5">*</span>{% endif %}
    </label>
  {% endif %}

  <div
    @dragover.prevent="dragOver = true"
    @dragleave.prevent="dragOver = false"
    @drop.prevent="dragOver = false; addFiles($event.dataTransfer.files)"
    :class="dragOver ? 'border-[color:var(--school-primary)] bg-[color:var(--school-primary-soft)]' : 'border-[color:var(--line)]'"
    class="flex cursor-pointer flex-col items-center justify-center rounded-xl border-2 border-dashed p-6 transition hover:border-[color:var(--school-primary)] hover:bg-[color:var(--school-primary-soft)]/30
           {% if disabled %}opacity-50 pointer-events-none{% endif %}"
  >
    <i data-lucide="upload" style="width:28px;height:28px;" class="text-[color:var(--muted-2)] mb-2"></i>
    <p class="text-sm font-semibold text-[color:var(--muted)]">
      <span class="text-[color:var(--school-primary)]">Cliquez</span> ou glissez-déposez
    </p>
    <p class="mt-0.5 text-xs text-[color:var(--muted-2)]">Max {{ max_size_mb }} Mo</p>
    <input
      type="file"
      name="{{ name }}"
      id="{{ name }}"
      accept="{{ accept }}"
      {% if multiple %}multiple{% endif %}
      {% if required %}required{% endif %}
      {% if disabled %}disabled{% endif %}
      @change="addFiles($event.target.files)"
      class="hidden"
    >
  </div>

  <template x-if="files.length > 0">
    <ul class="mt-3 space-y-2">
      <template x-for="(file, idx) in files" :key="file.name + file.size">
        <li class="flex items-center gap-3 rounded-lg border border-[color:var(--line)] bg-[color:var(--card)] px-3 py-2">
          <template x-if="isImage(file.type)">
            <img :src="file.preview" class="h-10 w-10 rounded-lg object-cover border border-[color:var(--line)]">
          </template>
          <template x-if="!isImage(file.type)">
            <span class="flex h-10 w-10 items-center justify-center rounded-lg bg-[color:var(--card-soft)] text-[color:var(--muted)]">
              <i data-lucide="file" style="width:18px;height:18px;"></i>
            </span>
          </template>
          <div class="min-w-0 flex-1">
            <p class="truncate text-sm font-semibold text-[color:var(--text)]" x-text="file.name"></p>
            <p class="text-xs text-[color:var(--muted-2)]" x-text="formatSize(file.size)"></p>
          </div>
          <button @click="removeFile(idx)" type="button" class="flex h-8 w-8 items-center justify-center rounded-lg text-[color:var(--muted)] hover:bg-[color:var(--card-soft)] hover:text-[color:var(--danger)] transition" aria-label="Supprimer">
            <i data-lucide="trash-2" style="width:14px;height:14px;"></i>
          </button>
        </li>
      </template>
    </ul>
  </template>
</div>
