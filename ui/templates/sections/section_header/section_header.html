<div class="mb-10 md:mb-12 lg:mb-14 {% if align == 'center' %}text-center{% endif %}">
    <h2 class="text-balance font-poppins text-3xl md:text-4xl lg:text-5xl font-bold leading-[1.08] text-slate-900">
        {{ title }}
    </h2>

    {% if subtitle %}
    <p class="mt-4 md:mt-5 text-sm md:text-base lg:text-lg text-slate-600 max-w-2xl leading-7
       {% if align == 'center' %}mx-auto{% endif %}">
        {{ subtitle }}
    </p>
    {% endif %}
</div>
