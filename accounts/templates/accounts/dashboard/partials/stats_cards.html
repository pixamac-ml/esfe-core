<div class="grid grid-cols-2 md:grid-cols-4 gap-4">

<div class="bg-white rounded-xl shadow-sm p-4 border">
    <p class="text-xs text-gray-500">Inscriptions</p>
    <p class="text-2xl font-bold text-primary-500">
        {{ inscriptions_count }}
    </p>
</div>

<div class="bg-white rounded-xl shadow-sm p-4 border">
    <p class="text-xs text-gray-500">Paiements aujourd'hui</p>
    <p class="text-2xl font-bold text-secondary">
        {{ payments_count }}
    </p>
</div>

<div class="bg-white rounded-xl shadow-sm p-4 border">
    <p class="text-xs text-gray-500">Total encaissé</p>
    <p class="text-2xl font-bold text-green-600">
        {{ total_today|intcomma }} FCFA
    </p>
</div>

<div class="bg-white rounded-xl shadow-sm p-4 border">
    <p class="text-xs text-gray-500">Paiements en attente</p>
    <p class="text-2xl font-bold text-accent">
        {{ pending_payments }}
    </p>
</div>

</div>
