<div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6
            hover:shadow-md transition-shadow duration-300">

  <!-- En-tête avec icône -->
  <div class="flex items-center gap-3 mb-6">
    <div class="bg-gradient-to-br from-[#0f2c59] to-[#1a4080] p-2.5 rounded-xl shadow-sm">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A2 2 0 013 12V7a4 4 0 014-4z" />
      </svg>
    </div>
    <h3 class="text-lg font-bold text-gray-900">
      Catégories
    </h3>
  </div>

  <!-- Liste des catégories -->
  <ul class="space-y-2">
    {% for category in categories %}
      <li class="group">
        <a href="{{ category.get_absolute_url }}"
           class="flex justify-between items-center px-3 py-2.5 rounded-xl
                  text-sm text-gray-600 bg-transparent
                  hover:bg-[#0f2c59]/5 hover:text-[#0f2c59]
                  transition-all duration-200 ease-out">

          <span class="flex items-center gap-2">
            <!-- Indicateur animé -->
            <span class="w-1.5 h-1.5 rounded-full bg-gray-300
                         group-hover:bg-[#0f2c59] group-hover:scale-125
                         transition-all duration-200"></span>
            <span class="font-medium group-hover:translate-x-0.5 transition-transform duration-200">
              {{ category.name }}
            </span>
          </span>

          <!-- Badge compteur -->
          <span class="bg-gray-100 text-gray-500 text-xs font-medium px-2.5 py-1 rounded-full
                       group-hover:bg-[#0f2c59] group-hover:text-white
                       transition-colors duration-200">
            {{ category.article_count }}
          </span>

        </a>
      </li>
    {% empty %}
      <li class="text-center py-4 text-gray-400 text-sm">
        Aucune catégorie disponible
      </li>
    {% endfor %}
  </ul>

</div>
