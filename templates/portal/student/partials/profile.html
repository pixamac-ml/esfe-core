<div class="mb-5 flex items-start justify-between gap-3">
  <div>
    <p class="text-xs font-bold uppercase tracking-[0.18em] text-[color:var(--school-primary)]">Profil</p>
    <h3 class="mt-1 text-xl font-black tracking-tight text-[color:var(--text)]">Informations etudiant</h3>
  </div>
</div>

<div class="flex h-full flex-col justify-between gap-5">
  <div class="flex items-center gap-4">
    {% if photo_url %}
      <img src="{{ photo_url }}" alt="Photo de profil" class="h-16 w-16 rounded-full border-2 border-[color:var(--line)] object-cover shadow-sm" />
    {% else %}
      <div class="flex h-16 w-16 items-center justify-center rounded-full border-2 border-[color:var(--line)] bg-[color:var(--school-primary-soft)] text-2xl font-bold text-[color:var(--school-primary)] shadow-sm">
        {{ full_name|default:"?"|slice:":1"|upper }}
      </div>
    {% endif %}
    <div class="min-w-0">
      <div class="truncate text-lg font-semibold text-[color:var(--text)]">{{ full_name }}</div>
      <div class="mt-1 truncate text-sm text-[color:var(--muted)]">{{ email }}</div>
      <div class="mt-1 text-xs text-[color:var(--muted-2)]">{{ phone }}</div>
    </div>
  </div>
  <div class="grid gap-2 text-sm text-[color:var(--muted)]">
    <div class="flex items-center justify-between gap-3 rounded-xl border border-[color:var(--line)] bg-[color:var(--card-soft)] px-3 py-2.5">
      <span class="font-semibold text-[color:var(--text)]">Matricule</span>
      <span class="text-right">{{ matricule }}</span>
    </div>
    <div class="flex items-center justify-between gap-3 rounded-xl border border-[color:var(--line)] bg-[color:var(--card-soft)] px-3 py-2.5">
      <span class="font-semibold text-[color:var(--text)]">Formation</span>
      <span class="text-right">{{ formation }}</span>
    </div>
    <div class="flex items-center justify-between gap-3 rounded-xl border border-[color:var(--line)] bg-[color:var(--card-soft)] px-3 py-2.5">
      <span class="font-semibold text-[color:var(--text)]">Classe</span>
      <span class="text-right">{{ classroom }}</span>
    </div>
    <div class="flex items-center justify-between gap-3 rounded-xl border border-[color:var(--line)] bg-[color:var(--card-soft)] px-3 py-2.5">
      <span class="font-semibold text-[color:var(--text)]">Annexe</span>
      <span class="text-right">{{ annexe }}</span>
    </div>
  </div>
</div>
