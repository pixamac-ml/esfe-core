<div class="mb-4 flex items-center justify-between">
  <div class="flex items-center gap-2 {% if align == 'center' %}mx-auto{% endif %}">
    {% if icon %}
      <i data-lucide="{{ icon }}" style="width:18px;height:18px;" class="text-[color:var(--school-primary)]"></i>
    {% endif %}
    <div>
      <h2 class="text-base font-black text-[color:var(--text)]">{{ title }}</h2>
      {% if subtitle %}<p class="text-xs font-semibold text-[color:var(--muted)]">{{ subtitle }}</p>{% endif %}
    </div>
  </div>
  <div class="flex items-center gap-2">
    {% slot "action" %}{% endslot %}
  </div>
</div>
