<td class="score-cell {% if ec_row.display_status == 'validated' %}cell-ok{% elif ec_row.display_status == 'failed' %}cell-bad{% else %}cell-empty{% endif %}">
  <div class="score-stack">
    <input
      class="score-input w-full border p-1{% if row.updated_ec_id == ec_row.ec.id %} is-saved{% endif %}"
      type="number"
      name="note"
      min="0"
      max="20"
      step="0.01"
      value="{{ ec_row.note_input_value }}"
      id="note-{{ row.index }}-{{ ec_row.ec.id }}"
      hx-post="{% url 'accounts_portal:save_grade' %}"
      hx-trigger="blur, changed delay:150ms, keyup[key=='Enter']"
      hx-include="closest td"
      hx-target="closest tr"
      hx-swap="outerHTML"
      hx-vals='{"student_id": "{{ row.student_id }}"}'
    >
    <div class="score-meta">
      <span class="score-token normal"><span class="score-token-label">N</span><span class="score-token-value">{{ ec_row.normal_score_display|default:"0,00" }}</span></span>
      {% if row.active_session_type == "retake" %}
        <span class="score-token retake"><span class="score-token-label">R</span><span class="score-token-value">{{ ec_row.retake_score_display|default:"0,00" }}</span></span>
        <span class="score-token final"><span class="score-token-label">F</span><span class="score-token-value">{{ ec_row.final_score_display|default:"0,00" }}</span></span>
      {% endif %}
    </div>
    {% if row.active_session_type == "retake" and ec_row.has_retake_score %}<span class="retake-badge">R</span>{% endif %}
  </div>
  <input type="hidden" name="enrollment_id" value="{{ row.enrollment.id }}">
  <input type="hidden" name="ec_id" value="{{ ec_row.ec.id }}">
  <input type="hidden" name="session_type" value="{{ row.active_session_type }}">
</td>
