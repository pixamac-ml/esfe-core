<select
  name="{{ name }}"
  id="{{ name }}"
  {% if required %}required{% endif %}
  {% if disabled %}disabled{% endif %}
  class="block w-full rounded-lg border bg-[color:var(--card)] px-3 py-2.5 text-sm text-[color:var(--text)] transition outline-none appearance-none
         border-[color:var(--line)] focus:border-[color:var(--school-primary)] focus:ring-2 focus:ring-[color:var(--school-primary-soft)]
         {% if errors %}border-[color:var(--danger)]! focus:border-[color:var(--danger)]! focus:ring-[color:var(--danger-soft)]!{% endif %}
         {% if disabled %}opacity-50 pointer-events-none{% endif %}
         {{ class_str }}"
  {% for key, val in kwargs.items %}{{ key }}="{{ val }}" {% endfor %}
>
  {% if placeholder %}
    <option value="" {% if not value %}selected{% endif %} disabled>{{ placeholder }}</option>
  {% endif %}
  {% for opt in options %}
    <option value="{{ opt.value }}" {% if value == opt.value %}selected{% endif %}>{{ opt.label }}</option>
  {% endfor %}
</select>
