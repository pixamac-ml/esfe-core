<table class="data-table">
    <thead>
        <tr>
            <th>Programme</th>
            <th>Icone</th>
            <th>Label</th>
            <th>Valeur</th>
            <th>Ordre</th>
            <th class="text-right">Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for qf in quick_facts %}
        <tr>
            <td>{{ qf.programme.title }}</td>
            <td>{{ qf.get_icon_display|default:qf.icon }}</td>
            <td>{{ qf.label }}</td>
            <td>{{ qf.value }}</td>
            <td>{{ qf.order }}</td>
            <td class="text-right">
                <div class="inline-flex gap-2">
                    <a href="{% url 'superadmin:quick_fact_edit' qf.pk %}" class="btn btn-outline btn-sm">Modifier</a>
                    <form method="post" action="{% url 'superadmin:quick_fact_delete' qf.pk %}" onsubmit="return confirm('Supprimer ce quick fact ?');">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger btn-sm">Supprimer</button>
                    </form>
                </div>
            </td>
        </tr>
        {% empty %}
        <tr><td colspan="6" class="py-10 text-center text-slate-500">Aucun quick fact.</td></tr>
        {% endfor %}
    </tbody>
</table>
