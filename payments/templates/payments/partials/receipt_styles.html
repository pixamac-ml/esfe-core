<style>
  :root {
    --receipt-bg: #eef4fb;
    --receipt-card: #ffffff;
    --receipt-border: #d9e2ef;
    --receipt-primary: #1d4f79;
    --receipt-text: #1f2937;
    --receipt-muted: #6b7280;
    --receipt-highlight: #f3f7fc;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    padding: 24px;
    background: var(--receipt-bg);
    color: var(--receipt-text);
    font-family: Arial, Helvetica, sans-serif;
    line-height: 1.45;
  }

  .receipt-wrapper {
    max-width: 920px;
    margin: 0 auto;
    background: var(--receipt-card);
    border: 1px solid var(--receipt-border);
    border-radius: 10px;
    box-shadow: 0 6px 16px rgba(16, 24, 40, 0.06);
    padding: 28px;
  }

  .receipt-header {
    display: grid;
    grid-template-columns: 84px 1fr;
    gap: 14px;
    align-items: center;
    border-bottom: 2px solid var(--receipt-border);
    padding-bottom: 12px;
  }

  .receipt-logo {
    width: 78px;
    max-height: 78px;
    object-fit: contain;
  }

  .receipt-title {
    margin: 0;
    font-size: 25px;
    font-weight: 700;
    color: var(--receipt-primary);
    letter-spacing: 0.4px;
  }

  .receipt-subtitle {
    margin: 2px 0 0;
    color: var(--receipt-muted);
    font-size: 13px;
  }

  .receipt-meta {
    margin-top: 14px;
    display: flex;
    justify-content: flex-end;
  }

  .meta-card {
    min-width: 280px;
    border: 1px solid var(--receipt-border);
    border-radius: 8px;
    padding: 10px 12px;
    background: #fbfdff;
  }

  .meta-card p {
    margin: 2px 0;
    font-size: 13px;
  }

  .section-label {
    margin: 0 0 6px;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    color: var(--receipt-primary);
    font-weight: 600;
  }

  .section-card {
    margin-top: 12px;
    border: 1px solid var(--receipt-border);
    border-radius: 8px;
    padding: 12px;
    background: #fff;
  }

  .section-card p {
    margin: 2px 0;
    font-size: 14px;
  }

  .agent-line {
    margin-top: 8px;
    font-size: 13px;
    color: var(--receipt-muted);
  }

  .table-wrap {
    margin-top: 14px;
    border: 1px solid var(--receipt-border);
    border-radius: 8px;
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 620px;
  }

  thead th {
    background: #f2f7fc;
    text-align: left;
    font-size: 13px;
    padding: 10px 12px;
    border-bottom: 1px solid var(--receipt-border);
    font-weight: 600;
  }

  tbody td {
    padding: 10px 12px;
    border-top: 1px solid #edf1f7;
    font-size: 14px;
    vertical-align: top;
  }

  td.amount {
    text-align: right;
    white-space: nowrap;
    font-weight: 600;
  }

  .total-block {
    margin-top: 12px;
    margin-left: auto;
    width: 280px;
    border: 1px solid #c8d9ef;
    border-radius: 8px;
    background: var(--receipt-highlight);
    padding: 12px;
    text-align: right;
  }

  .total-block p {
    margin: 0;
    font-size: 15px;
  }

  .total-value {
    font-size: 21px;
    font-weight: 700;
    color: var(--receipt-primary);
  }

  .qr-zone {
    margin-top: 14px;
    display: flex;
    justify-content: flex-end;
  }

  .qr-card {
    text-align: center;
    border: 1px solid var(--receipt-border);
    border-radius: 8px;
    padding: 10px;
    width: 170px;
    background: #fff;
  }

  .qr-card img {
    width: 120px;
    height: 120px;
    object-fit: contain;
  }

  .qr-card p {
    margin: 6px 0 0;
    font-size: 12px;
    color: var(--receipt-muted);
  }

  .receipt-footer {
    margin-top: 16px;
    border-top: 1px solid var(--receipt-border);
    padding-top: 10px;
    text-align: center;
    font-size: 12px;
    color: var(--receipt-muted);
  }

  @media (max-width: 720px) {
    body {
      padding: 12px;
    }

    .receipt-wrapper {
      padding: 14px;
    }

    .receipt-header {
      grid-template-columns: 1fr;
      justify-items: center;
      text-align: center;
    }

    .receipt-meta {
      justify-content: center;
    }

    .meta-card {
      width: 100%;
      min-width: 0;
    }

    .total-block {
      width: 100%;
    }

    .qr-zone {
      justify-content: center;
    }
  }

  @media print {
    body {
      padding: 0;
      background: #fff;
    }

    .receipt-wrapper {
      border: 1px solid #d8dbe1;
      border-radius: 0;
      box-shadow: none;
      max-width: none;
      padding: 16px;
    }

    .table-wrap {
      overflow: visible;
    }
  }
</style>
