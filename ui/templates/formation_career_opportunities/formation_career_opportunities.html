{% if items %}
<section class="py-10 ">
  <div class="max-w-7xl mx-auto px-6">

    <div class="max-w-3xl mb-16">
      <h2 class="text-3xl md:text-4xl font-bold text-primary">
        Débouchés professionnels
      </h2>
      <p class="mt-4 text-gray-600 leading-relaxed">
        Des opportunités réelles dans le secteur public, privé et international.
      </p>
    </div>

    <div class="grid md:grid-cols-2 gap-8">

      {% for item in items %}
        <div class="group bg-white rounded-2xl p-8 shadow-md
                    hover:shadow-xl hover:-translate-y-1
                    transition-all duration-300 border border-primary/5">

          <div class="flex items-start gap-5">

            <div class="w-12 h-12 rounded-xl bg-primary/10
                        flex items-center justify-center shrink-0">

              <svg class="w-6 h-6 text-primary"
                   fill="none" stroke="currentColor" stroke-width="2"
                   viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M9 6h6m2 0h1a2 2 0 012 2v9a2 2 0 01-2 2H6a2 2 0 01-2-2V8a2 2 0 012-2h1m2 0V4a2 2 0 012-2h2a2 2 0 012 2v2" />
              </svg>

            </div>

            <p class="text-gray-700 leading-relaxed text-base">
              {{ item }}
            </p>

          </div>
        </div>
      {% endfor %}

    </div>

  </div>
</section>
{% endif %}
