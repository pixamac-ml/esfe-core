<article class="group h-full bg-white/95 border border-slate-200/80 rounded-3xl p-5 sm:p-6 lg:p-7 shadow-soft transition-all duration-300 ease-premium hover:shadow-premium hover:-translate-y-1 flex flex-col backdrop-blur-sm">

  <h3 class="text-lg sm:text-xl font-semibold text-slate-900 leading-snug line-clamp-2 text-balance">
    {{ title }}
  </h3>

  <p class="mt-3 text-sm sm:text-base text-slate-600 leading-7 line-clamp-3">
    {{ description }}
  </p>

  <p class="mt-4 text-xs sm:text-sm text-slate-500 font-medium">
    Durée : {{ duration }}
  </p>

  <a href="{{ href }}"
     class="mt-5 inline-flex items-center gap-1.5 text-sm sm:text-base font-semibold text-primary-600 transition-all duration-200 group-hover:gap-2.5 focus:outline-none focus:ring-2 focus:ring-primary-300 rounded-lg w-fit">
    Voir la formation
    <span aria-hidden="true">-></span>
  </a>

</article>
