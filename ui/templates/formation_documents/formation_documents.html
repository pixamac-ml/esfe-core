{% if required_documents %}

<section id="documents" class="py-24 bg-soft">

<div class="max-w-5xl mx-auto px-6">

<!-- TITRE -->

<div class="max-w-2xl mb-16">

<h2 class="text-3xl md:text-4xl font-bold text-primary">
Documents requis
</h2>

<p class="text-gray-500 mt-4">
Pour finaliser votre candidature, certains documents administratifs
sont nécessaires. Assurez-vous de préparer ces pièces avant de
soumettre votre dossier.
</p>

</div>



<!-- LISTE DOCUMENTS -->

<div class="grid md:grid-cols-2 gap-6">

{% for doc in required_documents %}

<div class="bg-white border border-gray-200 rounded-2xl p-6 shadow-sm hover:shadow-md transition">

<div class="flex items-start gap-4">

<!-- ICONE -->

<div class="w-10 h-10 rounded-lg bg-secondary/10 flex items-center justify-center text-secondary">

<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
d="M9 12h6m-6 4h6M9 8h6M7 4h10a2 2 0 012 2v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6a2 2 0 012-2z"/>
</svg>

</div>


<!-- TEXTE -->

<div>

<p class="font-medium text-gray-700">
{{ doc.document.name }}
</p>

</div>

</div>

</div>

{% endfor %}

</div>

</div>

</section>

{% endif %}
