<div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 transition hover:shadow-md">

  <div class="flex items-start gap-4">

    <!-- Avatar -->
    <div class="bg-[#0f2c59]/10 text-[#0f2c59] w-10 h-10 rounded-full flex items-center justify-center text-sm font-semibold">
      {{ comment.author_name|slice:":1"|upper }}
    </div>

    <div class="flex-1">

      <!-- Header -->
      <div class="flex justify-between items-center mb-2">
        <span class="font-semibold text-gray-900 text-sm">
          {{ comment.author_name }}
        </span>

        <span class="text-xs text-gray-400">
          {{ comment.created_at|date:"d M Y" }}
        </span>
      </div>

      <!-- Content -->
      <p class="text-gray-600 text-sm leading-relaxed">
        {{ comment.content }}
      </p>

    </div>
  </div>

</div>
