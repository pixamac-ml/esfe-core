{% extends 'superadmin/base.html' %}
{% block content %}
<div class="container-fluid">
    <h1 class="h3 mb-4">Détail du message</h1>
    <div class="card">
        <div class="card-body">
            <p><strong>Expéditeur :</strong> {{ message.sender }}</p>
            <p><strong>Objet :</strong> {{ message.subject }}</p>
            <p><strong>Date :</strong> {{ message.sent_at|date:'d/m/Y H:i' }}</p>
            <p><strong>Status :</strong> {{ message.status }}</p>
            <div class="mt-4">
                {{ message.body|linebreaksbr }}
            </div>
            <a href="{% url 'superadmin:message_reply' message.id %}" class="btn btn-success mt-3">Répondre</a>
            <a href="{% url 'superadmin:messages' %}" class="btn btn-secondary mt-3">Retour à la liste</a>
        </div>
    </div>
</div>
{% endblock %}
