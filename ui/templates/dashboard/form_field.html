{% load component_tags %}
<div
  class="space-y-1.5 {{ class_str }}"
  x-data="{ loading: false }"
  @htmx:before-request="if ($event.detail.target.id === 'form-field-{{ name }}-errors') loading = true"
  @htmx:after-request="if ($event.detail.target.id === 'form-field-{{ name }}-errors') loading = false"
  @htmx:timeout="loading = false"
  @htmx:error="loading = false"
>
  {% if label %}
    <label for="{{ name }}" class="block text-[11px] font-bold uppercase tracking-wide text-[color:var(--muted)]">
      {{ label }}{% if required %}<span class="text-[color:var(--danger)] ml-0.5">*</span>{% endif %}
    </label>
  {% endif %}
  <div class="relative">
    {% slot "control" %}
      <input
        type="{{ type }}"
        name="{{ name }}"
        id="{{ name }}"
        value="{{ value }}"
        placeholder="{{ placeholder }}"
        {% if required %}required{% endif %}
        {% if disabled %}disabled{% endif %}
        {% if hx_get %}hx-get="{{ hx_get }}"{% elif hx_post %}hx-post="{{ hx_post }}"{% endif %}
        hx-trigger="{{ hx_trigger }}"
        hx-target="{{ hx_target }}"
        hx-swap="{{ hx_swap }}"
        class="block w-full rounded-lg border bg-[color:var(--card)] px-3 py-2.5 text-sm text-[color:var(--text)] placeholder:text-[color:var(--muted-2)] transition
               border-[color:var(--line)] focus:border-[color:var(--school-primary)] focus:ring-2 focus:ring-[color:var(--school-primary-soft)] outline-none
               {% if errors %}border-[color:var(--danger)]! focus:border-[color:var(--danger)]! focus:ring-[color:var(--danger-soft)]!{% endif %}
               {% if disabled %}opacity-50 cursor-not-allowed{% endif %}"
      >
    {% endslot %}
    <div x-show="loading" class="absolute right-3 top-1/2 -translate-y-1/2">
      {% component "spinner" size="sm" %}{% endcomponent %}
    </div>
  </div>
  {% if help_text and not errors %}
    <p class="text-xs text-[color:var(--muted-2)]">{{ help_text }}</p>
  {% endif %}
  <div id="form-field-{{ name }}-errors">
    {% for error in errors %}
      <p class="text-xs font-semibold text-[color:var(--danger)]">{{ error }}</p>
    {% endfor %}
  </div>
</div>
