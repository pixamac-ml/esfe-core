{% extends 'superadmin/base.html' %}
{% block content %}
<div class="container-fluid">
    <h1 class="h3 mb-4">Détail de l'article</h1>
    <div class="card">
        <div class="card-body">
            <h2>{{ article.title }}</h2>
            <p><strong>Auteur :</strong> {{ article.author }}</p>
            <p><strong>Date :</strong> {{ article.created_at|date:'d/m/Y' }}</p>
            <p><strong>Status :</strong> {{ article.status }}</p>
            <div class="mt-4">
                {{ article.content|safe }}
            </div>
            <a href="{% url 'superadmin:article_edit' article.id %}" class="btn btn-warning mt-3">Modifier</a>
            <a href="{% url 'superadmin:articles' %}" class="btn btn-secondary mt-3">Retour à la liste</a>
        </div>
    </div>
</div>
{% endblock %}
