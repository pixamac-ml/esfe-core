{% extends 'superadmin/base.html' %}
{% block content %}
<div class="container-fluid">
    <h1 class="h3 mb-4">{{ form_title|default:'Nouvelle page' }}</h1>
    <div class="card">
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-success">Enregistrer</button>
                <a href="{% url 'superadmin:pages' %}" class="btn btn-secondary">Annuler</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
