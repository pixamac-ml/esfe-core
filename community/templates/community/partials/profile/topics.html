<div class="space-y-6">

<h3 class="text-lg font-semibold text-primary-700 flex items-center gap-2">
<i data-lucide="message-square" class="w-5 h-5"></i>
Sujets publiés
</h3>

<div class="space-y-4">

{% for topic in topics %}

<a href="{{ topic.get_absolute_url }}"
   class="block bg-white border border-primary-100 rounded-xl p-4 hover:bg-primary-50 transition shadow-sm hover:shadow-md">

<div class="flex justify-between items-start gap-4">

<div class="flex-1">

<div class="font-medium text-primary-700">
{{ topic.title }}
</div>

<div class="flex flex-wrap items-center gap-3 mt-2 text-xs text-gray-500">

<span class="flex items-center gap-1">
<i data-lucide="folder" class="w-3 h-3"></i>
{{ topic.category.name }}
</span>

<span class="flex items-center gap-1">
<i data-lucide="clock" class="w-3 h-3"></i>
{{ topic.created_at|timesince }} ago
</span>

<span class="flex items-center gap-1 text-blue-600">
<i data-lucide="eye" class="w-3 h-3"></i>
{{ topic.view_count }}
</span>

</div>

</div>

<div class="flex flex-col items-center text-xs text-gray-500">

<div class="flex items-center gap-1">
<i data-lucide="reply" class="w-4 h-4"></i>
{{ topic.answers.count }}
</div>

<div>réponses</div>

</div>

</div>

</a>

{% empty %}

<div class="bg-white border rounded-xl p-6 text-center text-gray-400">

<i data-lucide="file-text" class="mx-auto mb-2"></i>

Aucun sujet publié.

</div>

{% endfor %}

</div>

</div>
