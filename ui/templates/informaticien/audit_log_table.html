<div class="workflow-table-shell">
  <div class="workflow-list">
    {% for log in logs %}
      <article>
        <div>
          <strong>{{ log.get_action_type_display }}</strong>
          <span>{{ log.created_at|date:"d/m/Y H:i" }} - {{ log.actor.get_full_name|default:log.actor.username }} - {{ log.target_label|default:"-" }}</span>
          {% if log.details %}<span>{{ log.details }}</span>{% endif %}
        </div>
      </article>
    {% empty %}
      <section class="workflow-empty">Aucun journal pour cette annexe.</section>
    {% endfor %}
  </div>
</div>
