<div class="animate-pulse rounded-xl border border-[color:var(--line)] bg-[color:var(--card)] {{ card_class }}">
  <div class="space-y-2">
    <div class="rounded bg-[color:var(--line)] {{ title_class }}"></div>
    <div class="rounded bg-[color:var(--line)] {{ line1_class }}"></div>
    {% if line2_class %}
      <div class="rounded bg-[color:var(--line)] {{ line2_class }}"></div>
    {% endif %}
  </div>
</div>
