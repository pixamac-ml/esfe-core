{% extends "base.html" %}
{% block content %}
<main class="mx-auto max-w-6xl px-4 py-6">
  <h1 class="text-2xl font-semibold">{{ cycle.branch }} - {{ cycle.academic_year }}</h1>
  <p class="mt-2">Statut : {{ cycle.get_status_display }}</p>
  <form method="post" action="{% url 'academic_cycle:generate_report' cycle.pk %}" class="mt-4">
    {% csrf_token %}
    <button type="submit">Generer le rapport</button>
  </form>
</main>
{% endblock %}
