<a
  x-data="{ shown: false }"
  x-intersect:enter.threshold.60.once="shown = true"
  :class="shown
          ? 'opacity-100 translate-y-0 scale-100'
          : 'opacity-0 translate-y-10 scale-95'"
  href="{{ url }}"
  class="group block h-full bg-white/95 rounded-3xl overflow-hidden
         border border-slate-200/80 shadow-soft backdrop-blur-sm
         transform transition-all duration-500 ease-premium
         hover:shadow-premium hover:-translate-y-1"
>
    {% if cycle_theme == "primary" %}
        <div class="h-1 bg-primary"></div>
    {% elif cycle_theme == "secondary" %}
        <div class="h-1 bg-secondary"></div>
    {% elif cycle_theme == "dark" %}
        <div class="h-1 bg-gray-800"></div>
    {% else %}
        <div class="h-1 bg-gray-300"></div>
    {% endif %}

    <div class="p-5 sm:p-6 lg:p-7 flex flex-col gap-4 h-full">
        <div class="flex justify-between items-center gap-2">
            <span class="text-xs uppercase tracking-[0.18em] font-semibold text-primary line-clamp-1">
                {{ cycle }}
            </span>

            {% if is_featured %}
            <span class="text-[11px] bg-secondary/10 text-secondary px-2.5 py-1 rounded-full whitespace-nowrap font-semibold">
                Populaire
            </span>
            {% endif %}
        </div>

        <h3 class="text-xl sm:text-2xl font-bold text-primary leading-snug line-clamp-2 group-hover:text-secondary transition-colors duration-200 text-balance">
            {{ title }}
        </h3>

        <p class="text-sm text-slate-600 leading-7 line-clamp-3">
            {{ short_description }}
        </p>

        <div class="mt-auto flex justify-between text-sm text-slate-500 pt-4 border-t border-slate-100 gap-3">
            <span class="whitespace-nowrap">{{ duration }} ans</span>
            <span class="font-medium text-primary line-clamp-1 text-right">{{ diploma }}</span>
        </div>

        <div>
            <span class="inline-flex items-center gap-2 text-sm font-semibold text-secondary transition-transform duration-200 group-hover:translate-x-1">
                Voir le programme
                <span aria-hidden="true">-></span>
            </span>
        </div>
    </div>
</a>
