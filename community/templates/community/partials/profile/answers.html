<div class="space-y-4">

{% for answer in answers %}

<a href="{{ answer.topic.get_absolute_url }}"
   class="block p-4 bg-white border rounded-lg hover:bg-primary-50 transition">

    <div class="flex justify-between items-center">

        <span class="font-medium text-primary-700">
            {{ answer.topic.title }}
        </span>

        <span class="flex items-center gap-2 text-sm text-gray-600">

            <span class="flex items-center gap-1 text-green-600">
                <i data-lucide="thumbs-up"></i>
                {{ answer.upvotes }}
            </span>

            <span class="flex items-center gap-1 text-red-500">
                <i data-lucide="thumbs-down"></i>
                {{ answer.downvotes }}
            </span>

        </span>

    </div>

    <div class="text-sm text-gray-500 mt-2">
        Réponse publiée {{ answer.created_at|timesince }} ago
    </div>

</a>

{% empty %}

<p class="text-gray-400">
Aucune réponse publiée.
</p>

{% endfor %}

</div>
