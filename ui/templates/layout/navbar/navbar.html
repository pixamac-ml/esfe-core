{% load static %}

<nav class="bg-[#1e4f6f] text-white sticky top-0 z-40 shadow-sm">
  <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

    <!-- Logo -->
    <a href="{% url 'core:home' %}" class="flex items-center space-x-3">
      <img src="{% static 'images/logo-esfe.png' %}"
           alt="Logo ESFé"
           class="h-10 w-auto">

      <span class="text-lg font-semibold tracking-wide">
        ESFé
      </span>
    </a>

    <!-- Menu principal -->
    <ul class="flex items-center space-x-8 text-sm font-medium">

      <li>
        <a href="{% url 'core:home' %}"
           class="hover:text-white/80 transition
           {% if request.path == '/' %} border-b-2 border-white pb-1 {% endif %}">
          Accueil
        </a>
      </li>

      <li>
        <a href="{% url 'formations:list' %}"
           class="hover:text-white/80 transition
           {% if 'formations' in request.path %} border-b-2 border-white pb-1 {% endif %}">
          Formations
        </a>
      </li>

      <li>
        <a href="{% url 'news:list' %}"
           class="hover:text-white/80 transition
           {% if 'news' in request.path %} border-b-2 border-white pb-1 {% endif %}">
          Actualités
        </a>
      </li>

      <li>
        <a href="{% url 'blog:article_list' %}"
           class="hover:text-white/80 transition
           {% if 'blog' in request.path %} border-b-2 border-white pb-1 {% endif %}">
          Blog
        </a>
      </li>

      <li>
        <a href="{% url 'core:about' %}"
           class="hover:text-white/80 transition">
          À propos
        </a>
      </li>

    </ul>

  </div>
</nav>
