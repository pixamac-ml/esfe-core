<!-- ============================================ -->
<!-- TOAST NOTIFICATIONS - Alpine.js + HTMX      -->
<!-- Utilisation: Déclenché via HTMX-Trigger    -->
<!-- Ex: response["HX-Trigger"] = '{"toast": {"type": "success", "message": "Paiement réussi!"}}' -->
<!-- ============================================ -->

<div
    x-data="toastComponent()"
    x-show="show"
    x-transition:enter="transition ease-out duration-300"
    x-transition:enter-start="opacity-0 translate-y-4"
    x-transition:enter-end="opacity-100 translate-y-0"
    x-transition:leave="transition ease-in duration-200"
    x-transition:leave-start="opacity-100 translate-y-0"
    x-transition:leave-end="opacity-0 translate-y-4"
    @toast.window="showToast($event.detail)"
    class="fixed top-4 right-4 z-50 max-w-sm w-full"
    style="display: none;"
>
    <div
        class="rounded-xl shadow-lg overflow-hidden"
        :class="{
            'bg-secondary text-white': type === 'success',
            'bg-accent text-white': type === 'warning',
            'bg-red-500 text-white': type === 'error',
            'bg-primary-500 text-white': type === 'info'
        }"
    >
        <div class="p-4 flex items-start gap-3">
            <!-- Icône -->
            <div class="flex-shrink-0 w-6 h-6">
                <template x-if="type === 'success'">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                </template>
                <template x-if="type === 'error'">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                </template>
                <template x-if="type === 'warning'">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                    </svg>
                </template>
                <template x-if="type === 'info'">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                </template>
            </div>

            <!-- Contenu -->
            <div class="flex-1">
                <p class="font-medium" x-text="message"></p>
            </div>

            <!-- Bouton fermer -->
            <button
                @click="close()"
                class="flex-shrink-0 opacity-70 hover:opacity-100 transition-opacity"
            >
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
        </div>

        <!-- Progress>
            </button bar -->
        <div class="h-1 bg-black/10">
            <div
                class="h-full bg-white/50 transition-all duration-[duration] ease-linear"
                :style="`width: ${progress}%`"
            ></div>
        </div>
    </div>
</div>

<script>
function toastComponent() {
    return {
        show: false,
        type: 'info',
        message: '',
        progress: 100,
        duration: 5000,
        timer: null,

        showToast(detail) {
            // Configurer le toast
            this.type = detail.type || 'info';
            this.message = detail.message || '';
            this.duration = detail.duration || 5000;

            // Afficher
            this.show = true;
            this.progress = 100;

            // Démarrer la progress bar
            this.startProgress();

            // Auto-fermeture
            clearTimeout(this.timer);
            this.timer = setTimeout(() => {
                this.close();
            }, this.duration);
        },

        startProgress() {
            const startTime = Date.now();
            const updateProgress = () => {
                const elapsed = Date.now() - startTime;
                this.progress = Math.max(0, 100 - (elapsed / this.duration) * 100);

                if (this.progress > 0 && this.show) {
                    requestAnimationFrame(updateProgress);
                }
            };
            requestAnimationFrame(updateProgress);
        },

        close() {
            this.show = false;
            clearTimeout(this.timer);
        }
    }
}
</script>
