{# Glass Card - Carte avec effet glassmorphism et 3D tilt #}
<div 
  class="gc-card"
  x-data="{ tiltX: 0, tiltY: 0 }"
  @mousemove="handleTilt($event)"
  @mouseleave="resetTilt()"
  :style="{ 
    transform: tilt ? `perspective(1000px) rotateX(${tiltX}deg) rotateY(${tiltY}deg)` : 'none'
  }"
>
  <div class="gc-glow" x-show="glow"></div>
  <div class="gc-gradient-bg bg-gradient-to-br {{ gradient }}"></div>
  <div class="gc-content">
    {% if icon %}
    <div class="gc-icon">
      <i data-lucide="{{ icon }}" style="width:32px;height:32px;"></i>
    </div>
    {% endif %}
    <h3 class="gc-title">{{ title }}</h3>
    {% if subtitle %}
    <p class="gc-subtitle">{{ subtitle }}</p>
    {% endif %}
  </div>
  <div class="gc-shine"></div>
</div>

<style>
  .gc-card {
    position: relative;
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: 24px;
    padding: 2rem;
    overflow: hidden;
    transition: transform 0.1s ease-out;
    cursor: pointer;
  }

  .gc-glow {
    position: absolute;
    inset: -2px;
    background: linear-gradient(135deg, rgba(59, 130, 246, 0.4), rgba(147, 51, 234, 0.4), rgba(236, 72, 153, 0.4));
    border-radius: 26px;
    filter: blur(20px);
    opacity: 0.6;
    z-index: -1;
    animation: glow-pulse 3s ease-in-out infinite;
  }

  @keyframes glow-pulse {
    0%, 100% { opacity: 0.4; transform: scale(1); }
    50% { opacity: 0.7; transform: scale(1.02); }
  }

  .gc-gradient-bg {
    position: absolute;
    inset: 0;
    opacity: 0.5;
    z-index: 0;
  }

  .gc-content {
    position: relative;
    z-index: 1;
  }

  .gc-icon {
    width: 64px;
    height: 64px;
    background: rgba(255, 255, 255, 0.9);
    border-radius: 16px;
    display: grid;
    place-items: center;
    color: #1e293b;
    margin-bottom: 1rem;
    box-shadow: 0 8px 16px -4px rgba(0, 0, 0, 0.1);
  }

  .gc-title {
    font-size: 1.5rem;
    font-weight: 800;
    color: #1e293b;
    line-height: 1.2;
    margin-bottom: 0.5rem;
  }

  .gc-subtitle {
    font-size: 0.875rem;
    color: #64748b;
    font-weight: 500;
  }

  .gc-shine {
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(
      90deg,
      transparent,
      rgba(255, 255, 255, 0.4),
      transparent
    );
    transition: left 0.5s;
  }

  .gc-card:hover .gc-shine {
    left: 100%;
  }
</style>

<script>
document.addEventListener('alpine:init', () => {
  Alpine.data('tilt', () => ({
    tiltX: 0,
    tiltY: 0,
    
    handleTilt(event) {
      const card = event.currentTarget;
      const rect = card.getBoundingClientRect();
      const x = event.clientX - rect.left;
      const y = event.clientY - rect.top;
      
      const centerX = rect.width / 2;
      const centerY = rect.height / 2;
      
      const rotateX = (y - centerY) / 10;
      const rotateY = (centerX - x) / 10;
      
      this.tiltX = rotateX;
      this.tiltY = rotateY;
    },
    
    resetTilt() {
      this.tiltX = 0;
      this.tiltY = 0;
    }
  }));
});
</script>
