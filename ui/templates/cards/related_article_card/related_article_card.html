<article
  class="group h-full bg-white rounded-2xl border border-gray-200
         overflow-hidden shadow-sm transition-all duration-300
         hover:shadow-xl hover:-translate-y-1"
>

  <!-- IMAGE -->
  <div class="relative h-36 sm:h-40 lg:h-44 overflow-hidden bg-gray-100">

    {% if article.featured_image %}
      <img
        src="{{ article.featured_image.url }}"
        alt="{{ article.title }}"
        class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105"
        loading="lazy"
        decoding="async"
      >
    {% else %}
      <div class="w-full h-full flex items-center justify-center text-gray-400 text-xs bg-gray-50">
        Image non disponible
      </div>
    {% endif %}

    {% if article.category %}
      <div class="absolute top-3 left-3">
        <span class="px-2 py-0.5 text-[10px] font-medium
                     bg-[#0f2c59] text-white rounded-full shadow">
          {{ article.category.name }}
        </span>
      </div>
    {% endif %}

  </div>

  <!-- CONTENT -->
  <div class="p-4 sm:p-5 flex flex-col gap-3 h-full">

    <h3 class="text-sm sm:text-base font-semibold text-gray-900 leading-snug
               transition-colors duration-200
               group-hover:text-[#0f2c59] line-clamp-2">

      <a href="{{ article.get_absolute_url }}"
         class="focus:outline-none focus:ring-2 focus:ring-primary-300 rounded-md">
        {{ article.title }}
      </a>

    </h3>

    <div class="mt-auto pt-2 border-t border-gray-100 flex items-center justify-between text-xs text-gray-500 gap-2">

      {% if article.published_at %}
        <span class="whitespace-nowrap">
          {{ article.published_at|date:"d M Y" }}
        </span>
      {% endif %}

      <span class="text-[#0f2c59] font-medium opacity-0
                   group-hover:opacity-100 transition-opacity duration-200">
        Lire ->
      </span>

    </div>

  </div>

</article>
