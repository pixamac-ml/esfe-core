{% if academic_class %}
<div class="space-y-4">
  <div class="flex items-start justify-between gap-3">
    <div>
      <p class="text-xs font-black uppercase tracking-[0.24em] text-blue-600">Nouveau cours</p>
      <h3 class="mt-1 text-lg font-extrabold text-slate-900">
        {{ academic_class.display_name }}
      </h3>
      <p class="mt-1 text-xs font-semibold text-slate-500">
        {% if schedule.week_start %}Semaine du {{ schedule.week_start|date:"d/m/Y" }}{% endif %}
      </p>
    </div>
    <button type="button"
            onclick="window.sgCloseDrawer && window.sgCloseDrawer()"
            class="rounded-lg border border-slate-200 px-2 py-1 text-sm font-bold text-slate-500 hover:bg-slate-50">
      ✕
    </button>
  </div>

  <form
    method="post"
    action="{% url create_schedule_event_url academic_class.id %}"
    hx-post="{% url create_schedule_event_url academic_class.id %}"
    hx-target="#supervisor-workspace"
    hx-swap="innerHTML"
    hx-on::after-request="if(event.detail.successful){ window.sgCloseDrawer && window.sgCloseDrawer(); }"
    class="space-y-3"
  >
    {% csrf_token %}
    <input type="hidden" name="week_start" value="{{ schedule.week_start|date:'Y-m-d' }}" />
    <input type="hidden" name="planner_intent" value="add_course" />
    <input type="hidden" name="from_drawer" value="1" />

    <div class="grid grid-cols-2 gap-3">
      <div>
        <label class="mb-1 block text-xs font-bold uppercase text-slate-500">Date</label>
        <input name="date" type="date" required
               value="{% if prefill_date %}{{ prefill_date }}{% else %}{{ schedule.week_start|date:'Y-m-d' }}{% endif %}"
               class="w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm font-semibold" />
      </div>
      <div>
        <label class="mb-1 block text-xs font-bold uppercase text-slate-500">Salle</label>
        <input name="location" type="text" placeholder="Ex: A102"
               value="{% if prefill_location %}{{ prefill_location }}{% else %}{{ prefill_room_label }}{% endif %}"
               class="w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm font-semibold" />
      </div>
    </div>

    <div class="grid grid-cols-2 gap-3">
      <div>
        <label class="mb-1 block text-xs font-bold uppercase text-slate-500">Debut</label>
        <input name="start_time" type="time" required value="{{ prefill_start_time }}"
               class="w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm font-semibold" />
      </div>
      <div>
        <label class="mb-1 block text-xs font-bold uppercase text-slate-500">Fin</label>
        <input name="end_time" type="time" required value="{{ prefill_end_time }}"
               class="w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm font-semibold" />
      </div>
    </div>

    <div>
      <label class="mb-1 block text-xs font-bold uppercase text-slate-500">Matiere / EC</label>
      <select name="ec_id" required class="w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm font-semibold">
        <option value="">Choisir un EC</option>
        {% for ec in ecs %}
        <option value="{{ ec.id }}" {% if prefill_ec_id == ec.id %}selected{% endif %}>{{ ec.ue.code }} · {{ ec.title }}</option>
        {% endfor %}
      </select>
    </div>

    <div>
      <label class="mb-1 block text-xs font-bold uppercase text-slate-500">Enseignant</label>
      <select name="teacher_id" required class="w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm font-semibold">
        <option value="">Choisir un enseignant</option>
        {% for teacher in teachers %}
        <option value="{{ teacher.id }}" {% if prefill_teacher_id == teacher.id %}selected{% endif %}>{{ teacher.get_full_name|default:teacher.username }}</option>
        {% endfor %}
      </select>
    </div>

    <label class="flex items-center gap-2 rounded-xl bg-slate-50 px-3 py-2 text-xs font-semibold text-slate-700">
      <input type="checkbox" name="is_online" value="1" class="h-4 w-4 rounded" />
      Cours en ligne
    </label>

    <div class="flex flex-wrap items-center justify-end gap-3 pt-2">
      <button type="button"
              onclick="window.sgCloseDrawer && window.sgCloseDrawer()"
              class="rounded-xl border border-slate-200 px-4 py-2 text-sm font-bold text-slate-600 hover:bg-slate-50">
        Annuler
      </button>
      <button type="submit"
              class="rounded-xl bg-blue-600 px-4 py-2 text-sm font-extrabold text-white shadow-sm hover:bg-blue-700">
        Programmer le cours
      </button>
    </div>
  </form>
</div>
{% else %}
<p class="text-sm font-semibold text-slate-500">Aucune classe selectionnee.</p>
{% endif %}
