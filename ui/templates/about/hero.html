<section class="relative h-[650px] flex items-center justify-center text-white overflow-hidden">

    <!-- Background -->
    <div class="absolute inset-0 bg-cover bg-center"
         style="background-image: url('{{ image }}');">
    </div>

    <!-- Dark overlay -->
    <div class="absolute inset-0 bg-black/45"></div>

    <!-- Primary gradient overlay -->
    <div class="absolute inset-0 bg-gradient-to-br from-primary-900/70 via-primary-800/60 to-primary-700/60"></div>

    <!-- Content -->
    <div class="relative z-10 max-w-5xl mx-auto px-6 text-center space-y-8">

        <p class="text-xs uppercase tracking-[0.4em] text-secondary-light">
            {{ label }}
        </p>

        <h1 class="text-5xl md:text-6xl font-extrabold leading-tight tracking-tight text-white drop-shadow-xl">
            {{ title }}
        </h1>

        <p class="text-lg md:text-xl max-w-3xl mx-auto text-white/90 leading-relaxed">
            {{ subtitle }}
        </p>

    </div>

</section>
