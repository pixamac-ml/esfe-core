<div>
  {% if article.category %}
    <span class="inline-block rounded-full bg-primary px-3 py-1 text-xs font-medium text-white">
      {{ article.category.name }}
    </span>
  {% endif %}

  <h1 class="mt-6 text-4xl font-bold leading-tight text-gray-900">
    {{ article.title }}
  </h1>

  <div class="mt-6 flex items-center gap-6 border-b border-gray-200 pb-6 text-sm text-gray-500">
    {% if article.published_at %}
      <span>{{ article.published_at|date:"d M Y" }}</span>
    {% endif %}
    <span>{{ article.views_count }} vues</span>
  </div>
</div>
