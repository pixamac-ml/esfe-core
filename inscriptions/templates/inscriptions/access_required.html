{% extends "base.html" %}
{% load static %}

{% block title %}Accès sécurisé | ESFE{% endblock %}

{% block content %}

<!-- HERO PREMIUM -->
<section class="relative overflow-hidden
               bg-gradient-to-br
               from-primary-700 via-primary-600 to-primary-800
               text-white py-20">

  <!-- Pattern subtil premium -->
  <div class="absolute inset-0 opacity-10">
    <svg class="w-full h-full" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="secure-pattern"
                 x="0" y="0"
                 width="40" height="40"
                 patternUnits="userSpaceOnUse">
          <circle cx="2" cy="2" r="2" fill="white"/>
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#secure-pattern)"/>
    </svg>
  </div>

  <div class="relative max-w-3xl mx-auto px-6 text-center">

    <!-- Icône centrée avec halo -->
    <div class="flex justify-center mb-8">
      <div class="relative">
        <div class="absolute inset-0 bg-white/20 blur-2xl rounded-full"></div>

        <div class="relative bg-white/10 backdrop-blur-md
                    p-6 rounded-full border border-white/20">
          <!-- Shield + Check propre -->
          <svg xmlns="http://www.w3.org/2000/svg"
               class="h-12 w-12 text-white"
               fill="none"
               viewBox="0 0 24 24"
               stroke="currentColor"
               stroke-width="2">
            <path stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M12 3l7 4v5c0 5-3.5 8-7 9
                     -3.5-1-7-4-7-9V7l7-4z"/>
            <path stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M9 12l2 2l4-4"/>
          </svg>
        </div>
      </div>
    </div>

    <h1 class="text-3xl md:text-4xl font-bold text-white mb-4">
      Accès sécurisé au dossier
    </h1>

    <p class="text-white/80 max-w-xl mx-auto text-base">
      Entrez le code confidentiel communiqué lors de votre inscription.
    </p>

  </div>

  <!-- Transition douce vers le blanc -->
  <div class="absolute bottom-0 left-0 right-0 h-16
              bg-gradient-to-b from-transparent to-white"></div>
</section>


<!-- FORM SECTION -->
<section class="relative max-w-md mx-auto px-6 py-20 -mt-12">

  <div class="bg-white shadow-2xl rounded-2xl p-8 space-y-6">

    {% if error %}
      <div class="bg-red-50 border border-red-200 text-red-700
                  p-4 rounded-lg text-sm">
        {{ error }}
      </div>
    {% endif %}

    <form method="post" class="space-y-6">
      {% csrf_token %}

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">
          Code d’accès
        </label>

        <div class="relative">
          <input type="password"
                 name="access_code"
                 required
                 class="w-full border border-gray-300 rounded-lg
                        px-4 py-3 pr-10
                        focus:outline-none
                        focus:ring-2 focus:ring-primary-600
                        focus:border-primary-600
                        transition"
                 placeholder="••••••••" />

          <!-- Lock Icon propre -->
          <div class="absolute inset-y-0 right-3 flex items-center text-gray-400">
            <svg xmlns="http://www.w3.org/2000/svg"
                 class="h-5 w-5"
                 fill="none"
                 viewBox="0 0 24 24"
                 stroke="currentColor"
                 stroke-width="2">
              <path stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M16 11V7a4 4 0 10-8 0v4"/>
              <rect x="6" y="11" width="12" height="9" rx="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"/>
            </svg>
          </div>
        </div>
      </div>

      <button type="submit"
              class="w-full bg-primary-700 hover:bg-primary-800
                     text-white font-medium py-3 rounded-lg
                     shadow-lg transition">
        Accéder au dossier
      </button>

    </form>

  </div>

</section>

{% endblock %}
