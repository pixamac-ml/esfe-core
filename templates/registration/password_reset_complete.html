{% extends "base.html" %}
{% block content %}

<section class="bg-soft min-h-screen py-20">
    <div class="max-w-xl mx-auto px-4">

        <div class="bg-white p-12 rounded-2xl shadow border border-primary-100 text-center">

            <!-- Icône succès -->
            <div class="mb-8">
                <div class="w-20 h-20 mx-auto bg-green-100 text-green-600 rounded-full flex items-center justify-center text-3xl">
                    ✓
                </div>
            </div>

            <h2 class="text-2xl font-bold text-primary-700 mb-4">
                Mot de passe réinitialisé avec succès
            </h2>

            <p class="text-gray-600 leading-relaxed mb-10">
                Votre nouveau mot de passe a été enregistré.
                Vous pouvez maintenant vous connecter en toute sécurité.
            </p>

            <a href="{% url 'login' %}"
               class="bg-primary-500 hover:bg-primary-600 text-white px-8 py-3 rounded-xl font-semibold transition shadow-md">
                Se connecter
            </a>

        </div>

    </div>
</section>

{% endblock %}
