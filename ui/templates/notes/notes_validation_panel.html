{% if state %}
<section class="workflow-progress">
  <div class="workflow-progress-head">
    <div>
      <p class="workflow-kicker">Etat resultats</p>
      <h3>{{ state.label }}</h3>
      <p>{{ state.description }}</p>
    </div>
    <span>{{ state.progress_percent }}%</span>
  </div>
  <div class="workflow-progress-track"><div style="width: {{ state.progress_percent }}%"></div></div>
</section>
{% endif %}
