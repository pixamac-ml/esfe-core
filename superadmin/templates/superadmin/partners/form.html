{% extends "superadmin/base.html" %}

{% block page_title %}{{ page_title }}{% endblock %}
{% block page_subtitle %}Fiche partenaire{% endblock %}

{% block content_main %}
<div class="max-w-3xl">
    <div class="card">
        <div class="card-body">
            <form method="post" enctype="multipart/form-data" class="space-y-4">
                {% csrf_token %}

                <label class="block text-sm text-slate-700">
                    <span class="block mb-1 font-medium">Nom</span>
                    <input type="text" name="name" value="{{ partner.name|default:'' }}" class="w-full rounded-lg border border-slate-300 px-3 py-2" required>
                </label>

                <label class="block text-sm text-slate-700">
                    <span class="block mb-1 font-medium">Site web</span>
                    <input type="url" name="website" value="{{ partner.website|default:'' }}" class="w-full rounded-lg border border-slate-300 px-3 py-2" placeholder="https://...">
                </label>

                <label class="block text-sm text-slate-700">
                    <span class="block mb-1 font-medium">Logo {% if not partner %}*{% endif %}</span>
                    <input type="file" name="logo" {% if not partner %}required{% endif %} accept="image/*" class="w-full rounded-lg border border-slate-300 px-3 py-2">
                    {% if partner and partner.logo %}
                    <img src="{{ partner.logo.url }}" alt="{{ partner.name }}" class="mt-2 h-16 w-auto rounded border border-slate-200">
                    {% endif %}
                </label>

                <label class="block text-sm text-slate-700">
                    <span class="block mb-1 font-medium">Type</span>
                    <select name="partner_type" class="w-full rounded-lg border border-slate-300 px-3 py-2">
                        {% for value, label in partner_types %}
                        <option value="{{ value }}" {% if partner.partner_type == value %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </label>

                <label class="block text-sm text-slate-700">
                    <span class="block mb-1 font-medium">Ordre</span>
                    <input type="number" name="order" value="{{ partner.order|default:'0' }}" class="w-full rounded-lg border border-slate-300 px-3 py-2">
                </label>

                <label class="block text-sm text-slate-700">
                    <span class="block mb-1 font-medium">Description</span>
                    <textarea name="description" rows="4" class="w-full rounded-lg border border-slate-300 px-3 py-2">{{ partner.description|default:'' }}</textarea>
                </label>

                <label class="inline-flex items-center gap-2 text-sm text-slate-700">
                    <input type="checkbox" name="is_active" {% if partner.is_active or not partner %}checked{% endif %}>
                    <span>Partenaire actif</span>
                </label>

                <div class="flex justify-end gap-2 pt-2">
                    <a href="{% url 'superadmin:partner_list' %}" class="btn btn-outline">Annuler</a>
                    <button type="submit" class="btn btn-primary">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
