{% extends "superadmin/base.html" %}

{% block page_title %}{{ page_title }}{% endblock %}
{% block page_subtitle %}Edition d'une section de contenu{% endblock %}

{% block content_main %}
<div class="max-w-4xl">
    <div class="card">
        <div class="card-body">
            <form method="post" class="space-y-4">
                {% csrf_token %}
                <label class="block text-sm text-slate-700">
                    <span class="block mb-1 font-medium">Onglet</span>
                    <select name="tab" class="w-full rounded-lg border border-slate-300 px-3 py-2" required>
                        <option value="">Selectionner</option>
                        {% for t in tabs %}
                        <option value="{{ t.pk }}" {% if section.tab_id == t.pk %}selected{% endif %}>{{ t.programme.title }} - {{ t.title }}</option>
                        {% endfor %}
                    </select>
                </label>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <label class="block text-sm text-slate-700">
                        <span class="block mb-1 font-medium">Type</span>
                        <select name="section_type" class="w-full rounded-lg border border-slate-300 px-3 py-2">
                            {% for value, label in section_type_choices %}
                            <option value="{{ value }}" {% if section.section_type == value %}selected{% endif %}>{{ label }}</option>
                            {% endfor %}
                        </select>
                    </label>
                    <label class="block text-sm text-slate-700">
                        <span class="block mb-1 font-medium">Ordre</span>
                        <input type="number" name="order" value="{{ section.order|default:'0' }}" class="w-full rounded-lg border border-slate-300 px-3 py-2">
                    </label>
                </div>
                <label class="block text-sm text-slate-700">
                    <span class="block mb-1 font-medium">Titre</span>
                    <input type="text" name="title" value="{{ section.title|default:'' }}" class="w-full rounded-lg border border-slate-300 px-3 py-2">
                </label>
                <label class="block text-sm text-slate-700">
                    <span class="block mb-1 font-medium">Contenu</span>
                    <textarea name="content" rows="8" class="w-full rounded-lg border border-slate-300 px-3 py-2">{{ section.content|default:'' }}</textarea>
                </label>
                <div class="flex justify-end gap-2 pt-2">
                    <a href="{% url 'superadmin:programme_section_list' %}" class="btn btn-outline">Annuler</a>
                    <button type="submit" class="btn btn-primary">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
