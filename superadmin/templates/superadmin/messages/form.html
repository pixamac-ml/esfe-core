{% extends "superadmin/base.html" %}

{% block page_title %}{{ form_title|default:'Message' }}{% endblock %}
{% block page_subtitle %}Saisie du message{% endblock %}

{% block content_main %}
<section class="card max-w-4xl rounded-xl border border-slate-100 shadow-sm">
    <form method="post" class="card-body space-y-4">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="flex items-center gap-2 pt-2">
            <button type="submit" class="btn btn-primary">Enregistrer</button>
            <a href="{% url 'superadmin:message_list' %}" class="btn btn-outline">Annuler</a>
        </div>
    </form>
</section>
{% endblock %}
