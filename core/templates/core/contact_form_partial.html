<div class="bg-white rounded-2xl shadow-xl p-5 sm:p-6 md:p-8"
     x-data="{ loading:false }"
     x-init="
        document.body.addEventListener('htmx:afterRequest', () => {
            loading = false
        })
     ">

    <h3 class="text-xl font-semibold text-slate-800 mb-6">
        Envoyer une demande
    </h3>

    <form method="post"
          hx-post="{% url 'core:contact' %}"
          hx-target="#contact-container"
          hx-swap="outerHTML"
          @submit="loading = true"
          class="space-y-5 [&_input[type='text']]:w-full [&_input[type='email']]:w-full [&_input[type='tel']]:w-full [&_select]:w-full [&_textarea]:w-full [&_input[type='text']]:rounded-xl [&_input[type='email']]:rounded-xl [&_input[type='tel']]:rounded-xl [&_select]:rounded-xl [&_textarea]:rounded-xl [&_input[type='text']]:border [&_input[type='email']]:border [&_input[type='tel']]:border [&_select]:border [&_textarea]:border [&_input[type='text']]:border-slate-300 [&_input[type='email']]:border-slate-300 [&_input[type='tel']]:border-slate-300 [&_select]:border-slate-300 [&_textarea]:border-slate-300 [&_input[type='text']]:px-4 [&_input[type='email']]:px-4 [&_input[type='tel']]:px-4 [&_select]:px-4 [&_textarea]:px-4 [&_input[type='text']]:py-3 [&_input[type='email']]:py-3 [&_input[type='tel']]:py-3 [&_select]:py-3 [&_textarea]:py-3 [&_input[type='text']]:text-sm [&_input[type='email']]:text-sm [&_input[type='tel']]:text-sm [&_select]:text-sm [&_textarea]:text-sm [&_input[type='text']]:focus:outline-none [&_input[type='email']]:focus:outline-none [&_input[type='tel']]:focus:outline-none [&_select]:focus:outline-none [&_textarea]:focus:outline-none [&_input[type='text']]:focus:ring-2 [&_input[type='email']]:focus:ring-2 [&_input[type='tel']]:focus:ring-2 [&_select]:focus:ring-2 [&_textarea]:focus:ring-2 [&_input[type='text']]:focus:ring-primary-200 [&_input[type='email']]:focus:ring-primary-200 [&_input[type='tel']]:focus:ring-primary-200 [&_select]:focus:ring-primary-200 [&_textarea]:focus:ring-primary-200 [&_input[type='text']]:focus:border-primary-500 [&_input[type='email']]:focus:border-primary-500 [&_input[type='tel']]:focus:border-primary-500 [&_select]:focus:border-primary-500 [&_textarea]:focus:border-primary-500 [&_ul]:mt-1.5 [&_ul]:text-xs [&_ul]:text-red-600 [&_ul]:list-none [&_ul]:p-0">

        {% csrf_token %}

        <!-- Nom -->
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">
                Nom complet
            </label>
            {{ form.full_name }}
            {{ form.full_name.errors }}
        </div>

        <!-- Email -->
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">
                Adresse email
            </label>
            {{ form.email }}
            {{ form.email.errors }}
        </div>

        <!-- Téléphone -->
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">
                Téléphone (optionnel)
            </label>
            {{ form.phone }}
        </div>

        <!-- Sujet -->
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">
                Sujet
            </label>
            {{ form.subject }}
        </div>

        <!-- Message -->
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">
                Message
            </label>
            {{ form.message }}
            {{ form.message.errors }}
        </div>

        <!-- Consent -->
        <div class="flex items-start gap-3 rounded-xl border border-slate-200 bg-slate-50 p-3">
            {{ form.consent }}
            <label class="text-sm text-slate-600 leading-relaxed">
                J’accepte que mes données soient utilisées pour traiter ma demande.
            </label>
        </div>

        <button type="submit"
                :disabled="loading"
                class="w-full bg-slate-800 hover:bg-slate-900 text-white py-3.5 rounded-xl font-semibold transition duration-200 flex justify-center items-center"
                x-bind:class="loading ? 'opacity-60 cursor-not-allowed' : ''">

            <span x-show="!loading">Envoyer la demande</span>

            <svg x-show="loading"
                 class="animate-spin h-5 w-5 text-white"
                 xmlns="http://www.w3.org/2000/svg"
                 fill="none"
                 viewBox="0 0 24 24">
                <circle class="opacity-25"
                        cx="12"
                        cy="12"
                        r="10"
                        stroke="currentColor"
                        stroke-width="4"></circle>
                <path class="opacity-75"
                      fill="currentColor"
                      d="M4 12a8 8 0 018-8v8z"></path>
            </svg>

        </button>

    </form>
</div>
