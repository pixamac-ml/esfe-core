{% load static %}

<section id="hero-section" class="relative h-screen min-h-[600px] max-h-[1200px] w-full overflow-hidden isolate">

  <!-- ================= BACKGROUND AVEC ZOOM ================= -->
  <div class="absolute inset-0 hero-zoom z-0">
    <img src="{% static 'images/hero-bg.jpg' %}"
         class="w-full h-full object-cover object-center"
         alt="Campus ESFE"
         loading="eager">
    <div class="absolute inset-0 bg-gradient-to-b from-black/30 via-black/50 to-black/80
                sm:from-black/40 sm:via-black/55 sm:to-black/75"></div>
  </div>

  <!-- ================= PARTICULES DÉCORATIVES ================= -->
  <div class="absolute inset-0 z-10 pointer-events-none overflow-hidden hidden sm:block">
    <div class="absolute top-1/4 left-1/4 w-32 sm:w-48 md:w-64 lg:w-80 h-32 sm:h-48 md:h-64 lg:h-80 bg-secondary/10 rounded-full blur-3xl animate-pulse-slow"></div>
    <div class="absolute bottom-1/4 right-1/4 w-40 sm:w-56 md:w-72 lg:w-96 h-40 sm:h-56 md:h-72 lg:h-96 bg-primary/10 rounded-full blur-3xl animate-pulse-slow delay-1000"></div>
  </div>

  <!-- ================= LOGO ================= -->
  <div class="absolute top-4 left-4 sm:top-6 sm:left-6 z-30 hero-fade-in">
    <img src="{% static 'images/logo-esfe.png' %}"
         class="h-10 sm:h-14 md:h-16 lg:h-20 opacity-95 drop-shadow-lg"
         alt="Logo ESFE">
  </div>

  <!-- ================= BADGE EXCELLENCE ================= -->
  <div class="absolute top-4 right-4 sm:top-6 sm:right-6 z-30 hero-fade-in-delayed hidden md:block">
    <div class="bg-white/10 backdrop-blur-md border border-white/20 rounded-full px-3 py-1.5 lg:px-4 lg:py-2 flex items-center gap-2">
      <span class="w-1.5 h-1.5 lg:w-2 lg:h-2 bg-secondary rounded-full animate-pulse"></span>
      <span class="text-white/90 text-xs lg:text-sm font-medium">Excellence depuis 2008</span>
    </div>
  </div>

  <!-- ================= CONTENU CENTRAL ================= -->
  <div class="relative z-20 h-full flex flex-col items-center justify-center text-white px-4 sm:px-6 lg:px-8 text-center pt-16 pb-24 sm:pt-20 sm:pb-32">

    <!-- Titre animé -->
    <div class="hero-line hero-title-enter">
      <span class="brand text-white drop-shadow-2xl">{{ title }}</span>
      <span class="city-mask">
        <span id="cityText" class="city-text text-secondary drop-shadow-lg"></span>
        <span id="cursor" class="cursor"></span>
      </span>
    </div>

    <!-- Tagline -->
    <p class="hero-tagline hero-tagline-enter mt-3 sm:mt-4 lg:mt-6">
      <strong>{{ subtitle|default:"Former les cadres de la santé" }}</strong>
    </p>

    <!-- Sous-texte descriptif -->
    <p class="mt-4 sm:mt-6 text-white/70 text-sm sm:text-base md:text-lg max-w-xs sm:max-w-lg md:max-w-2xl hero-desc-enter leading-relaxed">
      École Santé Félix Houphouët Boigny - Mali
    </p>

    <!-- Boutons CTA -->
    <div class="mt-6 sm:mt-8 lg:mt-10 flex flex-col sm:flex-row gap-3 sm:gap-4 hero-cta-enter w-full sm:w-auto px-4 sm:px-0">
      <a href="{% url 'formations:list' %}"
         class="group inline-flex items-center justify-center gap-2 bg-secondary hover:bg-secondary/90 text-white px-6 sm:px-8 py-3 sm:py-4 rounded-full font-semibold text-sm sm:text-base transition-all duration-300 shadow-lg hover:shadow-xl hover:shadow-secondary/30 hover:-translate-y-1 w-full sm:w-auto">
        <span>Découvrir nos formations</span>
        <svg class="w-4 h-4 sm:w-5 sm:h-5 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/>
        </svg>
      </a>
      <a href="{% url 'formations:list' %}"
         class="inline-flex items-center justify-center gap-2 bg-white/10 hover:bg-white/20 backdrop-blur-sm text-white border border-white/30 px-6 sm:px-8 py-3 sm:py-4 rounded-full font-semibold text-sm sm:text-base transition-all duration-300 hover:-translate-y-1 w-full sm:w-auto">
        <span>Postuler maintenant</span>
      </a>
    </div>

  </div>

  <!-- ================= RÉSEAUX SOCIAUX ================= -->
  <div class="absolute bottom-24 sm:bottom-8 left-1/2 sm:left-6 -translate-x-1/2 sm:translate-x-0 z-40 flex flex-row sm:flex-col gap-3 hero-social-enter">

    <a href="https://facebook.com/esfe.mali" target="_blank" rel="noopener noreferrer"
       class="group w-9 h-9 sm:w-10 sm:h-10 bg-white/10 hover:bg-[#1877F2] backdrop-blur-sm border border-white/20 rounded-full flex items-center justify-center transition-all duration-300 hover:scale-110 hover:border-transparent"
       aria-label="Facebook">

      </svg>
    </a>

    <a href="https://instagram.com/esfe.mali" target="_blank" rel="noopener noreferrer"
       class="group w-9 h-9 sm:w-10 sm:h-10 bg-white/10 hover:bg-gradient-to-br hover:from-[#f9ce34] hover:via-[#ee2a7b] hover:to-[#6228d7] backdrop-blur-sm border border-white/20 rounded-full flex items-center justify-center transition-all duration-300 hover:scale-110 hover:border-transparent"
       aria-label="Instagram">
      <svg class="w-4 h-4 sm:w-5 sm:h-5 text-white" fill="currentColor" viewBox="0 0 24 24">
        <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
      </svg>
    </a>

    <a href="https://tiktok.com/@esfe.mali" target="_blank" rel="noopener noreferrer"
       class="group w-9 h-9 sm:w-10 sm:h-10 bg-white/10 hover:bg-black backdrop-blur-sm border border-white/20 rounded-full flex items-center justify-center transition-all duration-300 hover:scale-110 hover:border-transparent"
       aria-label="TikTok">
      <svg class="w-4 h-4 sm:w-5 sm:h-5 text-white" fill="currentColor" viewBox="0 0 24 24">
        <path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-5.2 1.74 2.89 2.89 0 012.31-4.64 2.93 2.93 0 01.88.13V9.4a6.84 6.84 0 00-1-.05A6.33 6.33 0 005 20.1a6.34 6.34 0 0010.86-4.43v-7a8.16 8.16 0 004.77 1.52v-3.4a4.85 4.85 0 01-1-.1z"/>
      </svg>
    </a>

    <a href="https://youtube.com/@esfe.mali" target="_blank" rel="noopener noreferrer"
       class="group w-9 h-9 sm:w-10 sm:h-10 bg-white/10 hover:bg-[#FF0000] backdrop-blur-sm border border-white/20 rounded-full flex items-center justify-center transition-all duration-300 hover:scale-110 hover:border-transparent"
       aria-label="YouTube">
      <svg class="w-4 h-4 sm:w-5 sm:h-5 text-white" fill="currentColor" viewBox="0 0 24 24">
        <path d="M23.498 6.186a3.016 3.016 0 00-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 00.502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 002.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 002.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
      </svg>
    </a>
  </div>

  <!-- ================= SCROLL BUTTON ================= -->
  <a href="#a-propos"
     class="scroll-button group"
     aria-label="Aller à la section suivante">
    <svg class="w-5 h-5 sm:w-6 sm:h-6 group-hover:translate-y-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"/>
    </svg>
  </a>

</section>

<style>
/* ============================= */
/* VARIABLES                     */
/* ============================= */
:root {
  --color-primary: #1e4f6f;
  --color-secondary: #1db5b0;
}

/* ============================= */
/* HERO ISOLATION                */
/* ============================= */
#hero-section {
  isolation: isolate;
}

/* ============================= */
/* ZOOM BACKGROUND               */
/* ============================= */
.hero-zoom {
  transform: scale(1);
  transition: transform 20s ease-out;
  will-change: transform;
}

/* ============================= */
/* ANIMATIONS D'ENTRÉE           */
/* ============================= */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes slideInLeft {
  from { opacity: 0; transform: translateX(-20px); }
  to { opacity: 1; transform: translateX(0); }
}

@keyframes slideInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.hero-fade-in {
  animation: fadeIn 0.8s ease-out forwards;
}

.hero-fade-in-delayed {
  opacity: 0;
  animation: fadeIn 0.8s ease-out 0.4s forwards;
}

.hero-title-enter {
  opacity: 0;
  animation: fadeInUp 0.8s ease-out 0.2s forwards;
}

.hero-tagline-enter {
  opacity: 0;
  animation: fadeInUp 0.8s ease-out 0.35s forwards;
}

.hero-desc-enter {
  opacity: 0;
  animation: fadeInUp 0.8s ease-out 0.5s forwards;
}

.hero-cta-enter {
  opacity: 0;
  animation: fadeInUp 0.8s ease-out 0.65s forwards;
}

.hero-social-enter {
  opacity: 0;
  animation: slideInUp 0.6s ease-out 0.9s forwards;
}

@media (min-width: 640px) {
  .hero-social-enter {
    animation: slideInLeft 0.6s ease-out 0.9s forwards;
  }
}

/* ============================= */
/* TITRE RESPONSIVE              */
/* ============================= */
.hero-line {
  display: flex;
  align-items: baseline;
  justify-content: center;
  gap: 0.5rem;
  flex-wrap: wrap;
}

@media (min-width: 640px) {
  .hero-line { gap: 0.75rem; }
}

@media (min-width: 1024px) {
  .hero-line { gap: 1rem; }
}

.brand, .city-text {
  font-family: 'Poppins', sans-serif;
  font-weight: 700;
  white-space: nowrap;
  letter-spacing: -0.02em;
  line-height: 1.1;
}

/* Tailles responsive */
.brand, .city-text {
  font-size: 2.5rem; /* Mobile */
}

@media (min-width: 480px) {
  .brand, .city-text { font-size: 3rem; }
}

@media (min-width: 640px) {
  .brand, .city-text { font-size: 3.5rem; }
}

@media (min-width: 768px) {
  .brand, .city-text { font-size: 4.5rem; }
}

@media (min-width: 1024px) {
  .brand, .city-text { font-size: 5.5rem; }
}

@media (min-width: 1280px) {
  .brand, .city-text { font-size: 6.5rem; }
}

/* ============================= */
/* WRITING EFFECT                */
/* ============================= */
.city-mask {
  position: relative;
  display: inline-block;
  overflow: hidden;
}

.cursor {
  position: absolute;
  top: 10%;
  right: -4px;
  width: 2px;
  height: 80%;
  background: var(--color-secondary);
  opacity: 0.8;
  transition: opacity 0.3s ease;
  border-radius: 2px;
}

@media (min-width: 768px) {
  .cursor {
    width: 3px;
    right: -6px;
  }
}

/* ============================= */
/* TAGLINE RESPONSIVE            */
/* ============================= */
.hero-tagline {
  font-size: 1rem;
  font-weight: 500;
  color: rgba(255,255,255,0.95);
}

@media (min-width: 480px) {
  .hero-tagline { font-size: 1.1rem; }
}

@media (min-width: 640px) {
  .hero-tagline { font-size: 1.25rem; }
}

@media (min-width: 768px) {
  .hero-tagline { font-size: 1.5rem; }
}

@media (min-width: 1024px) {
  .hero-tagline { font-size: 1.75rem; }
}

/* ============================= */
/* SCROLL BUTTON RESPONSIVE      */
/* ============================= */
.scroll-button {
  position: absolute;
  bottom: 1.5rem;
  left: 50%;
  transform: translateX(-50%);
  z-index: 40;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.25);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  text-decoration: none;
  transition: all 0.3s ease;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
}

@media (min-width: 640px) {
  .scroll-button {
    width: 52px;
    height: 52px;
    bottom: 2rem;
  }
}

@media (min-width: 1024px) {
  .scroll-button {
    width: 56px;
    height: 56px;
    bottom: 2.5rem;
  }
}

@keyframes bounceSoft {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(6px); }
}

.scroll-button {
  animation: bounceSoft 2.5s infinite ease-in-out;
}

.scroll-button:hover {
  background: rgba(255,255,255,0.95);
  color: var(--color-primary);
  transform: translateX(-50%) scale(1.1);
  animation-play-state: paused;
}

/* ============================= */
/* PULSE ANIMATION               */
/* ============================= */
@keyframes pulseSlow {
  0%, 100% { opacity: 0.2; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(1.05); }
}

.animate-pulse-slow {
  animation: pulseSlow 6s infinite ease-in-out;
}

.delay-1000 {
  animation-delay: 1s;
}

/* ============================= */
/* MOBILE FIRST ADJUSTMENTS      */
/* ============================= */
@media (max-width: 479px) {
  .hero-line {
    flex-direction: column;
    gap: 0.25rem;
  }

  #hero-section {
    min-height: 100vh;
    min-height: 100dvh; /* Dynamic viewport height for mobile browsers */
  }
}

/* Fix pour les navigateurs mobiles (barre d'adresse) */
@supports (min-height: 100dvh) {
  #hero-section {
    min-height: 100dvh;
  }
}

/* ============================= */
/* REDUCED MOTION                */
/* ============================= */
@media (prefers-reduced-motion: reduce) {
  .hero-zoom,
  .scroll-button,
  .animate-pulse-slow {
    animation: none;
    transition: none;
  }

  .hero-fade-in,
  .hero-fade-in-delayed,
  .hero-title-enter,
  .hero-tagline-enter,
  .hero-desc-enter,
  .hero-cta-enter,
  .hero-social-enter {
    opacity: 1;
    animation: none;
  }
}
</style>

<script>
document.addEventListener("DOMContentLoaded", function() {

  // Zoom background
  const zoom = document.querySelector(".hero-zoom");
  if (zoom) {
    setTimeout(() => { zoom.style.transform = "scale(1.06)"; }, 100);
  }

  // Writing animation
  const cities = {{ cities|safe }};
  const text = document.getElementById("cityText");
  const cursor = document.getElementById("cursor");

  if (cities && cities.length && text && cursor) {
    let index = 0;

    function animateWord(word) {
      text.textContent = word;
      const duration = Math.max(word.length * 0.15, 0.8);

      text.style.transition = "none";
      text.style.clipPath = "inset(0 100% 0 0)";

      requestAnimationFrame(() => {
        text.style.transition = `clip-path ${duration}s cubic-bezier(0.25, 0.46, 0.45, 0.94)`;
        text.style.clipPath = "inset(0 0 0 0)";
        cursor.style.opacity = 1;

        setTimeout(() => {
          cursor.style.opacity = 0;
          setTimeout(() => {
            text.style.transition = "clip-path 0.35s ease-in";
            text.style.clipPath = "inset(0 100% 0 0)";
          }, 1800);
        }, duration * 1000 + 1500);
      });
    }

    function cycle() {
      animateWord(cities[index]);
      index = (index + 1) % cities.length;
    }

    cycle();
    setInterval(cycle, 6000);
  }

  // Smooth scroll
  const scrollBtn = document.querySelector('.scroll-button');
  if (scrollBtn) {
    scrollBtn.addEventListener('click', function(e) {
      e.preventDefault();
      const target = document.querySelector(this.getAttribute('href'));
      if (target) {
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    });
  }
});
</script>
