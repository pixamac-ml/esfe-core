<div class="tunnel-step-shell">
  <div class="tunnel-scroll pr-1">
    <div class="space-y-3">
      <p class="text-xs uppercase tracking-[0.25em] text-[#1db5b0] font-semibold" data-aos="fade-up" data-aos-delay="200">Profil</p>
      <h2 class="text-2xl md:text-3xl lg:text-4xl xl:text-5xl font-extrabold leading-tight text-[#1e4f6f]" data-aos="fade-up" data-aos-delay="100">Dites-nous en un peu plus pour mieux vous preparer.</h2>
      <p class="text-sm text-slate-600" data-aos="fade-up" data-aos-delay="200">Selectionnez votre niveau d'etudes pour decouvrir les formations adaptees.</p>
    </div>

    <div class="mt-5 grid grid-cols-1 sm:grid-cols-2 gap-3 max-w-2xl" data-aos="fade-up" data-aos-delay="300">
    <button type="button"
            class="rounded-2xl border p-4 text-left transition"
            :class="formData.current_level === 'licence' ? 'border-[#1db5b0] bg-[#1db5b0]/10 ring-1 ring-[#1db5b0]/35' : 'border-slate-200 hover:border-[#1db5b0]/60'"
            @click="formData.current_level = 'licence'; activeCycle = 'licence'; formData.formation=''; formData.formation_slug='';">
      <p class="font-semibold text-[#1e4f6f]">Licence</p>
      <p class="mt-1 text-xs text-slate-500">Parcours fondamental et professionnalisant</p>
    </button>

    <button type="button"
            class="rounded-2xl border p-4 text-left transition"
            :class="formData.current_level === 'master' ? 'border-[#1db5b0] bg-[#1db5b0]/10 ring-1 ring-[#1db5b0]/35' : 'border-slate-200 hover:border-[#1db5b0]/60'"
            @click="formData.current_level = 'master'; activeCycle = 'master'; formData.formation=''; formData.formation_slug='';">
      <p class="font-semibold text-[#1e4f6f]">Master</p>
      <p class="mt-1 text-xs text-slate-500">Specialisation avancee et leadership sante</p>
    </button>
    </div>
    <p x-show="errors.current_level" x-cloak class="mt-2 text-xs text-red-600" x-text="errors.current_level"></p>

    <div class="mt-6 space-y-4 max-w-2xl">
    <label class="relative block" data-aos="fade-up" data-aos-delay="300">
      <input x-model="formData.email" type="email" placeholder=" "
             class="peer h-12 md:h-14 w-full border-0 border-b border-slate-300 bg-transparent pr-10 pl-0 text-base md:text-lg text-slate-900 focus:border-[#1db5b0] focus:outline-none focus:ring-0" />
      <span class="pointer-events-none absolute left-0 transition-all duration-300"
            :class="fieldLabelClasses(formData.email)">Email</span>
      <i class="fa-regular fa-envelope absolute right-1 top-5 text-slate-400 text-sm"></i>
      <p x-show="errors.email" x-cloak class="mt-1 text-xs text-red-600" x-text="errors.email"></p>
    </label>

    <label class="relative block" data-aos="fade-up" data-aos-delay="300">
      <input x-model="formData.phone" type="text" placeholder=" "
             class="peer h-12 md:h-14 w-full border-0 border-b border-slate-300 bg-transparent pr-10 pl-0 text-base md:text-lg text-slate-900 focus:border-[#1db5b0] focus:outline-none focus:ring-0" />
      <span class="pointer-events-none absolute left-0 transition-all duration-300"
            :class="fieldLabelClasses(formData.phone)">Telephone</span>
      <i class="fa-solid fa-phone absolute right-1 top-5 text-slate-400 text-sm"></i>
      <p x-show="errors.phone" x-cloak class="mt-1 text-xs text-red-600" x-text="errors.phone"></p>
    </label>

    <label class="relative block" data-aos="fade-up" data-aos-delay="300">
      <input x-model="formData.birth_date" type="date" placeholder=" "
             class="peer h-12 md:h-14 w-full border-0 border-b border-slate-300 bg-transparent pr-10 pl-0 text-base md:text-lg text-slate-900 focus:border-[#1db5b0] focus:outline-none focus:ring-0" />
      <span class="pointer-events-none absolute left-0 transition-all duration-300"
            :class="fieldLabelClasses(formData.birth_date)">Date de naissance</span>
      <i class="fa-solid fa-cake-candles absolute right-1 top-5 text-slate-400 text-sm"></i>
      <p x-show="errors.birth_date" x-cloak class="mt-1 text-xs text-red-600" x-text="errors.birth_date"></p>
    </label>
    </div>
  </div>

  <div class="tunnel-nav" data-aos="fade-up" data-aos-delay="300">
    <button type="button"
            class="tunnel-btn-prev"
            @click="goTo(1)">
      Retour
    </button>
    <button type="button"
            class="group tunnel-btn-next"
            :disabled="!isStepComplete(2)"
            :class="!isStepComplete(2) ? 'opacity-60 cursor-not-allowed' : ''"
            @click="goTo(3)">
      Suivant
      <i class="fa-solid fa-chevron-right text-xs transition-transform group-hover:translate-x-1"></i>
    </button>
  </div>
</div>
