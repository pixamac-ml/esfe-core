{% extends "base.html" %}
{% block content %}

<div class="bg-soft min-h-screen py-16">
    <div class="max-w-3xl mx-auto bg-white p-10 rounded-xl shadow border border-primary-100">

        <div class="flex items-center gap-6 mb-8">
            <img src="{{ user_obj.profile.avatar_url }}"
                 class="w-24 h-24 rounded-full object-cover">

            <div>
                <h2 class="text-xl font-bold text-primary-700">
                    {{ user_obj.username }}
                </h2>
                <p class="text-gray-500 text-sm">
                    {{ user_obj.email }}
                </p>
            </div>
        </div>

        <div class="text-gray-700 mb-8">
            {{ user_obj.profile.bio|default:"Aucune bio." }}
        </div>

        <div class="flex gap-4">
            <a href="{% url 'accounts:edit_profile' %}"
               class="bg-primary-500 text-white px-4 py-2 rounded-lg">
                Modifier profil
            </a>

            <a href="{% url 'accounts:update_email' %}"
               class="bg-secondary text-white px-4 py-2 rounded-lg">
                Modifier email
            </a>

            <a href="{% url 'password_change' %}"
               class="bg-accent text-white px-4 py-2 rounded-lg">
                Mot de passe
            </a>
        </div>

    </div>
</div>

{% endblock %}
