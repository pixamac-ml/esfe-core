<div
  class="
    group rounded-3xl p-5 sm:p-6 lg:p-7 border overflow-hidden
    shadow-soft transition-all duration-300 ease-premium
    hover:shadow-premium hover:-translate-y-1
    focus-within:ring-2 focus-within:ring-primary-200/70

    {% if variant == 'primary' %}
        bg-primary-500 text-white border-primary-600/80
    {% elif variant == 'secondary' %}
        bg-secondary text-white border-secondary-dark/80
    {% elif variant == 'soft' %}
        bg-slate-50 text-slate-800 border-slate-200/80
    {% else %}
        bg-white/95 text-slate-800 border-slate-200/80 backdrop-blur-sm
    {% endif %}
  "
>
  {{ content|safe }}
</div>
