<div class="mb-5 flex items-start justify-between gap-3">
  <div>
    <p class="text-xs font-bold uppercase tracking-[0.18em] text-[color:var(--school-primary)]">Agenda</p>
    <h3 class="mt-1 text-xl font-black tracking-tight">Evenements a venir</h3>
  </div>
</div>

{% if events %}
  <div class="grid gap-3">
    {% for event in events %}
      <div class="flex items-start gap-3 rounded-xl border border-[color:var(--line)] bg-[color:var(--card-soft)] p-4">
        <div class="grid h-12 w-12 shrink-0 place-items-center rounded-xl bg-[color:var(--school-accent-soft)] text-center text-[color:var(--school-primary-dark)]">
          <div>
            <strong class="block text-base font-black leading-none">{{ event.day }}</strong>
            <span class="block text-[10px] font-extrabold uppercase">{{ event.month }}</span>
          </div>
        </div>
        <div class="min-w-0">
          <strong class="block text-sm">{{ event.title }}</strong>
          <span class="mt-1 block text-xs leading-5 text-[color:var(--muted)]">{{ event.desc|default:"Aucune description disponible." }}</span>
        </div>
      </div>
    {% endfor %}
  </div>
{% else %}
  <div class="rounded-xl border border-dashed border-[color:var(--line)] bg-[color:var(--card-soft)] p-5 text-sm text-[color:var(--muted)]">
    Aucun evenement n'est publie pour le moment.
  </div>
{% endif %}
