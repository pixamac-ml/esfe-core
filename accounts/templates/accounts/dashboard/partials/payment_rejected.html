<!-- Fragment paiement rejeté (remplace la ligne dans la liste) -->
<div class="flex flex-col sm:flex-row sm:items-center justify-between p-3 sm:p-4 rounded-xl bg-red-50 border border-red-200 gap-3 opacity-75">
    <div class="flex items-center gap-3 sm:gap-4 min-w-0">
        <div class="w-10 h-10 sm:w-12 sm:h-12 rounded-xl flex items-center justify-center font-bold text-white text-sm flex-shrink-0 bg-red-400">
            <i class="fas fa-times"></i>
        </div>
        <div class="flex-1 min-w-0">
            <p class="font-semibold text-red-800 truncate line-through">
                {{ payment.inscription.candidature.full_name }}
            </p>
            <p class="text-sm text-red-600 truncate">
                {{ payment.amount|intcomma }} FCFA - {{ payment.get_method_display }}
            </p>
            <p class="text-xs text-red-500 mt-1">
                <i class="fas fa-times-circle mr-1"></i>Paiement rejeté
                {% if reason %} - {{ reason }}{% endif %}
            </p>
        </div>
    </div>
    <div class="flex items-center gap-2 justify-end flex-shrink-0">
        <span class="px-3 py-1.5 rounded-full text-xs font-semibold bg-red-100 text-red-700">
            <i class="fas fa-times-circle mr-1"></i>Rejeté
        </span>
    </div>
</div>
