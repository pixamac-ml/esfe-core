{% load humanize %}
<!-- Résultats recherche inscriptions -->
{% if inscriptions %}
<div class="space-y-2 p-2 bg-white border border-slate-200 rounded-xl shadow-lg max-h-64 overflow-y-auto">
    {% for ins in inscriptions %}
    <button type="button"
            onclick="selectInscription('{{ ins.id }}', '{{ ins.candidature.full_name }}', '{{ ins.balance }}')"
            class="w-full text-left p-3 rounded-lg hover:bg-slate-50 transition-colors flex items-center justify-between gap-3">
        <div class="flex items-center gap-3 min-w-0">
            <div class="w-8 h-8 rounded-full flex items-center justify-center font-bold text-white text-xs" style="background: linear-gradient(135deg, #1e4f6f 0%, #2d6a8f 100%);">
                {{ ins.candidature.first_name.0|upper }}{{ ins.candidature.last_name.0|upper }}
            </div>
            <div class="min-w-0">
                <p class="font-semibold text-slate-800 truncate">{{ ins.candidature.full_name }}</p>
                <p class="text-xs text-slate-500 truncate">{{ ins.candidature.programme.title }}</p>
            </div>
        </div>
        <div class="text-right flex-shrink-0">
            <p class="font-semibold text-orange-600">{{ ins.balance|intcomma }} F</p>
            <p class="text-xs text-slate-400">solde</p>
        </div>
    </button>
    {% endfor %}
</div>
