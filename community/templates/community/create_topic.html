{% extends "base.html" %}
{% block content %}

<section class="relative pt-28 pb-20 bg-gradient-to-br from-primary-700 via-primary-600 to-primary-800 text-white">

    <div class="max-w-5xl mx-auto px-4">

        <div class="mb-8">
            <a href="{% url 'community:topic_list' %}"
               class="inline-flex items-center gap-2 text-sm text-primary-100 hover:text-white transition">
                ← Retour aux discussions
            </a>
        </div>

        <h1 class="text-3xl md:text-4xl font-bold">
            Nouveau sujet
        </h1>

        <p class="text-primary-100 mt-3 max-w-2xl text-sm">
            Formulez votre question de manière précise afin de favoriser des réponses pertinentes.
        </p>

    </div>
</section>


<section class="bg-soft py-20">
    <div class="max-w-5xl mx-auto px-4">

        <div id="topic-form-container">
            {% include "community/partials/topic_form.html" %}
        </div>

    </div>
</section>

{% endblock %}
