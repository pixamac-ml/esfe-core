{% extends "superadmin/base.html" %}

{% block page_title %}{{ page_title }}{% endblock %}
{% block page_subtitle %}Edition d'une categorie blog{% endblock %}

{% block content_main %}
<div class="max-w-3xl">
    <div class="card">
        <div class="card-body">
            <form method="post" class="space-y-4">
                {% csrf_token %}
                <label class="block text-sm text-slate-700">
                    <span class="block mb-1 font-medium">Nom</span>
                    <input type="text" name="name" value="{{ category.name|default:'' }}" class="w-full rounded-lg border border-slate-300 px-3 py-2" required>
                </label>

                <label class="block text-sm text-slate-700">
                    <span class="block mb-1 font-medium">Description</span>
                    <textarea name="description" rows="5" class="w-full rounded-lg border border-slate-300 px-3 py-2">{{ category.description|default:'' }}</textarea>
                </label>

                <div class="flex justify-end gap-2 pt-2">
                    <a href="{% url 'superadmin:category_list' %}" class="btn btn-outline">Annuler</a>
                    <button type="submit" class="btn btn-primary">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
