<span id="sg-sidebar-counters"
      hx-get="{% url 'secretary:htmx_sidebar_counters' %}"
      hx-trigger="secretary:sidebar-updated from:body"
      hx-swap="outerHTML"
      hidden></span>
<span id="sg-count-registry" class="inline-flex items-center justify-center rounded-full bg-[color:var(--primary)] px-1.5 text-[10px] font-bold text-white leading-none min-w-[18px] h-[18px]" hx-swap-oob="true">{{ pending_registry_count|default:0 }}</span>
<span id="sg-count-visits" class="inline-flex items-center justify-center rounded-full bg-amber-500 px-1.5 text-[10px] font-bold text-white leading-none min-w-[18px] h-[18px]" hx-swap-oob="true">{{ active_visits|default:0 }}</span>
<span id="sg-count-documents" class="inline-flex items-center justify-center rounded-full bg-amber-500 px-1.5 text-[10px] font-bold text-white leading-none min-w-[18px] h-[18px]" hx-swap-oob="true">{{ pending_documents_count|default:0 }}</span>
<span id="sg-count-appointments" class="inline-flex items-center justify-center rounded-full bg-[color:var(--primary)] px-1.5 text-[10px] font-bold text-white leading-none min-w-[18px] h-[18px]" hx-swap-oob="true">{{ appointments_today|default:0 }}</span>
<span id="sg-count-notifications" class="inline-flex items-center justify-center rounded-full bg-red-500 px-1.5 text-[10px] font-bold text-white leading-none min-w-[18px] h-[18px]" hx-swap-oob="true">{{ messages_count|default:0 }}</span>
