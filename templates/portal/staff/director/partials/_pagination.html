{% if page_obj and page_obj.paginator.num_pages > 1 %}
<div class="mt-4 flex flex-wrap items-center justify-between gap-3 border-t border-slate-100 pt-4">
  <div>
    {% if page_obj.has_previous %}
      <button type="button" class="director-btn director-btn-secondary" hx-get="{% url 'accounts_portal:director_workspace' %}?{{ extra_qs }}&{{ page_param }}={{ page_obj.previous_page_number }}" hx-target="#director-workspace" hx-swap="innerHTML">Precedent</button>
    {% endif %}
  </div>
  <p class="text-xs font-black uppercase tracking-wide text-slate-400">Page {{ page_obj.number }} / {{ page_obj.paginator.num_pages }} ({{ page_obj.paginator.count }} resultat(s))</p>
  <div>
    {% if page_obj.has_next %}
      <button type="button" class="director-btn director-btn-secondary" hx-get="{% url 'accounts_portal:director_workspace' %}?{{ extra_qs }}&{{ page_param }}={{ page_obj.next_page_number }}" hx-target="#director-workspace" hx-swap="innerHTML">Suivant</button>
    {% endif %}
  </div>
</div>
{% endif %}
