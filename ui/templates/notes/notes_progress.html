{% if state %}
<section class="workflow-progress">
  <div class="workflow-progress-head">
    <span>Progression de saisie</span>
    <strong>{{ state.progress_percent }}%</strong>
  </div>
  <div class="workflow-progress-track">
    <div style="width: {{ state.progress_percent }}%"></div>
  </div>
  <p>{{ state.missing_grades }} note(s) restante(s) avant validation.</p>
</section>
{% endif %}
