{% extends "base.html" %}
{% block content %}

<section class="bg-soft py-20">
    <div class="max-w-6xl mx-auto px-4">

        <h1 class="text-3xl font-bold text-primary-700 mb-10">
            Contributeurs de la communauté
        </h1>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">

            {% for user in users %}
            <a href="{% url 'community:public_profile' user.username %}"
               class="bg-white rounded-xl border border-primary-100 p-6 shadow-sm hover:shadow-lg transition group">

                <div class="flex items-center gap-4">

                    {% if user.profile.image %}
                        <img src="{{ user.profile.image.url }}"
                             class="w-14 h-14 rounded-full object-cover border-2 border-primary-100">
                    {% else %}
                        <div class="w-14 h-14 rounded-full bg-primary-100
                                    flex items-center justify-center
                                    text-primary-700 font-semibold">
                            {{ user.username|first|upper }}
                        </div>
                    {% endif %}

                    <div>
                        <div class="font-semibold text-primary-700 group-hover:text-secondary transition">
                            {{ user.username }}
                        </div>
                        <div class="text-xs text-gray-400">
                            {{ user.answer_count }} réponses • {{ user.topic_count }} sujets
                        </div>
                    </div>

                </div>

            </a>
            {% endfor %}

        </div>

    </div>
</section>

{% endblock %}
