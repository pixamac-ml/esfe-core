{% load component_tags %}
<div class="{% if compact %}p-4{% else %}p-5{% endif %} rounded-xl border border-dashed border-[color:var(--line)] bg-[color:var(--card-soft)] text-sm text-[color:var(--muted)]">
  <div class="flex items-start gap-3">
    <span class="grid h-9 w-9 shrink-0 place-items-center rounded-lg bg-[color:var(--school-primary-soft)] text-[color:var(--school-primary)]">
      <i data-lucide="{{ icon }}" style="width:17px;height:17px;"></i>
    </span>
    <span class="min-w-0">
      {% if title %}<strong class="block text-sm font-black text-[color:var(--text)]">{{ title }}</strong>{% endif %}
      {% if message %}<span class="mt-1 block leading-6">{{ message }}</span>{% endif %}
      {% slot "default" %}{% endslot %}
    </span>
  </div>
</div>
