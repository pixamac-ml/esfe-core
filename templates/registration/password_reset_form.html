{% extends "base.html" %}
{% block content %}

<div class="min-h-screen flex items-center justify-center bg-soft">
    <div class="bg-white p-10 rounded-xl shadow border border-primary-100 w-full max-w-md">

        <h2 class="text-xl font-bold text-primary-700 mb-6">
            Réinitialiser le mot de passe
        </h2>

        <form method="post" class="space-y-6">
            {% csrf_token %}
            {{ form.email }}

            <button type="submit"
                    class="w-full bg-primary-500 text-white py-3 rounded-lg">
                Envoyer le lien
            </button>
        </form>

    </div>
</div>

{% endblock %}
