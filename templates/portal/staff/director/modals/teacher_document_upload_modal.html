<div class="grid gap-5">
  <div class="flex items-start justify-between gap-4">
    <div>
      <p class="portal-section-kicker">Document</p>
      <h3 class="mt-1 text-2xl font-black text-slate-900">Ajouter une piece</h3>
      <p class="mt-1 text-sm font-semibold text-slate-500">Upload direct sur le dossier de l'enseignant selectionne.</p>
    </div>
    <button type="button" class="director-btn director-btn-secondary" onclick="window.deCloseModal && window.deCloseModal()">Fermer</button>
  </div>

  <form class="grid gap-5" method="post" enctype="multipart/form-data" hx-encoding="multipart/form-data" hx-post="{% url 'accounts_portal:director_teacher_document_upload' %}" hx-target="#director-workspace" hx-swap="innerHTML">
    {% csrf_token %}
    <div class="director-grid-2">
      <label class="grid gap-2 text-xs font-bold uppercase tracking-wide text-slate-500">
        Enseignant
        <select name="teacher_id" class="h-12 rounded-xl border border-slate-200 bg-white px-4 text-sm font-semibold text-slate-900 outline-none">
          {% for teacher in document_teacher_rows %}
            <option value="{{ teacher.id }}"{% if selected_document_teacher and teacher.id == selected_document_teacher.id %} selected{% endif %}>{{ teacher.get_full_name|default:teacher.username }}</option>
          {% endfor %}
        </select>
      </label>
      <label class="grid gap-2 text-xs font-bold uppercase tracking-wide text-slate-500">
        Type de piece
        <select name="document_type" class="h-12 rounded-xl border border-slate-200 bg-white px-4 text-sm font-semibold text-slate-900 outline-none">
          {% for value, label in teacher_document_type_choices %}
            <option value="{{ value }}">{{ label }}</option>
          {% endfor %}
        </select>
      </label>
    </div>

    <label class="grid gap-2 text-xs font-bold uppercase tracking-wide text-slate-500">
      Note
      <input type="text" name="note" class="h-12 rounded-xl border border-slate-200 bg-white px-4 text-sm font-semibold text-slate-900 outline-none" placeholder="Reference, precision, commentaire">
    </label>

    <label class="grid gap-2 text-xs font-bold uppercase tracking-wide text-slate-500">
      Fichier
      <input type="file" name="file" class="rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm font-semibold text-slate-900 outline-none" required>
    </label>

    <div class="flex flex-wrap items-center gap-3">
      <button type="submit" class="director-btn director-btn-primary">Ajouter la piece</button>
      <span class="text-xs font-semibold text-slate-500">La piece sera visible dans le dossier documentaire de l'enseignant.</span>
    </div>
  </form>
</div>
