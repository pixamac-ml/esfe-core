{% load humanize %}
<span id="widget-alerts-badge"
      hx-get="{% url 'accounts:widget_alerts_badge' %}"
      hx-trigger="every 45s, dashboardStatsUpdated from:body"
      hx-swap="outerHTML"
      style="display:inline-flex; align-items:center; gap:6px;">
  {% if alerts_count > 0 %}
  <span class="dg-btn dg-btn-danger" style="font-size:.65rem; height:26px; padding:0 .5rem; pointer-events:none;">
    <i class="fa-solid fa-bell"></i> {{ alerts_count }}
  </span>
  {% endif %}
  {% if priorities_count > 0 %}
  <span class="dg-btn dg-btn-warning" style="font-size:.65rem; height:26px; padding:0 .5rem; pointer-events:none;">
    <i class="fa-solid fa-list-check"></i> {{ priorities_count }}
  </span>
  {% endif %}
</span>
