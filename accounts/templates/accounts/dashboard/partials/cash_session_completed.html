{% load humanize %}
<!-- Session cash complétée (paiement enregistré) -->
<div class="p-4 rounded-xl bg-green-50 border border-green-200" id="session-row-{{ session.id }}">
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
        <div class="flex items-center gap-3 sm:gap-4 min-w-0">
            <div class="w-12 h-12 rounded-xl flex items-center justify-center font-bold text-white text-lg bg-green-500">
                <i class="fas fa-check"></i>
            </div>
            <div class="flex-1 min-w-0">
                <p class="font-semibold text-green-800">{{ session.inscription.candidature.full_name }}</p>
                <p class="text-sm text-green-600">{{ payment.amount|intcomma }} FCFA encaissés</p>
                <p class="text-xs text-green-500 mt-1">
                    <i class="fas fa-check-circle mr-1"></i>
                    Reçu: {{ payment.receipt_number|default:payment.reference }}
                </p>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <span class="px-4 py-2 rounded-full text-sm font-semibold bg-green-100 text-green-700">
                <i class="fas fa-check-circle mr-1"></i>Paiement enregistré
            </span>
        </div>
    </div>
</div>
