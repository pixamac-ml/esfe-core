<h2 class="font-semibold text-lg mb-4 text-gray-800">Situation financière</h2>
<div class="flex flex-col h-full justify-between">
  <div class="space-y-2 text-xs text-gray-600 mb-2">
    <div class="flex items-center justify-between">
      <span class="font-medium text-gray-700">Total à payer :</span>
      <span class="font-semibold text-blue-600">{{ total_due }}</span>
    </div>
    <div class="flex items-center justify-between">
      <span class="font-medium text-gray-700">Total payé :</span>
      <span class="font-semibold text-green-600">{{ total_paid }}</span>
    </div>
    <div class="flex items-center justify-between">
      <span class="font-medium text-gray-700">Reste à payer :</span>
      <span class="font-semibold text-red-600">{{ remaining }}</span>
    </div>
    <div class="flex items-center gap-2 mt-2">
      <span class="px-2 py-1 text-xs rounded bg-blue-100 text-blue-600 font-semibold tracking-wide">{{ status }}</span>
    </div>
  </div>
</div>
