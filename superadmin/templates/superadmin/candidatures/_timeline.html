<div class="card">
    <div class="card-header">
        <h3 class="text-base font-bold text-slate-900">Timeline & historique</h3>
    </div>
    <div class="card-body">
        <ol class="space-y-3">
            {% for item in timeline %}
            <li class="flex items-start gap-3">
                <span class="inline-flex h-8 w-8 items-center justify-center rounded-full bg-slate-100 {{ item.color }}">
                    <i class="fas {{ item.icon }} text-xs"></i>
                </span>
                <div>
                    <p class="text-sm font-medium text-slate-800 mb-0">{{ item.label }}</p>
                    <p class="text-xs text-slate-500 mb-0">{{ item.date|date:"d/m/Y H:i" }}</p>
                </div>
            </li>
            {% endfor %}
        </ol>
    </div>
</div>
