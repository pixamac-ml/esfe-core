<div class="rounded-xl border border-[color:var(--line)] bg-[color:var(--card-soft)] px-3 py-2.5">
  <header class="student-progress-row text-[11px] font-extrabold uppercase tracking-wide text-[color:var(--muted)]">
    <span>{{ label }}</span>
    <span>{{ value }}%</span>
  </header>
  <progress class="student-progress-meter mt-2" max="{{ max_value }}" value="{{ value }}"></progress>
</div>
