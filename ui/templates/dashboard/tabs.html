<div x-data="{ active: '{{ active_tab }}' }" class="border-b border-[color:var(--line)]">
  <nav class="-mb-px flex gap-4" role="tablist">
    {% for tab in tabs %}
      <button
        type="button"
        role="tab"
        @click="active = '{{ tab.id }}'"
        x-bind:class="active === '{{ tab.id }}' ? 'border-[color:var(--school-primary)] text-[color:var(--school-primary)]' : 'border-transparent text-[color:var(--muted)] hover:text-[color:var(--text)]'"
        class="px-1 py-3 text-sm font-bold border-b-2 transition whitespace-nowrap"
        x-bind:aria-selected="active === '{{ tab.id }}'"
      >
        {% if tab.icon %}<i data-lucide="{{ tab.icon }}" style="width:16px;height:16px;" class="inline-block mr-1.5"></i>{% endif %}
        {{ tab.label }}
      </button>
    {% endfor %}
  </nav>
</div>
