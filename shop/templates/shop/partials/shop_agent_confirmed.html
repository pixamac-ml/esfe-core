<div id="shop-agent-result" class="mt-2">
    <div class="flex items-center gap-2 rounded-lg border border-emerald-200 bg-emerald-50 px-3 py-2 text-sm text-emerald-900">
        <svg class="h-4 w-4 shrink-0 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
        <div>
            <span class="font-medium">{{ agent.user.get_full_name }}</span>
            <span class="text-emerald-700">(Agent verifie)</span>
        </div>
    </div>
    {% if session %}
    <div class="mt-3 rounded-lg border border-blue-200 bg-blue-50 p-3">
        <p class="text-sm font-semibold text-blue-900">Demande de paiement boutique preparee</p>
        <p class="mt-1 text-xs text-blue-800 leading-relaxed">
            Le code a 6 chiffres est visible sur le tableau de la gestionnaire (section Paiements ou poste especes).
            Saisissez ce code ci-dessous puis le montant avant d'envoyer la demande.
        </p>
    </div>
    {% endif %}
</div>
