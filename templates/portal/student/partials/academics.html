<h2 class="mb-4 text-lg font-semibold text-gray-800">Situation academique</h2>
<div class="flex h-full flex-col justify-between">
  <div class="mb-4">
    <div class="mb-2 flex items-center gap-2">
      <span class="text-2xl font-bold text-blue-600">{{ average }}</span>
      <span class="rounded bg-blue-100 px-2 py-1 text-xs font-semibold tracking-wide text-blue-600">{{ status }}</span>
    </div>
    <div class="mb-1 flex flex-wrap gap-3">
      <span class="text-xs text-gray-500">Credits : <span class="font-semibold text-gray-700">{{ credits }}</span></span>
      <span class="text-xs text-gray-500">Semestres : <span class="font-semibold text-gray-700">{{ semester }}</span></span>
    </div>
    <div class="mb-1 flex flex-wrap gap-3">
      <span class="text-xs text-gray-500">Formation : <span class="font-semibold text-gray-700">{{ formation }}</span></span>
      <span class="text-xs text-gray-500">Classe : <span class="font-semibold text-gray-700">{{ classroom }}</span></span>
    </div>
    <p class="mt-3 text-xs text-gray-500">{{ status_message }}</p>
  </div>
  <div class="mt-2 h-2 w-full overflow-hidden rounded-full bg-gray-200">
    <div class="h-full bg-gradient-to-r from-blue-400 to-blue-600 transition-all duration-300" style="width:{{ progress }}%"></div>
  </div>
</div>
