{% load component_tags %}
<div
  x-data="{ visible: true }"
  x-show="visible"
  x-transition:enter="transition ease-out duration-300"
  x-transition:enter-start="opacity-0 -translate-y-2"
  x-transition:leave="transition ease-in duration-200"
  x-transition:leave-start="opacity-100"
  x-transition:leave-end="opacity-0"
  class="{{ class_str }}
    {% if variant == 'banner' %}
      w-full border-b px-6 py-3
    {% else %}
      rounded-xl border px-4 py-3.5
    {% endif %}
    {% if tone == 'success' %}
      border-[color:var(--success)]/30 bg-[color:var(--success-soft)] text-[color:var(--success)]
    {% elif tone == 'warning' %}
      border-[color:var(--warning)]/30 bg-[color:var(--warning-soft)] text-[color:var(--warning)]
    {% elif tone == 'danger' %}
      border-[color:var(--danger)]/30 bg-[color:var(--danger-soft)] text-[color:var(--danger)]
    {% else %}
      border-[color:var(--school-primary)]/30 bg-[color:var(--school-primary-soft)] text-[color:var(--school-primary)]
    {% endif %}
  "
  role="alert"
>
  <div class="flex items-start gap-3 {% if variant == 'banner' %}max-w-7xl mx-auto{% endif %}">
    {% if tone == 'success' %}
      <span class="mt-0.5 flex h-6 w-6 shrink-0 items-center justify-center"><i data-lucide="{{ icon|default:'check-circle' }}" style="width:18px;height:18px;"></i></span>
    {% elif tone == 'warning' %}
      <span class="mt-0.5 flex h-6 w-6 shrink-0 items-center justify-center"><i data-lucide="{{ icon|default:'alert-triangle' }}" style="width:18px;height:18px;"></i></span>
    {% elif tone == 'danger' %}
      <span class="mt-0.5 flex h-6 w-6 shrink-0 items-center justify-center"><i data-lucide="{{ icon|default:'alert-circle' }}" style="width:18px;height:18px;"></i></span>
    {% else %}
      <span class="mt-0.5 flex h-6 w-6 shrink-0 items-center justify-center"><i data-lucide="{{ icon|default:'info' }}" style="width:18px;height:18px;"></i></span>
    {% endif %}
    <div class="min-w-0 flex-1">
      {% if title %}
        <strong class="block text-sm font-black">{{ title }}</strong>
      {% endif %}
      {% if message %}
        <p class="mt-0.5 text-sm leading-6 opacity-90">{{ message }}</p>
      {% endif %}
      {% slot "default" %}{% endslot %}
    </div>
    {% if dismissible %}
      <button @click="visible = false" class="flex h-6 w-6 shrink-0 items-center justify-center rounded opacity-70 transition hover:opacity-100" aria-label="Fermer">
        <i data-lucide="x" style="width:14px;height:14px;"></i>
      </button>
    {% endif %}
  </div>
</div>
