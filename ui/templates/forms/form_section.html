{% load component_tags %}
<fieldset class="space-y-4 {{ class_str }}">
  {% if title %}
    <legend class="text-base font-black text-[color:var(--text)]">{{ title }}</legend>
  {% endif %}
  {% if description %}
    <p class="text-sm text-[color:var(--muted)] -mt-2">{{ description }}</p>
  {% endif %}
  <div class="space-y-4">
    {% slot "default" %}{% endslot %}
  </div>
</fieldset>
