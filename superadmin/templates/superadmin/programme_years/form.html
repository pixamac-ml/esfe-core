{% extends "superadmin/base.html" %}

{% block page_title %}{{ page_title }}{% endblock %}
{% block page_subtitle %}Configuration d'une annee de programme{% endblock %}

{% block content_main %}
<div class="max-w-3xl">
    <div class="card">
        <div class="card-body">
            <form method="post" class="space-y-4">
                {% csrf_token %}
                <label class="block text-sm text-slate-700">
                    <span class="block mb-1 font-medium">Programme</span>
                    <select name="programme" class="w-full rounded-lg border border-slate-300 px-3 py-2" required>
                        <option value="">Selectionner</option>
                        {% for p in programmes %}
                        <option value="{{ p.pk }}" {% if programme_year.programme_id == p.pk %}selected{% endif %}>{{ p.title }}</option>
                        {% endfor %}
                    </select>
                </label>
                <label class="block text-sm text-slate-700">
                    <span class="block mb-1 font-medium">Numero d'annee</span>
                    <input type="number" min="1" name="year_number" value="{{ programme_year.year_number|default:'' }}" class="w-full rounded-lg border border-slate-300 px-3 py-2" required>
                </label>
                <div class="flex justify-end gap-2 pt-2">
                    <a href="{% url 'superadmin:programme_year_list' %}" class="btn btn-outline">Annuler</a>
                    <button type="submit" class="btn btn-primary">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
