<aside class="rail">
  <div class="rail-brand">
    <div class="eyebrow">Surveillant Général</div>
    <div class="name">ESFé Core</div>
    <div class="sub">{{ branch.name|default:"Annexe" }}</div>
  </div>

  {% include "portal/staff/supervisor/partials/_sidebar_nav_inner.html" %}

  <div class="rail-foot">
    <div class="who">
      <div class="avatar">{{ user_initials|default:"SG" }}</div>
      <div class="meta">
        <b>{{ user_display_name|default:request.user.get_full_name }}</b>
        <span>Surveillant Général</span>
      </div>
    </div>
    <form method="post" action="{% url 'accounts:logout' %}">
      {% csrf_token %}
      <button type="submit" class="logout">
        <svg class="i" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5M21 12H9"/></svg>
        Déconnexion
      </button>
    </form>
  </div>
</aside>
