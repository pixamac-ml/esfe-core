<div class="mk-audience-box">
  <div class="mk-panel-head" style="margin-bottom:8px">
    <div class="mk-panel-title">Estimation audience</div>
    <span class="mk-badge {% if estimate.quality == 'forte' %}green{% else %}amber{% endif %}">{{ estimate.quality }}</span>
  </div>
  <div class="mk-audience-grid">
    <div class="mk-audience-stat"><strong>{{ estimate.total }}</strong><span class="mk-item-sub">prospect(s)</span></div>
    <div class="mk-audience-stat"><strong>{{ estimate.email_ready }}</strong><span class="mk-item-sub">email pret(s)</span></div>
    <div class="mk-audience-stat"><strong>{{ estimate.phone_ready }}</strong><span class="mk-item-sub">telephone(s)</span></div>
  </div>
</div>
