{% extends "superadmin/base.html" %}
{% load humanize %}

{% block page_title %}Modifier Inscription #{{ inscription.pk }}{% endblock %}
{% block page_subtitle %}Ajustements administratifs et financiers{% endblock %}

{% block content_main %}
<div class="max-w-4xl mx-auto">
    <div class="card">
        <form method="post" class="card-body space-y-5">
            {% csrf_token %}
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Candidat</label>
                    <input type="text" value="{{ inscription.candidature.full_name }}" disabled class="w-full rounded-lg border border-slate-200 bg-slate-50 px-3 py-2">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Programme</label>
                    <input type="text" value="{{ inscription.candidature.programme.title }}" disabled class="w-full rounded-lg border border-slate-200 bg-slate-50 px-3 py-2">
                </div>
                <div>
                    <label for="status" class="block text-sm font-medium text-slate-700 mb-1">Statut</label>
                    <select id="status" name="status" class="w-full rounded-lg border border-slate-300 px-3 py-2">
                        {% for value, label in status_choices %}
                        <option value="{{ value }}" {% if inscription.status == value %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label for="amount_due" class="block text-sm font-medium text-slate-700 mb-1">Montant dû</label>
                    <input id="amount_due" type="number" name="amount_due" value="{{ inscription.amount_due }}" min="0" step="1000" class="w-full rounded-lg border border-slate-300 px-3 py-2">
                </div>
            </div>
            <label class="inline-flex items-center gap-2 text-sm text-slate-600">
                <input type="checkbox" name="is_archived" {% if inscription.is_archived %}checked{% endif %}>
                Archiver cette inscription
            </label>
            <div class="flex justify-end gap-2">
                <a href="{% url 'superadmin:inscription_detail' inscription.pk %}" class="btn btn-outline">Annuler</a>
                <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i>Enregistrer</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
