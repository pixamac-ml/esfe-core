{% if items %}
<section class="py-20 bg-gradient-to-b from-white to-gray-50/50" id="objectifs">
  <div class="max-w-7xl mx-auto px-6">

    <!-- Header -->
    <div class="max-w-3xl mx-auto text-center mb-16">
      <!-- Badge -->
      <div class="inline-flex items-center gap-2 bg-secondary/10 text-secondary px-5 py-2.5 rounded-full text-sm font-semibold mb-6">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
        </svg>
        Compétences visées
      </div>

      <h2 class="text-3xl md:text-4xl font-bold text-primary mb-4">
        Ce que vous allez apprendre
      </h2>

      <p class="text-gray-600 leading-relaxed text-lg">
        Cette formation vous permettra d'acquérir des <span class="text-secondary font-semibold">compétences concrètes</span> et immédiatement applicables dans votre parcours professionnel.
      </p>
    </div>

    <!-- Grille de compétences -->
    <div class="grid md:grid-cols-2 gap-6 max-w-5xl mx-auto">

      {% for item in items %}
        <div class="group bg-white rounded-3xl p-6 shadow-lg hover:shadow-xl
                    transition-all duration-300 border border-gray-100 cursor-pointer relative overflow-hidden">

          <!-- Bandeau décoratif -->
          <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-secondary to-primary opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>

          <div class="flex items-start gap-5">

            <!-- Numéro stylisé -->
            <div class="flex-shrink-0">
              <div class="w-12 h-12 rounded-2xl bg-secondary/10 flex items-center justify-center text-secondary font-bold text-lg shadow-sm group-hover:scale-110 group-hover:shadow-md transition-all duration-300">
                {{ forloop.counter }}
              </div>
            </div>

            <!-- Contenu -->
            <div class="flex-1">
              <p class="text-gray-700 leading-relaxed text-base font-medium group-hover:text-primary transition-colors duration-300">
                {{ item }}
              </p>
            </div>

            <!-- Icône check -->
            <div class="hidden md:flex flex-shrink-0 items-center">
              <div class="w-8 h-8 rounded-full bg-green-50 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all duration-300 transform scale-0 group-hover:scale-100">
                <svg class="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/>
                </svg>
              </div>
            </div>

          </div>

        </div>
      {% endfor %}

    </div>

  </div>
</section>
{% endif %}
