<div class="inline-flex flex-col items-center gap-2">
  <svg
    width="{{ size }}"
    height="{{ size }}"
    viewBox="0 0 {{ size }} {{ size }}"
    class="-rotate-90"
    role="progressbar"
    aria-valuenow="{{ value }}"
    aria-valuemin="0"
    aria-valuemax="{{ max_value }}"
    aria-label="{{ label|default:'Progression' }}"
  >
    <circle
      cx="{{ center }}"
      cy="{{ center }}"
      r="{{ radius }}"
      fill="none"
      stroke="color-mix(in srgb, {{ stroke_color }} 15%, transparent)"
      stroke-width="{{ stroke_width }}"
    />
    <circle
      cx="{{ center }}"
      cy="{{ center }}"
      r="{{ radius }}"
      fill="none"
      stroke="{{ stroke_color }}"
      stroke-width="{{ stroke_width }}"
      stroke-linecap="round"
      stroke-dasharray="{{ circumference }}"
      stroke-dashoffset="{{ offset }}"
      class="transition-all duration-700 ease-out"
    />
  </svg>
  <div class="text-center">
    <strong class="block text-lg font-black text-[color:var(--text)]">{{ percentage }}%</strong>
    {% if label %}
      <span class="text-[11px] font-bold uppercase tracking-wide text-[color:var(--muted)]">{{ label }}</span>
    {% endif %}
  </div>
</div>
