<table class="data-table">
    <thead>
        <tr>
            <th>Programme</th>
            <th>Onglet</th>
            <th>Type</th>
            <th>Titre</th>
            <th>Ordre</th>
            <th class="text-right">Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for section in sections %}
        <tr>
            <td>{{ section.tab.programme.title }}</td>
            <td>{{ section.tab.title }}</td>
            <td>{{ section.get_section_type_display }}</td>
            <td>{{ section.title|default:'-' }}</td>
            <td>{{ section.order }}</td>
            <td class="text-right">
                <div class="inline-flex gap-2">
                    <a href="{% url 'superadmin:programme_section_edit' section.pk %}" class="btn btn-outline btn-sm">Modifier</a>
                    <form method="post" action="{% url 'superadmin:programme_section_delete' section.pk %}" onsubmit="return confirm('Supprimer cette section ?');">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger btn-sm">Supprimer</button>
                    </form>
                </div>
            </td>
        </tr>
        {% empty %}
        <tr><td colspan="6" class="py-10 text-center text-slate-500">Aucune section.</td></tr>
        {% endfor %}
    </tbody>
</table>
