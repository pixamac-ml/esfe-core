<div class="rounded-xl border border-[color:var(--line)] bg-[color:var(--card-soft)] px-3 py-2.5">
  <div class="flex items-center justify-between text-[11px] font-bold uppercase tracking-wide text-[color:var(--muted)]">
    <span>{{ label }}</span>
    <span>{{ value }}%</span>
  </div>
  <div class="mt-2 h-2 w-full overflow-hidden rounded-full bg-[color:var(--surface-2)]" role="progressbar" aria-valuenow="{{ value }}" aria-valuemin="0" aria-valuemax="{{ max_value }}" aria-label="{{ label }}">
    <div class="h-full rounded-full bg-[color:var(--school-primary)] transition-all duration-500" style="width:{{ value }}%"></div>
  </div>
</div>
