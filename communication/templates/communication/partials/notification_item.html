<div id="notification-{{ notification.id }}" class="rounded-2xl border border-slate-200 bg-white p-5 {% if not notification.read_at %}border-l-4 border-l-primary-500{% endif %}">
  <div class="flex items-start justify-between gap-4">
    <div class="min-w-0">
      <p class="text-sm font-bold text-slate-900">{{ notification.title }}</p>
      <p class="mt-2 text-sm text-slate-600">{{ notification.body }}</p>
      <p class="mt-2 text-xs font-semibold uppercase tracking-wide text-slate-400">{{ notification.created_at|timesince }}</p>
    </div>
    {% if not notification.read_at %}
      <button
        hx-post="{% url 'communication:mark_notification_read' notification.id %}"
        hx-swap="outerHTML"
        hx-target="#notification-{{ notification.id }}"
        class="rounded-xl border border-slate-200 px-3 py-2 text-xs font-bold text-slate-700">
        Marquer lu
      </button>
    {% endif %}
  </div>
</div>
