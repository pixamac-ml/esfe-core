<form
    hx-post="{% url 'accounts:htmx_manager_expense_create' %}"
    hx-target="#manager-expense-form"
    hx-swap="outerHTML"
    hx-encoding="multipart/form-data"
    hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
    id="manager-expense-form"
    class="space-y-4">
    <div class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-600">
        Saisir ici une charge locale de l'annexe. Le cycle est simple: soumission, approbation, paiement, puis sortie automatique en caisse.
    </div>
    {% include "accounts/dashboard/partials/dg_form_fields.html" with form=expense_form %}
    <div class="dg-form-footer">
        <button type="submit" class="dg-btn dg-btn-primary">
            <i class="fa-solid fa-plus"></i>
            Enregistrer la depense
        </button>
    </div>
</form>
