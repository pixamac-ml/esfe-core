<div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100
            hover:shadow-lg transition duration-300 flex flex-col justify-between">

    <div class="space-y-3">

        <div class="flex items-center justify-between">

            <span class="px-3 py-1 rounded-full text-xs font-semibold uppercase tracking-wide
                         {% if result.type == 'semestre' %}
                            bg-primary-100 text-primary-700
                         {% else %}
                            bg-secondary-100 text-secondary-700
                         {% endif %}">
                {{ result.get_type_display }}
            </span>

            <span class="text-xs text-gray-400">
                {{ result.annee_academique }}
            </span>

        </div>

        <h3 class="text-lg font-semibold text-gray-800">
            {{ result.titre }}
        </h3>

        <div class="text-sm text-gray-600 space-y-1">
            <div><strong>Annexe :</strong> {{ result.annexe }}</div>
            <div><strong>Filière :</strong> {{ result.filiere }}</div>
            <div><strong>Classe :</strong> {{ result.classe }}</div>
        </div>

    </div>

    <div class="mt-6">
        <a href="{{ result.fichier_pdf.url }}"
           target="_blank"
           class="inline-flex items-center justify-center w-full
                  px-5 py-3 rounded-xl
                  bg-primary-600 text-white text-sm font-medium
                  hover:bg-primary-700 transition shadow-sm">
            Télécharger le PDF
        </a>
    </div>

</div>
