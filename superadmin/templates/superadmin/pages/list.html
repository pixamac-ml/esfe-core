{% extends 'superadmin/base.html' %}
{% block content %}
<div class="container-fluid">
    <h1 class="h3 mb-4">Liste des pages</h1>
    <div class="card">
        <div class="card-body">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>Titre</th>
                        <th>Slug</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for page in pages %}
                    <tr>
                        <td>{{ page.title }}</td>
                        <td>{{ page.slug }}</td>
                        <td>{{ page.status }}</td>
                        <td>
                            <a href="{% url 'superadmin:page_detail' page.id %}" class="btn btn-sm btn-primary">Voir</a>
                            <a href="{% url 'superadmin:page_edit' page.id %}" class="btn btn-sm btn-warning">Modifier</a>
                        </td>
                    </tr>
                    {% empty %}
                    <tr><td colspan="4">Aucune page trouvée.</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
