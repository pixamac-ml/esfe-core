<span class="font-bold tabular-nums whitespace-nowrap
  {% if tone == 'success' %}text-[color:var(--success)]
  {% elif tone == 'danger' %}text-[color:var(--danger)]
  {% elif tone == 'warning' %}text-[color:var(--warning)]
  {% else %}text-[color:var(--text)]{% endif %}">
  {{ value }}
  <span class="text-[11px] font-semibold text-[color:var(--muted-2)]">{{ currency }}</span>
</span>
