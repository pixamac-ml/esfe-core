{% load component_tags %}
<div
  x-data="{ visible: false }"
  x-init="$watch('$store.loading?.active', val => visible = val ?? false)"
  x-show="visible"
  x-transition:enter="transition ease-out duration-200"
  x-transition:enter-start="opacity-0"
  x-transition:enter-end="opacity-100"
  x-transition:leave="transition ease-in duration-150"
  x-transition:leave-start="opacity-100"
  x-transition:leave-end="opacity-0"
  x-cloak
  class="{% if fullscreen %}fixed inset-0 z-[80]{% else %}absolute inset-0 z-10{% endif %} flex items-center justify-center rounded-xl bg-[color:var(--card)]/80 backdrop-blur-sm"
  role="status"
  aria-label="{{ label }}"
>
  <div class="flex flex-col items-center gap-3">
    <svg class="h-8 w-8 animate-spin text-[color:var(--school-primary)]" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"/>
    </svg>
    <span class="text-sm font-bold text-[color:var(--muted)]">{{ label }}</span>
  </div>
</div>
