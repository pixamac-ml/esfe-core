<span class="inline-flex items-center gap-1 rounded-full border px-2 py-0.5 text-[11px] font-extrabold
  {% if tone == 'success' %}border-[color:var(--success)]/30 bg-[color:var(--success-soft)] text-[color:var(--success)]
  {% elif tone == 'warning' %}border-[color:var(--warning)]/30 bg-[color:var(--warning-soft)] text-[color:var(--warning)]
  {% elif tone == 'danger' %}border-[color:var(--danger)]/30 bg-[color:var(--danger-soft)] text-[color:var(--danger)]
  {% elif tone == 'primary' %}border-[color:var(--school-primary)]/30 bg-[color:var(--school-primary-soft)] text-[color:var(--school-primary)]
  {% elif tone == 'info' %}border-[color:var(--info)]/30 bg-[color:var(--info-soft)] text-[color:var(--info)]
  {% else %}border-[color:var(--line)] bg-[color:var(--card-soft)] text-[color:var(--muted)]{% endif %}
">
  {% if icon %}<i data-lucide="{{ icon }}" style="width:10px;height:10px;"></i>{% endif %}
  {{ label }}
</span>
