<div class="mt-12 pt-8 border-t border-gray-200">

  <div class="flex items-center justify-between">

    <!-- Left : Interaction -->
    <div class="flex items-center gap-6 text-sm">

      <span class="text-gray-500">
        👁 {{ article.views_count }} vues
      </span>

      <span class="text-gray-500">
        💬 {{ article.comments.count }} commentaires
      </span>

    </div>

    <!-- Right : Share -->
    <div class="flex items-center gap-4">

      <a href="https://wa.me/?text={{ request.build_absolute_uri }}"
         target="_blank"
         class="text-gray-500 hover:text-green-600 transition">
        WhatsApp
      </a>

      <a href="https://www.facebook.com/sharer/sharer.php?u={{ request.build_absolute_uri }}"
         target="_blank"
         class="text-gray-500 hover:text-blue-600 transition">
        Facebook
      </a>

      <a href="https://www.linkedin.com/sharing/share-offsite/?url={{ request.build_absolute_uri }}"
         target="_blank"
         class="text-gray-500 hover:text-blue-700 transition">
        LinkedIn
      </a>

    </div>

  </div>

</div>
