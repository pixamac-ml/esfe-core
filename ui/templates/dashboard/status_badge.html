<span class="inline-flex items-center gap-1.5 rounded-full border px-3 py-1.5 text-[11px] font-extrabold
  {% if tone == 'success' %}
    border-emerald-200 bg-emerald-50 text-emerald-700
  {% elif tone == 'warning' %}
    border-amber-200 bg-amber-50 text-amber-700
  {% elif tone == 'danger' %}
    border-rose-200 bg-rose-50 text-rose-700
  {% elif tone == 'primary' %}
    border-primary-100 bg-primary-50 text-primary-700
  {% else %}
    border-[color:var(--line)] bg-[color:var(--card-soft)] text-[color:var(--muted)]
  {% endif %}
">
  {% if icon %}<i data-lucide="{{ icon }}" style="width:13px;height:13px;"></i>{% endif %}
  {{ label }}
</span>
