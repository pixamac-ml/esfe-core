{% load static %}

<section class="relative overflow-hidden bg-primary-800 text-white py-12 sm:py-14">
  <img src="{% static 'images/hero_institution.png' %}"
       alt="Etudiants ESFE"
       class="absolute inset-0 h-full w-full object-cover object-center">
  <div class="absolute inset-0 bg-gradient-to-r from-primary-900/88 via-primary-800/68 to-primary-800/18"></div>
  <div class="relative max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
    <p class="text-xs sm:text-sm font-semibold uppercase tracking-[0.22em] text-secondary">Admission en ligne</p>
    <h1 class="mt-3 max-w-3xl text-3xl sm:text-4xl lg:text-5xl font-bold leading-tight">Lancez votre carriere a l'ESFE</h1>
    <p class="mt-3 max-w-2xl text-sm sm:text-base text-white/82">
      Choisissez votre campus, votre formation et envoyez votre dossier depuis le tunnel de candidature.
    </p>
  </div>
</section>
