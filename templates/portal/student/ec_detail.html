{% extends "base.html" %}
{% load static %}

{% block title %}{{ page_title }}{% endblock %}

{% block extra_head %}
<link rel="stylesheet" href="{% static 'portal/student/dashboard.css' %}?v=student-dashboard-3">
{% endblock %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-blue-50 via-white to-slate-100 py-10">
  <div class="mx-auto max-w-5xl px-4 sm:px-6">
    <div class="mb-8">
      <a href="{% url 'portal_student:student_courses' %}" class="inline-flex items-center rounded-xl border border-slate-300 bg-white px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50">
        Retour aux matieres
      </a>
    </div>

    <div class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm">
      {% include "portal/student/partials/ec_detail_panel.html" %}
    </div>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="{% static 'portal/student/course_immersive.js' %}?v=student-dashboard-3"></script>
<script>
  window.StudentDashboardConfig = {
    contentProgressUrlTemplate: "{% url 'portal_student:content_progress' 0 %}"
  };
</script>
<script src="{% static 'portal/student/dashboard.js' %}?v=student-dashboard-3"></script>
{% endblock %}
