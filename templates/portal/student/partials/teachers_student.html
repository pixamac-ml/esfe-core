<div class="mb-5 flex items-start justify-between gap-3">
  <div>
    <p class="text-xs font-bold uppercase tracking-[0.18em] text-[color:var(--school-primary)]">Encadrement</p>
    <h3 class="mt-1 text-xl font-black tracking-tight">Enseignants lies</h3>
  </div>
</div>

{% if teachers %}
  <div class="grid gap-3">
    {% for teacher in teachers %}
      <div class="flex items-center gap-3 rounded-xl border border-[color:var(--line)] bg-[color:var(--card-soft)] p-4">
        <div class="grid h-11 w-11 place-items-center rounded-xl bg-[color:var(--school-primary-soft)] font-black text-[color:var(--school-primary-dark)]">
          {{ teacher.name|slice:":1"|upper }}
        </div>
        <div class="min-w-0 flex-1">
          <strong class="block truncate text-sm">{{ teacher.name }}</strong>
          <span class="block truncate text-xs text-[color:var(--muted)]">{{ teacher.subject }}</span>
        </div>
      </div>
    {% endfor %}
  </div>
{% else %}
  <div class="rounded-xl border border-dashed border-[color:var(--line)] bg-[color:var(--card-soft)] p-5 text-sm text-[color:var(--muted)]">
    Les enseignants lies a vos EC ne sont pas encore renseignes dans le systeme.
  </div>
{% endif %}
