<ol class="relative ml-2 border-l-2 border-[color:var(--line)] space-y-6">
  {% for item in items %}
    <li class="ml-6">
      <span class="absolute -left-[11px] mt-1 flex h-5 w-5 items-center justify-center rounded-full border-2 border-[color:var(--line)] bg-[color:var(--card)]
        {% if item.tone == 'success' %}border-[color:var(--success)]/30 bg-[color:var(--success-soft)]
        {% elif item.tone == 'danger' %}border-[color:var(--danger)]/30 bg-[color:var(--danger-soft)]
        {% elif item.tone == 'primary' %}border-[color:var(--school-primary)]/30 bg-[color:var(--school-primary-soft)]
        {% else %}border-[color:var(--line)] bg-[color:var(--card-soft)]{% endif %}">
        {% if item.icon %}
          <i data-lucide="{{ item.icon }}" style="width:10px;height:10px;" class="{% if item.tone == 'success' %}text-[color:var(--success)]{% elif item.tone == 'danger' %}text-[color:var(--danger)]{% elif item.tone == 'primary' %}text-[color:var(--school-primary)]{% else %}text-[color:var(--muted)]{% endif %}"></i>
        {% endif %}
      </span>
      <div>
        <div class="flex items-center gap-2">
          {% if item.title %}
            <strong class="text-sm font-black text-[color:var(--text)]">{{ item.title }}</strong>
          {% endif %}
          {% if item.date %}
            <span class="text-[10px] font-bold uppercase tracking-wide text-[color:var(--muted-2)]">{{ item.date }}</span>
          {% endif %}
        </div>
        {% if item.description %}
          <p class="mt-0.5 text-sm text-[color:var(--muted)]">{{ item.description }}</p>
        {% endif %}
      </div>
    </li>
  {% endfor %}
</ol>
