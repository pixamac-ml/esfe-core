<div class="bg-white rounded-2xl border border-gray-200 p-6 shadow-sm hover:shadow-md transition duration-300">

  <div class="flex items-start gap-4">

    <!-- Avatar -->
    <div class="w-10 h-10 rounded-full bg-primary-100 text-primary-700
                flex items-center justify-center font-semibold text-sm">
      {{ comment.author_name | slice: 0, 1 }}
    </div>

    <div class="flex-1">

      <!-- Header -->
      <div class="flex justify-between items-center mb-2">
        <h4 class="font-semibold text-gray-900 text-sm">
          {{ comment.author_name }}
        </h4>

        <span class="text-xs text-gray-400 flex items-center gap-1">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M8 7V3m8 4V3M4 11h16M5 5h14a2 2 0 012 2v12a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2z"/>
          </svg>
          {{ comment.created_at }}
        </span>
      </div>

      <!-- Content -->
      <p class="text-gray-700 text-sm leading-relaxed">
        {{ comment.content }}
      </p>

      <!-- Reactions -->
      <div class="flex items-center gap-6 mt-4 text-sm text-gray-500">

        <!-- Like -->
        <button class="flex items-center gap-2 hover:text-primary-700 transition">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M14 9V5a3 3 0 00-6 0v4H5a2 2 0 00-2 2v1a2 2 0 002 2h3l1 5h7l1-7h2a2 2 0 002-2v-1a2 2 0 00-2-2h-6z"/>
          </svg>
          <span>{{ comment.likes }}</span>
        </button>

        <!-- Dislike -->
        <button class="flex items-center gap-2 hover:text-red-600 transition">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M10 15v4a3 3 0 006 0v-4h3a2 2 0 002-2v-1a2 2 0 00-2-2h-3l-1-5H8l-1 7H5a2 2 0 00-2 2v1a2 2 0 002 2h5z"/>
          </svg>
          <span>{{ comment.dislikes }}</span>
        </button>

      </div>

    </div>
  </div>
</div>
