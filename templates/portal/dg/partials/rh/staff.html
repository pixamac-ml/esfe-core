{% load humanize %}
<div class="dg-card dg-card-pad">
  <div class="dg-section-head">
    <div>
      <h3 class="dg-title">RH / Staff</h3>
    </div>
    <div class="flex gap-2">
      <button type="button" class="dg-action dg-action-dark" onclick="dgOpenModal('{% url 'accounts_portal:dg_modal' %}?modal=recruitment')">
        <i class="fa-solid fa-user-plus"></i>
        Recruter un staff
      </button>
    </div>
  </div>
  <div class="grid grid-cols-1 gap-5 lg:grid-cols-4">
    <div class="rounded-2xl border border-slate-100 bg-slate-50 p-5">
      <p class="text-sm font-black text-slate-600">Staff actif</p>
      <p class="mt-3 text-4xl font-black text-slate-950">{{ rh.active_staff|intcomma }}</p>
    </div>
    <div class="rounded-2xl border border-emerald-100 bg-emerald-50 p-5">
      <p class="text-sm font-black text-emerald-700">Annexes avec manager</p>
      <p class="mt-3 text-4xl font-black text-emerald-800">{{ rh.branches_with_manager|intcomma }}</p>
    </div>
    <div class="rounded-2xl border border-orange-100 bg-orange-50 p-5">
      <p class="text-sm font-black text-orange-700">Managers a affecter</p>
      <p class="mt-3 text-4xl font-black text-orange-800">{{ rh.branches_without_manager|intcomma }}</p>
    </div>
    <div class="rounded-2xl border border-blue-100 bg-blue-50 p-5">
      <p class="text-sm font-black text-blue-700">Workflow onboarding</p>
      <p class="mt-3 text-4xl font-black text-blue-700">5</p>
      <p class="mt-2 text-xs font-bold text-blue-700/70">etapes cible</p>
    </div>
  </div>
  <div class="mt-5 grid grid-cols-1 gap-4 lg:grid-cols-3">
    <button type="button" class="dg-action h-14 justify-between px-4" onclick="dgOpenModal('{% url 'accounts_portal:dg_modal' %}?modal=recruitment')">
      <span><i class="fa-solid fa-user-plus mr-2"></i>Recrutement</span>
      <i class="fa-solid fa-chevron-right"></i>
    </button>
    <button type="button" class="dg-action h-14 justify-between px-4" onclick="dgOpenModal('{% url 'accounts_portal:dg_modal' %}?modal=recruitment')">
      <span><i class="fa-solid fa-building-user mr-2"></i>Affectation annexe</span>
      <i class="fa-solid fa-chevron-right"></i>
    </button>
    <button type="button" class="dg-action h-14 justify-between px-4" onclick="dgOpenModal('{% url 'accounts_portal:dg_modal' %}?modal=recruitment')">
      <span><i class="fa-solid fa-key mr-2"></i>Generation acces</span>
      <i class="fa-solid fa-chevron-right"></i>
    </button>
  </div>
</div>
