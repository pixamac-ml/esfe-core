<div class="student-stat-pill">
  {% if icon %}
    <div class="mb-2 grid h-8 w-8 place-items-center rounded-lg bg-[color:var(--school-primary-soft)] text-[color:var(--school-primary)]">
      <i data-lucide="{{ icon }}" style="width:16px;height:16px;"></i>
    </div>
  {% endif %}
  <strong class="block truncate text-lg font-black tracking-tight text-[color:var(--text)]">{{ value }}</strong>
  <span class="mt-1 block text-[11px] font-bold uppercase tracking-wide text-[color:var(--muted)]">{{ label }}</span>
  {% if hint %}<span class="mt-1 block text-xs font-semibold text-[color:var(--muted)]">{{ hint }}</span>{% endif %}
</div>
