<div
    x-data="{ copied:false }"
    class="p-6 bg-green-50 border border-green-200 rounded-2xl shadow-sm animate-fade-in"
>

<div class="flex items-start gap-4">

    <!-- Icon -->
    <div class="w-12 h-12 rounded-xl bg-green-100 flex items-center justify-center flex-shrink-0">
        <i class="fas fa-check text-green-600 text-lg"></i>
    </div>

    <div class="flex-1 space-y-3">

        <!-- Title -->
        <p class="font-semibold text-green-800 text-base">
            Inscription créée avec succès
        </p>

        <!-- Code -->
        <div class="flex items-center gap-3">

            <span class="text-sm text-green-700">
                Code d'accès :
            </span>

            <span
                id="access-code-{{ inscription.id }}"
                class="font-mono text-sm font-bold bg-white px-3 py-1.5 rounded-lg border border-green-200 text-green-800"
            >
                {{ inscription.access_code }}
            </span>

            <!-- Copy button -->
            <button
                @click="
                    navigator.clipboard.writeText('{{ inscription.access_code }}');
                    copied=true;
                    setTimeout(()=>copied=false,2000)
                "
                class="px-3 py-1.5 text-xs rounded-lg bg-green-600 text-white hover:bg-green-700 transition flex items-center gap-1"
            >
                <i class="fas fa-copy"></i>
                Copier
            </button>

            <span
                x-show="copied"
                x-transition
                class="text-xs text-green-600"
            >
                Copié !
            </span>

        </div>

        <!-- Public link -->
        <div class="flex items-center gap-3 flex-wrap">

            <a
                href="{{ inscription.get_public_url }}"
                target="_blank"
                class="px-4 py-2 text-sm rounded-xl bg-[#1e4f6f] text-white hover:bg-[#163b53] flex items-center gap-2 transition"
            >
                <i class="fas fa-external-link-alt"></i>
                Ouvrir le dossier
            </a>

            <button
                onclick="showInscriptionModal(
                    '{{ candidature.full_name|escapejs }}',
                    '{{ inscription.access_code }}',
                    '{{ inscription.get_public_url }}'
                )"
                class="px-4 py-2 text-sm rounded-xl bg-[#1db5b0] text-white hover:bg-[#17a6a2] flex items-center gap-2 transition"
            >
                <i class="fas fa-link"></i>
                Voir le lien d'inscription
            </button>

        </div>

    </div>

</div>

</div>
