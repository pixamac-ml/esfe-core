{# Widget niveau utilisateur - à inclure dans les profils/réponses #}
{% if user.gamification %}
{% with gam=user.gamification %}
<div class="inline-flex items-center gap-2 px-3 py-1.5 bg-gradient-to-r from-primary-50 to-secondary-50 rounded-full border border-primary-100">
    <!-- Icône niveau -->
    <span class="text-lg" title="Niveau {{ gam.level }}">{{ gam.get_level_icon }}</span>

    <!-- Titre + Niveau -->
    <div class="flex flex-col leading-tight">
        <span class="text-xs font-semibold text-primary-700">{{ gam.get_level_title }}</span>
        <span class="text-[10px] text-gray-500">{{ gam.total_xp }} XP</span>
    </div>

    <!-- Barre de progression (optionnel) -->
    <div class="hidden sm:block w-16 h-1.5 bg-gray-200 rounded-full overflow-hidden">
        <div class="h-full bg-gradient-to-r from-primary-500 to-secondary-500 transition-all duration-500"
             style="width: {{ gam.xp_progress }}%"></div>
    </div>
</div>
{% endwith %}
{% endif %}
