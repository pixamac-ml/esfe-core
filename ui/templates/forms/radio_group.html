<div class="space-y-2 {{ class_str }}">
  {% for opt in options %}
    <label class="inline-flex items-center gap-2.5 cursor-pointer">
      <input
        type="radio"
        name="{{ name }}"
        value="{{ opt.value }}"
        {% if value == opt.value %}checked{% endif %}
        {% if required %}required{% endif %}
        {% if disabled %}disabled{% endif %}
        class="border-[color:var(--line)] bg-[color:var(--card)] text-[color:var(--school-primary)] focus:ring-[color:var(--school-primary-soft)] focus:ring-2 focus:ring-offset-1 transition
               {% if disabled %}opacity-50 pointer-events-none{% endif %}"
      >
      <span class="text-sm text-[color:var(--text)] {% if disabled %}opacity-50{% endif %}">{{ opt.label }}</span>
    </label>
  {% endfor %}
  {% for error in errors %}
    <p class="text-xs font-semibold text-[color:var(--danger)]">{{ error }}</p>
  {% endfor %}
</div>
