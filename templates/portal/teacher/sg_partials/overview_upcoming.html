<div class="sg-panel">
  <div class="sg-panel-title"><i class="fa-regular fa-calendar-plus" style="margin-right:6px;"></i>A venir</div>
  {% if upcoming_events %}
    <div class="message-list">
      {% for event in upcoming_events %}
      <div class="sg-action-card">
        <div><div class="sg-action-label">{{ event.title }}</div><div class="sg-action-sub">{{ event.class_name }} · {{ event.start_datetime|date:"d/m H:i" }} · {{ event.location|default:"-" }}</div></div>
        <span class="sg-badge-sm sg-badge-blue">{{ event.start_datetime|date:"l" }}</span>
      </div>
      {% endfor %}
    </div>
  {% else %}
    <div class="sg-empty" style="padding:24px 0;">
      <div class="sg-empty-text" style="font-size:.85rem;">Rien de prevu pour les prochains jours.</div>
    </div>
  {% endif %}
</div>
