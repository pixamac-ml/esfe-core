{% extends 'superadmin/base.html' %}
{% block content %}
<div class="container-fluid">
    <h1 class="h3 mb-4">Détail de la page</h1>
    <div class="card">
        <div class="card-body">
            <h2>{{ page.title }}</h2>
            <p><strong>Slug :</strong> {{ page.slug }}</p>
            <p><strong>Status :</strong> {{ page.status }}</p>
            <div class="mt-4">
                {{ page.content|safe }}
            </div>
            <a href="{% url 'superadmin:page_edit' page.id %}" class="btn btn-warning mt-3">Modifier</a>
            <a href="{% url 'superadmin:pages' %}" class="btn btn-secondary mt-3">Retour à la liste</a>
        </div>
    </div>
</div>
{% endblock %}
