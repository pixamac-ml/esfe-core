<nav aria-label="Fil d'ariane" class="flex items-center gap-1.5 text-xs">
  {% for item in items %}
    {% if not forloop.first %}
      <i data-lucide="chevron-right" style="width:12px;height:12px;" class="text-[color:var(--muted-2)] shrink-0"></i>
    {% endif %}
    {% if item.url and not forloop.last %}
      <a href="{{ item.url }}" class="font-semibold text-[color:var(--muted)] transition hover:text-[color:var(--text)]">{{ item.label }}</a>
    {% else %}
      <span class="font-bold text-[color:var(--text)]">{{ item.label }}</span>
    {% endif %}
  {% endfor %}
</nav>
