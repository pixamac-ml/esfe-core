<section class="relative py-32 overflow-hidden">

    <!-- Background gradient -->
    <div class="absolute inset-0 bg-gradient-to-br from-primary-600 via-primary-700 to-primary-900"></div>

    <!-- Motif décoratif -->
    <div class="absolute inset-0 opacity-10">
        <svg class="absolute w-full h-full" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <pattern id="cta-pattern" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
                    <circle cx="30" cy="30" r="1.5" fill="white"/>
                </pattern>
            </defs>
            <rect width="100%" height="100%" fill="url(#cta-pattern)"/>
        </svg>
    </div>

    <!-- Cercles décoratifs -->
    <div class="absolute -top-24 -right-24 w-96 h-96 bg-secondary-500/20 rounded-full blur-3xl"></div>
    <div class="absolute -bottom-24 -left-24 w-80 h-80 bg-primary-400/20 rounded-full blur-3xl"></div>

    <div class="relative max-w-4xl mx-auto px-6 text-center">

        <!-- Contenu -->
        <div data-aos="fade-up" data-aos-duration="800">
            <h2 class="text-4xl md:text-5xl lg:text-6xl font-bold text-white mb-6 leading-tight">
                {{ title }}
            </h2>

            {% if subtitle %}
            <p class="text-xl md:text-2xl text-white/80 mb-10 max-w-2xl mx-auto">
                {{ subtitle }}
            </p>
            {% endif %}
        </div>

        <!-- Boutons -->
        <div class="flex flex-col sm:flex-row items-center justify-center gap-4"
             data-aos="fade-up" data-aos-duration="800" data-aos-delay="200">

            <!-- Bouton principal -->
            <a href="{{ button_url }}"
               class="group inline-flex items-center gap-3 px-10 py-5
                      bg-white text-primary-700 font-bold text-lg rounded-full
                      shadow-2xl shadow-black/20
                      hover:bg-secondary-500 hover:text-white
                      transform hover:scale-105 hover:-translate-y-1
                      transition-all duration-300">
                {{ button_text }}
                <svg class="w-6 h-6 transform group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/>
                </svg>
            </a>

            <!-- Bouton secondaire -->
            {% if secondary_text %}
            <a href="{{ secondary_url|default:'#' }}"
               class="inline-flex items-center gap-2 px-8 py-4
                      border-2 border-white/30 text-white font-semibold rounded-full
                      hover:bg-white/10 hover:border-white/50
                      transition-all duration-300">
                {{ secondary_text }}
            </a>
            {% endif %}

        </div>

        <!-- Trust indicators -->
        <div class="mt-12 flex flex-wrap items-center justify-center gap-8 text-white/60"
             data-aos="fade-up" data-aos-duration="800" data-aos-delay="400">
            <div class="flex items-center gap-2">
                <svg class="w-5 h-5 text-secondary-400" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
                </svg>
                <span class="text-sm">Inscription simple</span>
            </div>
            <div class="flex items-center gap-2">
                <svg class="w-5 h-5 text-secondary-400" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
                </svg>
                <span class="text-sm">Accompagnement personnalisé</span>
            </div>
            <div class="flex items-center gap-2">
                <svg class="w-5 h-5 text-secondary-400" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
                </svg>
                <span class="text-sm">Diplômes reconnus</span>
            </div>
        </div>

    </div>

</section>
