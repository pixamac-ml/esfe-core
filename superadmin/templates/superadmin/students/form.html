{% extends "superadmin/base.html" %}

{% block page_title %}Modifier Étudiant{% endblock %}
{% block page_subtitle %}Mise à jour des informations du compte étudiant{% endblock %}

{% block content_main %}
<div class="max-w-3xl mx-auto">
    <div class="card rounded-xl shadow-sm border border-slate-100">
        <form method="post" class="card-body space-y-5">
            {% csrf_token %}
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label for="first_name" class="block text-sm font-medium text-slate-700 mb-1">Prénom</label>
                    <input id="first_name" name="first_name" type="text" value="{{ student.user.first_name }}" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
                </div>
                <div>
                    <label for="last_name" class="block text-sm font-medium text-slate-700 mb-1">Nom</label>
                    <input id="last_name" name="last_name" type="text" value="{{ student.user.last_name }}" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
                </div>
                <div class="md:col-span-2">
                    <label for="email" class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                    <input id="email" name="email" type="email" value="{{ student.user.email }}" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
                </div>
                <div>
                    <label for="student_matricule" class="block text-sm font-medium text-slate-700 mb-1">Matricule</label>
                    <input id="student_matricule" type="text" value="{{ student.matricule }}" disabled class="w-full rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm">
                </div>
                <div>
                    <label for="student_inscription_token" class="block text-sm font-medium text-slate-700 mb-1">Inscription</label>
                    <input id="student_inscription_token" type="text" value="{{ student.inscription.public_token }}" disabled class="w-full rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm">
                </div>
            </div>

            <div class="flex justify-end gap-2">
                <a href="{% url 'superadmin:student_detail' student.pk %}" class="btn btn-outline">Annuler</a>
                <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i>Enregistrer</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
