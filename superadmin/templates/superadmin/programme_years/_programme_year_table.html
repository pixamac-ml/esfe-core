<table class="data-table">
    <thead>
        <tr>
            <th>Programme</th>
            <th>Annee</th>
            <th class="text-right">Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for py in programme_years %}
        <tr>
            <td>{{ py.programme.title }}</td>
            <td>Annee {{ py.year_number }}</td>
            <td class="text-right">
                <div class="inline-flex gap-2">
                    <a href="{% url 'superadmin:programme_year_edit' py.pk %}" class="btn btn-outline btn-sm">Modifier</a>
                    <form method="post" action="{% url 'superadmin:programme_year_delete' py.pk %}" onsubmit="return confirm('Supprimer cette annee ?');">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger btn-sm">Supprimer</button>
                    </form>
                </div>
            </td>
        </tr>
        {% empty %}
        <tr><td colspan="3" class="py-10 text-center text-slate-500">Aucune annee de programme.</td></tr>
        {% endfor %}
    </tbody>
</table>
