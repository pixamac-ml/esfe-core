{% extends "base.html" %}

{% block content %}
<section class="min-h-[70vh] flex items-center justify-center bg-gray-50 py-24">
  <div class="text-center max-w-2xl px-6">

    <p class="text-primary-600 font-semibold mb-4 tracking-widest">
      ERREUR {{ error_code }}
    </p>

    <h1 class="text-5xl font-bold text-gray-900 mb-6">
      {{ error_title }}
    </h1>

    <p class="text-lg text-gray-600 mb-10 leading-relaxed">
      {{ error_message }}
    </p>

    <div class="flex flex-wrap justify-center gap-4">
      <a href="{% url 'core:home' %}"
         class="px-8 py-3 bg-primary-600 text-white rounded-lg hover:bg-primary-700 transition">
        Retour à l'accueil
      </a>
    </div>

  </div>
</section>
{% endblock %}
