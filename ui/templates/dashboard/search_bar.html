<div class="relative">
  <span class="absolute left-3 top-1/2 -translate-y-1/2 text-[color:var(--muted-2)]">
    <i data-lucide="search" style="width:16px;height:16px;"></i>
  </span>
  <input
    type="text"
    name="{{ name }}"
    placeholder="{{ placeholder }}"
    value="{{ value }}"
    hx-trigger="keyup changed delay:300ms, search"
    hx-target="{{ hx_target }}"
    {% if hx_post %}hx-post="{{ hx_post }}"{% endif %}
    {% if hx_get %}hx-get="{{ hx_get }}"{% endif %}
    hx-indicator="#search-spinner"
    class="block w-full rounded-lg border border-[color:var(--line)] bg-[color:var(--card)] pl-10 pr-3 py-2.5 text-sm text-[color:var(--text)] placeholder:text-[color:var(--muted-2)] outline-none focus:border-[color:var(--school-primary)] focus:ring-2 focus:ring-[color:var(--school-primary-soft)] transition"
  >
  <span id="search-spinner" class="absolute right-3 top-1/2 -translate-y-1/2 htmx-indicator">
    <i data-lucide="loader" style="width:16px;height:16px;" class="animate-spin text-[color:var(--muted)]"></i>
  </span>
</div>
