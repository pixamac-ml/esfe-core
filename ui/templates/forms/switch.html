<label class="inline-flex items-center gap-3 cursor-pointer {{ class_str }}">
  <div
    x-data="{ on: {{ checked|lower }} }"
    :class="on ? 'bg-[color:var(--school-primary)]' : 'bg-[color:var(--line)]'"
    class="relative inline-flex h-6 w-11 shrink-0 rounded-full transition"
    role="switch"
    :aria-checked="on"
    tabindex="0"
    @click="on = !on"
    @keydown.enter.prevent="on = !on"
    @keydown.space.prevent="on = !on"
  >
    <span
      :class="on ? 'translate-x-6' : 'translate-x-0.5'"
      class="inline-block mt-0.5 h-5 w-5 transform rounded-full bg-white shadow-sm transition"
    ></span>
  </div>
  <input type="hidden" name="{{ name }}" x-data x-model="on" :value="on ? '{{ value }}' : ''">
  {% if label %}
    <span class="text-sm font-semibold text-[color:var(--text)] {% if disabled %}opacity-50{% endif %}">{{ label }}</span>
  {% endif %}
</label>
