{% load humanize %}
<div class="dg-card dg-card-pad">
  <div class="dg-section-head">
    <div>
      <h3 class="dg-title">Workflow Passages & Reinscriptions</h3>
    </div>
    <button type="button" class="dg-action" onclick="dgOpenDrawer('{% url 'accounts_portal:dg_drawer' %}?kind=workflow')" title="Detail">
      <i class="fa-regular fa-eye"></i>
    </button>
  </div>
  <div class="dg-workflow-grid">
    {% for step in workflow.steps %}
    <button type="button" class="dg-workflow-card transition hover:border-blue-200 hover:bg-blue-50/30" onclick="dgOpenDrawer('{{ step.drawer_url }}')">
      <span class="grid h-8 w-8 place-items-center rounded-lg text-sm font-black text-white {% if step.tone == 'emerald' %}bg-emerald-500{% elif step.tone == 'blue' %}bg-blue-500{% elif step.tone == 'orange' %}bg-orange-500{% else %}bg-violet-500{% endif %}">{{ step.number }}</span>
      <p class="mt-4 text-sm font-black text-slate-800">{{ step.label }}</p>
      <p class="mt-3 text-4xl font-black text-slate-950">{{ step.count|intcomma }}</p>
      <p class="mt-1 text-xs font-bold text-slate-500">dossiers</p>
      <div class="mt-5 h-2 overflow-hidden rounded-full bg-slate-100">
        <span class="block h-full rounded-full {% if step.tone == 'emerald' %}bg-emerald-500{% elif step.tone == 'blue' %}bg-blue-500{% elif step.tone == 'orange' %}bg-orange-500{% else %}bg-violet-500{% endif %}" style="width: {{ step.percent }}%"></span>
      </div>
    </button>
    {% endfor %}
  </div>
  <div class="mt-6 rounded-2xl border border-rose-100 bg-rose-50 p-4">
    <div class="flex flex-wrap items-center justify-between gap-4">
      <div class="flex items-center gap-3">
        <div class="grid h-11 w-11 place-items-center rounded-xl bg-white text-rose-600"><i class="fa-solid fa-users-gear"></i></div>
        <div>
          <p class="text-base font-black text-rose-700">{{ workflow.blocked_count|intcomma }} dossiers bloques</p>
        </div>
      </div>
      <button type="button" class="dg-action border-rose-200 text-rose-700" onclick="dgOpenDrawer('{% url 'accounts_portal:dg_drawer' %}?kind=workflow&step=blocked')">Ouvrir</button>
    </div>
  </div>
</div>
