{% extends "base.html" %}
{% block content %}

<section class="bg-soft min-h-screen py-20">
    <div class="max-w-md mx-auto px-4">

        <div class="bg-white p-12 rounded-2xl shadow border border-primary-100 text-center">

            <!-- Icône info -->
            <div class="mb-8">
                <div class="w-20 h-20 mx-auto bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-3xl">
                    ⏻
                </div>
            </div>

            <h2 class="text-2xl font-bold text-primary-700 mb-4">
                Vous êtes déconnecté
            </h2>

            <p class="text-gray-600 leading-relaxed mb-10">
                Votre session a été fermée avec succès.
                Vous pouvez vous reconnecter à tout moment.
            </p>

            <a href="{% url 'login' %}"
               class="bg-primary-500 hover:bg-primary-600 text-white px-8 py-3 rounded-xl font-semibold transition shadow-md">
                Se reconnecter
            </a>

        </div>

    </div>
</section>

{% endblock %}
