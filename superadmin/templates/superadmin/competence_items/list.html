{% extends "superadmin/base.html" %}

{% block page_title %}Items de competences{% endblock %}
{% block page_subtitle %}Details de competences par bloc{% endblock %}

{% block content_main %}
<div class="space-y-5">
    <div class="card p-4">
        <form method="get" class="grid grid-cols-1 md:grid-cols-4 gap-3"
              hx-get="{% url 'superadmin:competence_item_list' %}" hx-target="#competence-item-table-container" hx-swap="innerHTML" hx-trigger="change, submit">
            <div class="md:col-span-2">
                <select name="programme" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
                    <option value="">Tous les programmes</option>
                    {% for p in programmes %}
                    <option value="{{ p.pk }}" {% if filters.programme == p.pk|stringformat:'s' %}selected{% endif %}>{{ p.title }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="flex gap-2">
                <button type="submit" class="btn btn-outline btn-sm">Filtrer</button>
                <a href="{% url 'superadmin:competence_item_list' %}" class="btn btn-outline btn-sm">Reset</a>
            </div>
            <div class="md:justify-self-end">
                <a href="{% url 'superadmin:competence_item_create' %}" class="btn btn-primary btn-sm">Nouvel item</a>
            </div>
        </form>
    </div>

    <div id="competence-item-table-container" class="card overflow-hidden">
        {% include "superadmin/competence_items/_item_table.html" %}
    </div>
</div>
{% endblock %}
