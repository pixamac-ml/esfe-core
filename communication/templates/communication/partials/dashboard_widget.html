<div class="comm-widget" data-comm-widget data-comm-count="{{ communication_unread_count|default:0 }}" hx-get="{% url 'communication:notifications_widget' %}{% if request.resolver_match.namespace == 'secretary' or request.GET.surface == 'secretary' %}?surface=secretary{% endif %}" hx-trigger="every 25s" hx-swap="outerHTML">
  <style>
    .comm-widget{position:relative;display:inline-flex;z-index:80}.comm-widget-btn{position:relative;width:40px;height:40px;border:1px solid #dbe3ef;border-radius:12px;background:#fff;color:#334155;display:grid;place-items:center;cursor:pointer;transition:.16s}.comm-widget-btn:hover{background:#f8fafc;border-color:#bfdbfe;color:#2563eb}.comm-widget-btn.has-new{animation:commBell .75s ease 2}.comm-widget-badge{position:absolute;right:-5px;top:-5px;min-width:18px;height:18px;padding:0 5px;border-radius:999px;background:#ef4444;color:#fff;font-size:10px;font-weight:950;display:grid;place-items:center;line-height:1}.comm-widget-badge:not(.is-empty){animation:commPop .28s ease}.comm-widget-badge.is-empty{display:none}.comm-widget-panel{position:absolute;right:0;top:48px;width:min(390px,calc(100vw - 24px));max-height:520px;overflow:hidden;border:1px solid #dbe3ef;border-radius:14px;background:#fff;box-shadow:0 22px 55px rgba(15,23,42,.18);display:none}.comm-widget.is-open .comm-widget-panel{display:block}.comm-widget-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 14px;border-bottom:1px solid #eef2f7}.comm-widget-title{font-size:13px;font-weight:950;color:#0f172a}.comm-widget-sub{font-size:11px;font-weight:800;color:#64748b;margin-top:2px}.comm-widget-list{max-height:365px;overflow:auto}.comm-widget-item{width:100%;display:flex;gap:10px;padding:12px 14px;border:0;border-bottom:1px solid #f1f5f9;color:inherit;text-decoration:none;background:#fff;text-align:left;cursor:pointer}.comm-widget-item:hover{background:#f8fbff}.comm-widget-item.is-unread{background:#eff6ff}.comm-widget-dot{width:8px;height:8px;border-radius:999px;background:#2563eb;flex:0 0 8px;margin-top:6px}.comm-widget-item.is-read .comm-widget-dot{background:#cbd5e1}.comm-widget-item-title{font-size:12px;font-weight:950;color:#0f172a;line-height:1.25}.comm-widget-item-body{font-size:11px;color:#64748b;font-weight:700;line-height:1.35;margin-top:3px}.comm-widget-item-meta{font-size:10px;color:#94a3b8;font-weight:900;text-transform:uppercase;letter-spacing:.06em;margin-top:5px}.comm-widget-actions{display:flex;gap:8px;padding:10px 14px;background:#f8fafc;border-top:1px solid #eef2f7}.comm-widget-link,.comm-widget-mark{border:1px solid #dbe3ef;background:#fff;color:#475569;border-radius:9px;padding:7px 9px;font-size:11px;font-weight:900;text-decoration:none;cursor:pointer}.comm-widget-mark{color:#2563eb}.comm-dash-drawer{position:fixed;inset:0;z-index:240;display:none}.comm-dash-drawer.is-open{display:block}.comm-dash-backdrop{position:absolute;inset:0;background:rgba(15,23,42,.38)}.comm-dash-panel{position:absolute;right:0;top:0;height:100%;width:min(760px,100vw);background:#fff;border-left:1px solid #dbe3ef;box-shadow:-24px 0 55px rgba(15,23,42,.22);display:flex;flex-direction:column}.comm-dash-head{height:64px;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:0 18px;border-bottom:1px solid #eef2f7;background:#fff}.comm-dash-title{font-size:14px;font-weight:950;color:#0f172a}.comm-dash-body{flex:1;overflow:auto;background:#f8fafc}.comm-dash-close{width:38px;height:38px;border:1px solid #dbe3ef;border-radius:10px;background:#fff;color:#475569;cursor:pointer}.comm-toast{position:fixed;right:18px;bottom:18px;z-index:220;width:min(360px,calc(100vw - 36px));border:1px solid #bfdbfe;background:#fff;border-radius:14px;box-shadow:0 18px 45px rgba(15,23,42,.18);padding:12px;display:none}.comm-toast.is-visible{display:block}.comm-toast-title{font-size:13px;font-weight:950;color:#0f172a}.comm-toast-body{font-size:12px;font-weight:700;color:#64748b;margin-top:4px;line-height:1.35}@keyframes commBell{0%,100%{transform:rotate(0)}20%{transform:rotate(-12deg)}45%{transform:rotate(10deg)}70%{transform:rotate(-6deg)}}@keyframes commPop{0%{transform:scale(.75)}80%{transform:scale(1.12)}100%{transform:scale(1)}}
  </style>
  <button type="button" class="comm-widget-btn" onclick="window.esfeToggleCommWidget(this)" aria-label="Notifications">
    <svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none">
      <path d="M15 17H9m9-2V11a6 6 0 0 0-12 0v4l-2 2h16l-2-2Zm-6 6a2.5 2.5 0 0 0 2.35-1.65h-4.7A2.5 2.5 0 0 0 12 21Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span class="comm-widget-badge js-comm-unread-count {% if not communication_unread_count %}is-empty{% endif %}">
      {% if communication_unread_count %}{{ communication_unread_count|default:0 }}{% endif %}
    </span>
  </button>
  <section class="comm-widget-panel">
    <div class="comm-widget-head">
      <div>
        <div class="comm-widget-title">Notifications</div>
        <div class="comm-widget-sub"><span class="js-comm-unread-text">{{ communication_unread_count|default:0 }}</span> non lue(s)</div>
      </div>
      <a class="comm-widget-link" href="{% if request.resolver_match.namespace == 'secretary' or request.GET.surface == 'secretary' %}{% url 'secretary:secretary_dashboard' %}?section=notifications{% else %}{% url 'communication:notifications' %}{% endif %}">Tout voir</a>
    </div>
    <div class="comm-widget-list">
      {% for notification in communication_recent_notifications %}
        <button type="button"
                class="comm-widget-item {% if notification.read_at %}is-read{% else %}is-unread{% endif %}"
                data-comm-detail-url="{% url 'communication:notification_detail' notification.id %}"
                onclick="window.esfeOpenCommNotification && window.esfeOpenCommNotification(this)">
          <span class="comm-widget-dot"></span>
          <span style="min-width:0">
            <span class="comm-widget-item-title">{{ notification.title }}</span>
            <span class="comm-widget-item-body">{{ notification.body|default:"Notification centralisee"|truncatechars:120 }}</span>
            <span class="comm-widget-item-meta">{{ notification.created_at|date:"d/m/Y H:i" }}</span>
          </span>
        </button>
      {% empty %}
        <div class="comm-widget-item is-read"><span class="comm-widget-dot"></span><span class="comm-widget-item-body">Aucune notification pour le moment.</span></div>
      {% endfor %}
    </div>
    <div class="comm-widget-actions">
      <button class="comm-widget-mark" type="button" hx-post="{% url 'communication:mark_all_notifications_read' %}{% if request.resolver_match.namespace == 'secretary' or request.GET.surface == 'secretary' %}?surface=secretary{% endif %}" hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}' hx-target="closest .comm-widget" hx-swap="outerHTML">Tout marquer lu</button>
      <a class="comm-widget-link" href="{% if request.resolver_match.namespace == 'secretary' or request.GET.surface == 'secretary' %}{% url 'secretary:secretary_dashboard' %}?section=notifications{% else %}{% url 'communication:notifications' %}{% endif %}">Centre</a>
    </div>
  </section>
  <div class="comm-toast" data-comm-toast>
    <div class="comm-toast-title" data-comm-toast-title></div>
    <div class="comm-toast-body" data-comm-toast-body></div>
  </div>
  <div id="comm-notification-drawer" class="comm-dash-drawer" aria-hidden="true">
    <div class="comm-dash-backdrop" onclick="window.esfeCloseCommDrawer && window.esfeCloseCommDrawer()"></div>
    <section class="comm-dash-panel" role="dialog" aria-modal="true" aria-label="Detail notification">
      <header class="comm-dash-head">
        <div class="comm-dash-title">Detail de la notification</div>
        <button type="button" class="comm-dash-close" onclick="window.esfeCloseCommDrawer && window.esfeCloseCommDrawer()">×</button>
      </header>
      <div id="comm-notification-drawer-body" class="comm-dash-body"></div>
    </section>
  </div>
</div>
<script>
  if (!window.htmx && !document.querySelector("script[data-esfe-htmx-loader]")) {
    const htmxScript = document.createElement("script");
    htmxScript.src = "https://unpkg.com/htmx.org@1.9.12";
    htmxScript.defer = true;
    htmxScript.dataset.esfeHtmxLoader = "true";
    document.head.appendChild(htmxScript);
  }
  window.esfeToggleCommWidget = window.esfeToggleCommWidget || function(button){
    const widget = button.closest("[data-comm-widget]");
    document.querySelectorAll("[data-comm-widget].is-open").forEach(function(item){
      if(item !== widget) item.classList.remove("is-open");
    });
    widget.classList.toggle("is-open");
  };
  window.esfeOpenCommDrawer = window.esfeOpenCommDrawer || function(){
    document.querySelectorAll("[data-comm-widget].is-open").forEach(function(item){ item.classList.remove("is-open"); });
    const drawer = document.getElementById("comm-notification-drawer");
    if (drawer) {
      drawer.classList.add("is-open");
      drawer.setAttribute("aria-hidden", "false");
    }
  };
  window.esfeCloseCommDrawer = window.esfeCloseCommDrawer || function(){
    const drawer = document.getElementById("comm-notification-drawer");
    if (drawer) {
      drawer.classList.remove("is-open");
      drawer.setAttribute("aria-hidden", "true");
    }
  };
  window.esfeOpenCommNotification = window.esfeOpenCommNotification || function(button){
    const url = button.getAttribute("data-comm-detail-url");
    const widget = button.closest("[data-comm-widget]") || document;
    const drawer = widget.querySelector("#comm-notification-drawer") || document.getElementById("comm-notification-drawer");
    const body = widget.querySelector("#comm-notification-drawer-body") || document.getElementById("comm-notification-drawer-body");
    if (!url || !drawer || !body) return;

    document.querySelectorAll("[data-comm-widget].is-open").forEach(function(item){ item.classList.remove("is-open"); });
    body.innerHTML = '<div style="padding:18px;font-size:13px;font-weight:800;color:#64748b;">Chargement de la notification...</div>';
    drawer.classList.add("is-open");
    drawer.setAttribute("aria-hidden", "false");

    fetch(url, {
      headers: {
        "X-Requested-With": "XMLHttpRequest",
        "HX-Request": "true"
      },
      credentials: "same-origin"
    })
      .then(function(response){
        if (!response.ok) throw new Error("Erreur chargement notification");
        return response.text();
      })
      .then(function(html){
        body.innerHTML = html;
        button.classList.remove("is-unread");
        button.classList.add("is-read");
        const dot = button.querySelector(".comm-widget-dot");
        if (dot) dot.style.background = "#cbd5e1";
        const badge = widget.querySelector(".js-comm-unread-count");
        const current = Number.parseInt((badge && badge.textContent) || "0", 10) || 0;
        window.esfeUpdateCommunicationBadges && window.esfeUpdateCommunicationBadges(Math.max(current - 1, 0));
      })
      .catch(function(){
        body.innerHTML = '<div style="padding:18px;font-size:13px;font-weight:800;color:#b91c1c;">Impossible de charger cette notification.</div>';
      });
  };
  if (!window.esfeCommunicationSocketStarted) {
    window.esfeCommunicationSocketStarted = true;
    window.esfeUpdateCommunicationBadges = function(count) {
      const previous = Number(window.esfeLastCommunicationCount || 0);
      window.esfeLastCommunicationCount = Number(count || 0);
      document.querySelectorAll(".js-comm-unread-count").forEach(function(badge){
        if (count > 0) {
          badge.classList.remove("is-empty");
          badge.textContent = count > 99 ? "99+" : String(count);
        } else {
          badge.classList.add("is-empty");
          badge.textContent = "";
        }
      });
      document.querySelectorAll(".js-comm-unread-text").forEach(function(item){ item.textContent = String(count || 0); });
    };
    window.esfeShowCommunicationToast = function(data) {
      const toast = document.querySelector("[data-comm-toast]");
      if (!toast) return;
      toast.querySelector("[data-comm-toast-title]").textContent = data.title || "Nouvelle notification";
      toast.querySelector("[data-comm-toast-body]").textContent = data.body || "";
      toast.classList.add("is-visible");
      window.setTimeout(function(){ toast.classList.remove("is-visible"); }, 5200);
    };
    try {
      const protocol = window.location.protocol === "https:" ? "wss" : "ws";
      const socket = new WebSocket(protocol + "://" + window.location.host + "/ws/communication/notifications/");
      socket.onmessage = function(event) {
        const data = JSON.parse(event.data || "{}");
        if (typeof data.unread_count === "number") {
          window.esfeUpdateCommunicationBadges(data.unread_count);
        } else {
          const firstBadge = document.querySelector(".js-comm-unread-count");
          const current = Number.parseInt(firstBadge && firstBadge.textContent || "0", 10) || 0;
          window.esfeUpdateCommunicationBadges(current + 1);
        }
        window.esfeShowCommunicationToast(data);
        if (window.sgPlaySound) window.sgPlaySound("notification");
        document.querySelectorAll(".comm-widget-btn").forEach(function(button){
          button.classList.add("has-new");
          window.setTimeout(function(){ button.classList.remove("has-new"); }, 1600);
        });
        data.sgHandledByWidget = true;
        document.body.dispatchEvent(new CustomEvent("communication:notification", {detail: data}));
      };
    } catch (error) {
      console.warn("Notifications websocket unavailable");
    }
  }
  (function(){
    const widget = document.currentScript && document.currentScript.closest("[data-comm-widget]");
    if (!widget) return;
    const count = Number(widget.dataset.commCount || 0);
    if (window.esfeLastCommunicationCount === undefined) window.esfeLastCommunicationCount = count;
    else if (count > window.esfeLastCommunicationCount && window.sgPlaySound) {
      window.sgPlaySound("notification");
      const button = widget.querySelector(".comm-widget-btn");
      if (button) {
        button.classList.add("has-new");
        window.setTimeout(function(){ button.classList.remove("has-new"); }, 1600);
      }
      window.esfeShowCommunicationToast && window.esfeShowCommunicationToast({title:"Nouvelle notification", body:"Vous avez une nouvelle alerte."});
      window.esfeLastCommunicationCount = count;
    } else {
      window.esfeLastCommunicationCount = count;
    }
  })();
</script>
