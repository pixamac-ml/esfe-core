<div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6">

  <div class="flex items-center gap-2 mb-5">
    <div class="bg-[#0f2c59]/10 p-2 rounded-lg">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-[#0f2c59]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M3 7h18M3 12h18M3 17h18" />
      </svg>
    </div>
    <h3 class="text-lg font-semibold text-gray-900">
      Catégories
    </h3>
  </div>

  <ul class="space-y-3">

    {% for category in categories %}
      <li>
        <a href="{{ category.get_absolute_url }}"
           class="flex justify-between items-center
                  text-sm text-gray-600
                  hover:text-[#0f2c59]
                  transition">

          <span class="font-medium">
            {{ category.name }}
          </span>

          <span class="bg-gray-100 text-gray-500 text-xs px-2 py-1 rounded-full">
            {{ category.articles.count }}
          </span>

        </a>
      </li>
    {% endfor %}

  </ul>

</div>
